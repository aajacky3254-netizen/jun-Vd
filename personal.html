<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>駕駛長個人作業台 - 豐東客運</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background-color: #f3f4f6; color: #374151; font-family: "微軟正黑體", sans-serif; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 導覽列狀態 */
    .nav-btn { transition: color 0.2s; }
    .nav-btn.active { color: #f97316; } /* 品牌橘色 */
    
    /* 滑動確認按鈕模擬 */
    .long-press-confirm { background: #e5e7eb; border-radius: 9999px; position: relative; height: 44px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; transition: background 0.3s;}
    .long-press-confirm.confirmed { background: #f97316; color: white;} /* 品牌橘色 */
    .slide-text { z-index: 10; font-weight: bold; font-size: 14px; transition: color 0.3s;}
    
    .course-card { transition: transform 0.2s; cursor: pointer; }
    .course-card:active { transform: scale(0.98); }
    .ack-btn { position: relative; }
.slide-progress {
    position: absolute; left: 0; top: 0; bottom: 0; 
    background: rgba(249, 115, 22, 0.2); /* 橘色半透明 */
    width: 0%; transition: width 0.1s linear; pointer-events: none;
}
.ack-btn:active { transform: scale(0.98); }
  </style>
</head>
<body class="bg-gray-200 flex justify-center h-screen">

<div class="w-full max-w-md bg-gray-50 h-full flex flex-col relative shadow-2xl overflow-hidden border-x border-gray-300">

  <header class="flex items-center justify-between px-5 py-4 bg-white shadow-sm z-10 sticky top-0 shrink-0 border-b border-gray-100">
    <div class="flex items-center gap-2">
      <div class="bg-gray-800 text-white font-bold text-xs px-2 py-1 rounded flex items-center gap-1">
          <img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="logo" class="h-3.5 object-contain">
          豐東客運
      </div>
      <h1 class="text-lg font-bold text-gray-800"><span id="displayEmpId">000</span> <span id="displayName">載入中</span></h1>
    </div>
    <button id="btnLogout" class="text-sm font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-full hover:bg-red-100 transition-colors">登出</button>
  </header>

  <main id="viewSchedule" class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24">
    <div class="bg-gray-800 text-white py-2 px-3 rounded-t-xl font-bold text-sm mx-2 mt-2 flex justify-between items-center shadow-inner">
      <button id="btnPrevDay" class="text-gray-300 hover:text-white px-3 py-1.5 rounded bg-gray-700 active:scale-95 transition-transform text-xs">◀ 前一日</button>
      
      <div class="flex flex-col items-center relative">
          <span class="text-[10px] text-orange-400 mb-0.5 tracking-wider" id="dayOfWeekLabel">載入中</span>
          <input type="date" id="scheduleDatePicker" class="bg-transparent text-white border-none outline-none text-center cursor-pointer font-bold text-[15px] leading-none m-0 p-0 [&::-webkit-calendar-picker-indicator]:invert">
      </div>
      
      <button id="btnNextDay" class="text-gray-300 hover:text-white px-3 py-1.5 rounded bg-gray-700 active:scale-95 transition-transform text-xs">下一日 ▶</button>
    </div>
    
    <div class="bg-white rounded-b-xl shadow-md p-4 mx-2 mb-6 border-t-4 border-orange-500">
      <div id="scheduleContainer" class="space-y-4">
        <div class="text-center text-gray-400 py-6 font-bold text-sm">載入班表中...</div>
      </div>
    </div>
  </main>

  <main id="viewLeave" class="hidden flex-1 overflow-y-auto no-scrollbar p-4 pb-24">
    <h2 class="text-xl font-bold text-gray-800 mb-4 px-2">🗓️ 差假申請系統</h2>
    
    <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
      <form id="leaveForm" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">請假日期 (必填)</label>
          <input type="date" id="leaveDate" required class="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-lg px-3 py-2.5 outline-none focus:border-orange-500 font-bold transition-colors">
        </div>
        
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">假別 (必填)</label>
          <select id="leaveType" required class="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-lg px-3 py-2.5 outline-none focus:border-orange-500 font-bold transition-colors">
            <option value="特休">🌟 特休假</option>
            <option value="排休">📅 例行排休</option>
            <option value="事假">📝 事假</option>
            <option value="病假">🤒 病假</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">事由說明</label>
          <textarea id="leaveReason" rows="3" class="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-lg px-3 py-2 outline-none focus:border-orange-500 text-sm transition-colors" placeholder="請簡述請假事由..."></textarea>
        </div>

        <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl shadow-md transition-colors active:scale-[0.98]">
          送出排休申請
        </button>
      </form>
    </div>

    <h3 class="text-sm font-bold text-gray-500 mt-8 mb-3 px-2">近期申請紀錄</h3>
    <div id="leaveHistoryContainer" class="space-y-3">
       <div class="text-center text-gray-400 py-4 text-sm">無歷史紀錄</div>
    </div>
  </main>

  <main id="viewTraining" class="hidden flex-1 overflow-y-auto no-scrollbar p-4 pb-24">
    <div class="flex justify-between items-end px-2 mb-4">
      <div>
        <h2 class="text-xl font-bold text-gray-800">🎓 數位學習中心</h2>
        <p class="text-xs text-gray-500">10分鐘微課程 (10-min-class)</p>
      </div>
      <div class="text-right">
        <div class="text-xs text-gray-500 font-bold">本月完課率</div>
        <div class="text-lg font-black text-orange-600">33%</div>
      </div>
    </div>

    <div class="space-y-4">
      <div class="course-card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex">
        <div class="w-2 bg-orange-500"></div>
        <div class="p-4 flex-1">
          <div class="flex justify-between items-start mb-1">
            <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded">服務態度</span>
            <span class="text-orange-500 text-xs font-bold flex items-center gap-1">✓ 已完課</span>
          </div>
          <h3 class="font-bold text-gray-800 text-base mb-1">應對乘客與核心價值引導</h3>
          <p class="text-xs text-gray-500 mb-3">學習如何以同理心應對客訴，提升服務品質。</p>
          <div class="w-full bg-gray-100 rounded-full h-1.5"><div class="bg-orange-500 h-1.5 rounded-full" style="width: 100%"></div></div>
        </div>
      </div>

      <div class="course-card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex">
        <div class="w-2 bg-rose-500"></div>
        <div class="p-4 flex-1">
          <div class="flex justify-between items-start mb-1">
            <span class="bg-rose-100 text-rose-700 text-[10px] font-bold px-2 py-0.5 rounded">行車安全</span>
            <span class="text-rose-500 text-xs font-bold flex items-center gap-1">待上課 (10m)</span>
          </div>
          <h3 class="font-bold text-gray-800 text-base mb-1">行車行為矯正：急煞與超速防範</h3>
          <p class="text-xs text-gray-500 mb-3">透過行車視野死角真實案例，建立防禦駕駛觀念。</p>
          <div class="w-full bg-gray-100 rounded-full h-1.5"><div class="bg-gray-300 h-1.5 rounded-full" style="width: 0%"></div></div>
        </div>
      </div>

      <div class="course-card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex">
        <div class="w-2 bg-purple-500"></div>
        <div class="p-4 flex-1">
          <div class="flex justify-between items-start mb-1">
            <span class="bg-purple-100 text-purple-700 text-[10px] font-bold px-2 py-0.5 rounded">系統操作</span>
            <span class="text-gray-400 text-xs font-bold flex items-center gap-1">觀看中 45%</span>
          </div>
          <h3 class="font-bold text-gray-800 text-base mb-1">全新車輛調度與報修系統導覽</h3>
          <p class="text-xs text-gray-500 mb-3">學習如何使用手機回報車況與查詢個人班表。</p>
          <div class="w-full bg-gray-100 rounded-full h-1.5"><div class="bg-purple-500 h-1.5 rounded-full" style="width: 45%"></div></div>
        </div>
      </div>
    </div>
  </main>

  <nav class="bg-white border-t border-gray-200 flex justify-around py-2 pb-safe absolute bottom-0 w-full z-20 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] shrink-0">
    <button class="nav-btn active flex flex-col items-center p-2 text-gray-400" data-target="viewSchedule">
      <svg class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
      <span class="text-[10px] font-bold tracking-wider">今日班表</span>
    </button>
    <button class="nav-btn flex flex-col items-center p-2 text-gray-400" data-target="viewLeave">
      <svg class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
      <span class="text-[10px] font-bold tracking-wider">請假排休</span>
    </button>
    <button class="nav-btn flex flex-col items-center p-2 text-gray-400" data-target="viewTraining">
      <svg class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0v6m0-6L3 9m9 5l9-5" /></svg>
      <span class="text-[10px] font-bold tracking-wider">數位學習</span>
    </button>
    <button class="slide-confirm bg-blue-600 ...">確認出車</button>
    <button class="long-press-confirm bg-blue-600 ...">確認出車</button>
  </nav>

</div> 
  <script type="module">
    import { db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, setDoc, updateDoc, deleteDoc, addDoc, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    // 💡 修正 1：補上 logout 匯入
    import { checkAuthAndGetRole, logout } from './auth.js';
    import { getAuth, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 密碼修改邏輯
    const btnChangePassword = document.getElementById('btnChangePassword');
    if (btnChangePassword) {
        btnChangePassword.addEventListener('click', async () => {
            const newPassword = prompt("請輸入您的新密碼 (至少6碼)：");
            if (newPassword && newPassword.length >= 6) {
                const auth = getAuth();
                const user = auth.currentUser;
                if (user) {
                    try {
                        await updatePassword(user, newPassword);
                        alert("✅ 密碼修改成功！下次請使用新密碼登入。");
                    } catch (error) {
                        if (error.code === 'auth/requires-recent-login') {
                            alert("為了安全起見，請先登出並重新登入後，再執行修改密碼。");
                        } else {
                            alert("修改失敗：" + error.message);
                        }
                    }
                }
            } else {
                alert("密碼長度不足或取消修改。");
            }
        });
    }

    const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';

    let currentUser = null;
    let unsubscribeSchedule = null;
    const datePicker = document.getElementById('scheduleDatePicker');
    const dayLabel = document.getElementById('dayOfWeekLabel');

    checkAuthAndGetRole(['駕駛長', '站長', '調度員', '總公司']).then((user) => {
        currentUser = user;
        document.getElementById('displayEmpId').innerText = escapeHTML(user.empId);
        document.getElementById('displayName').innerText = escapeHTML(user.name);
        
        // 💡 修正 2：修復日期顯示的 Bug
        const now = new Date();
        updateDateUI(now);

        loadLeaveHistory();
    }).catch(console.error);

    document.getElementById('btnLogout').addEventListener('click', logout);

    // --- 日期切換與顯示邏輯 ---
    function updateDateUI(dateObj) {
        const yyyy = dateObj.getFullYear();
        const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dateObj.getDate()).padStart(2, '0');
        const dateStr = `${yyyy}-${mm}-${dd}`;
        
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        dayLabel.innerText = `星期${days[dateObj.getDay()]}`;
        datePicker.value = dateStr;

        loadMySchedule(dateStr);
    }

    document.getElementById('btnPrevDay').addEventListener('click', () => {
        const d = new Date(datePicker.value);
        d.setDate(d.getDate() - 1);
        updateDateUI(d);
    });

    document.getElementById('btnNextDay').addEventListener('click', () => {
        const d = new Date(datePicker.value);
        d.setDate(d.getDate() + 1);
        updateDateUI(d);
    });

    datePicker.addEventListener('change', (e) => {
        if(e.target.value) {
            updateDateUI(new Date(e.target.value));
        }
    });

    // --- 視圖切換邏輯 ---
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            
            document.getElementById('viewSchedule').classList.add('hidden');
            document.getElementById('viewLeave').classList.add('hidden');
            document.getElementById('viewTraining').classList.add('hidden');
            
            const targetId = e.currentTarget.dataset.target;
            document.getElementById(targetId).classList.remove('hidden');
        });
    });

    // --- 載入個人班表 ---
    function loadMySchedule(dateStr) {
        const container = document.getElementById('scheduleContainer');
        container.innerHTML = '<div class="text-center text-gray-400 py-6 font-bold text-sm">載入班表中...</div>';
        
        if (unsubscribeSchedule) unsubscribeSchedule();
        
        const q = query(collection(db, "daily_dispatches"), 
            where("date", "==", dateStr),
            where("assigned_empid", "==", currentUser.empId)
        );

        unsubscribeSchedule = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = `<div class="text-center text-gray-400 py-10 font-bold text-sm">本日無排定車趟，請確認是否為例行休假。</div>`;
                return;
            }

            let trips = [];
            snapshot.forEach(docSnap => trips.push({ id: docSnap.id, ...docSnap.data() }));
            trips.sort((a, b) => (a.departure_time || "").localeCompare(b.departure_time || ""));

            let html = "";
            trips.forEach(data => {
                const tripId = data.id;
                const isAck = data.driver_acknowledged === true;
                
                html += `
                <div class="flex bg-gray-50 rounded-lg overflow-hidden border border-gray-200">
                  <div class="w-16 bg-orange-500 text-white flex flex-col items-center justify-center font-bold text-lg p-2 shadow-inner">
                    <span class="text-xs font-normal mb-1">路線</span>
                    ${escapeHTML(data.route).replace(/\D/g, '') || data.route}
                  </div>
                  <div class="flex-1 p-3">
                    <div class="flex justify-between items-start mb-2">
                        <div class="text-sm font-bold text-gray-800 truncate pr-2">${escapeHTML(data.start_point)} <span class="text-gray-400 font-normal mx-1">➔</span> ${escapeHTML(data.end_point)}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs text-gray-600 mb-3">
                        <div class="flex items-center gap-1"><span class="text-lg">🕒</span> <span class="font-bold text-gray-800 text-sm">${escapeHTML(data.departure_time)}</span></div>
                        <div class="flex items-center gap-1"><span class="text-lg">🚍</span> <span class="font-mono font-bold">${escapeHTML(data.assigned_vehicle)}</span></div>
                    </div>
                    
                    <div class="slide-confirm ${isAck ? 'confirmed' : 'ack-btn'}" data-id="${tripId}">
                      <div class="slide-progress"></div> <span class="slide-text">${isAck ? '✓ 班表已確認' : '長按 1 秒確認班表'}</span> 
                    </div>
                  </div>
                </div>`;
            });
            container.innerHTML = html;

            document.querySelectorAll('.ack-btn').forEach(btn => {
                let progress = 0;
                let progressInterval;
                const bar = btn.querySelector('.slide-progress');
                const text = btn.querySelector('.slide-text');

                const startPress = (e) => {
                    e.preventDefault(); 
                    clearInterval(progressInterval);
                    progress = 0;
                    text.innerText = "確認中...";
                    progressInterval = setInterval(() => {
                        progress += 10;
                        bar.style.width = progress + '%';
                        if (progress >= 100) {
                            clearInterval(progressInterval);
                            executeConfirm(btn.dataset.id, btn);
                        }
                    }, 100);
                };

                const endPress = () => {
                    clearInterval(progressInterval);
                    if (progress < 100) {
                        bar.style.width = '0%';
                        text.innerText = "長按 1 秒確認班表";
                    }
                };

                async function executeConfirm(tripId, element) {
                    element.classList.remove('ack-btn');
                    element.classList.add('confirmed');
                    element.querySelector('.slide-text').innerText = "✓ 班表已確認";
                    element.replaceWith(element.cloneNode(true)); 
                    await updateDoc(doc(db, "daily_dispatches", tripId), { driver_acknowledged: true });
                }

                btn.addEventListener('touchstart', startPress);
                btn.addEventListener('touchend', endPress);
                btn.addEventListener('mousedown', startPress);
                btn.addEventListener('mouseup', endPress);
                btn.addEventListener('mouseleave', endPress);
                btn.addEventListener('contextmenu', (e) => e.preventDefault()); 
            });
        });
    }

    // --- 排休系統邏輯 ---
    let isSubmitting = false; 

    const leaveForm = document.getElementById('leaveForm');
    leaveForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (isSubmitting) return; 

        const lDate = document.getElementById('leaveDate').value;
        const lType = document.getElementById('leaveType').value;
        const lReason = document.getElementById('leaveReason').value;

        if (!lDate) return alert('請選擇日期');

        isSubmitting = true; 
        const submitBtn = leaveForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerText;
        submitBtn.innerText = "⏳ 傳送中...";
        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

        try {
            await addDoc(collection(db, "leave_requests"), {
                empId: currentUser.empId,
                name: currentUser.name,
                date: lDate,
                type: lType,
                reason: lReason,
                status: "審核中",
                createdAt: new Date().toISOString() 
            });
            alert("✅ 排休申請已送出，請靜候調度或站長審核。");
            window.location.reload(); 
        } catch (error) {
            console.error(error);
            alert("送出失敗，請檢查網路連線");
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            isSubmitting = false;
        }
    });

    // --- 載入歷史排休紀錄 ---
    function loadLeaveHistory() {
        const q = query(collection(db, "leave_requests"), 
            where("empId", "==", currentUser.empId)
        );

        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('leaveHistoryContainer');
            if (snapshot.empty) return container.innerHTML = '<div class="text-center text-gray-400 py-4 text-sm">無歷史紀錄</div>';

            let requests = [];
            snapshot.forEach(docSnap => requests.push({ id: docSnap.id, ...docSnap.data() }));
            
            requests.sort((a, b) => {
                const dateA = a.date || "";
                const dateB = b.date || "";
                return dateB.localeCompare(dateA);
            });

            let html = "";
            requests.forEach(data => {
                let statusColor = "bg-amber-100 text-amber-700"; 
                if (data.status === "已核准") statusColor = "bg-orange-100 text-orange-700 border border-orange-200";
                if (data.status === "退回") statusColor = "bg-red-100 text-red-700";

                html += `
                <div class="bg-white p-3 rounded-lg border border-gray-100 flex justify-between items-center shadow-sm">
                    <div>
                        <div class="font-bold text-gray-800 text-sm mb-1">${data.date ? data.date.replace(/-/g, '/') : '未知日期'} <span class="text-xs text-gray-500 font-normal ml-2">${escapeHTML(data.type)}</span></div>
                        <div class="text-xs text-gray-400 truncate max-w-[200px]">${escapeHTML(data.reason) || '無事由'}</div>
                    </div>
                    <span class="text-[10px] font-bold px-2.5 py-1 rounded-full ${statusColor}">${escapeHTML(data.status)}</span>
                </div>`;
            });
            container.innerHTML = html;
        });
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW err: ', err));
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 車輛資產與保養管理</title>
  <link rel="stylesheet" href="./output.css">
  <style>
    body { font-family: "微軟正黑體", "Noto Sans TC", sans-serif; padding: 0; margin: 0; background-color: #f4f6f9; display: none; }
    h2 { color: #1e293b; margin: 20px; font-weight: 800; font-size: 26px; letter-spacing: 1px;}
    .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
    .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center;}
    .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block;}
    .navbar a.nav-link:hover { background-color: #374151; color: white; }
    .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}
    .content-area { padding: 0 20px; max-width: 1200px; margin: 0 auto;}
    .control-panel { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 24px; display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; border: 1px solid #e2e8f0; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;}
    .input-group input, .input-group select { padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; transition: 0.2s; outline: none; background-color: #f8fafc; }
    .input-group input:focus, .input-group select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); background-color: #fff;}
    table { width: 100%; border-collapse: collapse; text-align: left; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden;}
    th, td { border-bottom: 1px solid #e2e8f0; padding: 16px; transition: background-color 0.2s; }
    th { background-color: #1e293b; color: #f8fafc; font-weight: 600; letter-spacing: 1px; }
    tr:hover { background-color: #f8fafc; }
    tr.status-maintenance { background-color: #fefce8; } 
    tr.status-breakdown { background-color: #fef2f2; }   
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; display: inline-block;}
    .badge-ready { background-color: #dcfce7; color: #166534; }
    .badge-maintenance { background-color: #fef08a; color: #854d0e; }
    .badge-breakdown { background-color: #fecdd3; color: #9f1239; }
    /* 📱 手機版表格轉換為卡片式設計 */
    @media screen and (max-width: 768px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead tr { display: none; }
      tr { background: white; margin-bottom: 1rem; border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; padding: 12px; }
      td { border: none; border-bottom: 1px solid #f1f5f9; position: relative; padding: 12px 10px 12px 40%; text-align: right; min-height: 45px; display: flex; justify-content: flex-end; align-items: center;}
      td:last-child { border-bottom: none; justify-content: center; padding: 15px 10px 5px; }
      td::before { content: attr(data-label); position: absolute; left: 15px; width: 35%; text-align: left; font-weight: 800; color: #64748b; font-size: 13px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
        <img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="LOGO" class="h-8 mr-3 object-contain">
        豐東交通客運 | 智慧車輛調度系統
    </a>
    <a href="schedule.html" class="nav-link">🗓️ 週班表管理</a>
    <a href="dispatch.html" class="nav-link">🚦 每日發車控制台</a>
    <a href="drivers.html" class="nav-link">👨‍✈️ 人事管理系統</a>
    <a href="vehicles.html" class="nav-link active">🚍 車輛資訊系統</a>
  </nav>

  <div class="content-area">
    <div class="flex justify-between items-center mt-6 mb-2">
      <h2>🚍 車輛資產與保養管理</h2>
      <span id="db-status" class="px-3 py-1.5 rounded-full text-xs font-bold bg-yellow-100 text-yellow-600 border border-yellow-300">連線中...</span>
    </div>

    <div id="adminControlPanel" class="control-panel">
      <div class="input-group" style="width: 180px;">
        <label>車牌號碼</label>
        <input type="text" id="inputPlate" placeholder="如: KKA-1234" required>
      </div>
      <div class="input-group" style="width: 220px;">
        <label>車輛型號</label>
        <input type="text" id="inputModel" placeholder="如: JIAMA JC290E6" required>
      </div>
      <div class="input-group" style="width: 180px;">
        <label>目前車況狀態</label>
        <select id="inputStatus">
          <option value="ready">🟢 正常營運</option>
          <option value="maintenance">🟡 定期保養</option>
          <option value="breakdown">🔴 故障維修</option>
        </select>
      </div>
      <div class="input-group flex-grow">
        <label>備註資訊 / 保養紀錄</label>
        <input type="text" id="inputNotes" placeholder="例: 下次定保里程 50,000 KM">
      </div>
      
      <div class="flex gap-2 ml-auto">
        <button id="cancelEditBtn" class="bg-gray-500 hover:bg-gray-600 text-white px-5 py-2.5 rounded-lg shadow-md transition-all font-bold hidden">
          取消
        </button>
        <button id="saveVehicleBtn" class="bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold" style="height: 44px;">
          ＋ 新增車輛
        </button>
      </div>
    </div>
<div class="flex gap-2 mb-4" id="vehicleFilters">
  <button class="filter-btn active bg-gray-800 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-sm" data-filter="all">全車隊</button>
  <button class="filter-btn bg-white text-gray-600 border px-4 py-1.5 rounded-full text-sm font-bold hover:bg-gray-50" data-filter="ready">🟢 正常營運</button>
  <button class="filter-btn bg-white text-gray-600 border px-4 py-1.5 rounded-full text-sm font-bold hover:bg-gray-50" data-filter="maintenance">🟡 定保中</button>
  <button class="filter-btn bg-white text-gray-600 border px-4 py-1.5 rounded-full text-sm font-bold hover:bg-gray-50" data-filter="breakdown">🔴 故障維修</button>
</div>
    <table>
      <thead>
        <tr>
          <th style="width: 15%;">車牌號碼</th>
          <th style="width: 25%;">車輛型號</th>
          <th style="width: 15%;">目前狀態</th>
          <th style="width: 25%;">備註說明 / 保養紀錄</th>
          <th class="admin-action-col" style="width: 20%; text-align: center;">操作</th>
        </tr>
      </thead>
      <tbody id="vehiclesBody">
        <tr><td colspan="5" class="text-center py-8 text-gray-500 font-bold">車輛資產載入中...</td></tr>
      </tbody>
    </table>
  </div>
<script type="module">
    import { checkAuthAndGetRole, renderNavbar } from './auth.js';
    import { db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js';

  // 執行權限檢查，並傳入該頁面允許的角色（例如車輛頁面允許這三個角色）
    checkAuthAndGetRole(['SuperAdmin', 'StationManager', '調度員'])
        .then((user) => {
            // 1. 成功後渲染導覽列，並將 'vehicles' 設為高亮 active
            renderNavbar(user, 'vehicles');
            
            // 2. 在這裡寫你原本在 vehicles.html 裡抓取 Firestore 資料庫的邏輯...
            console.log("驗證成功，開始載入車輛資料...");
        })
        .catch((err) => {
            console.error("驗證失敗：", err);
        });
    const escapeHTML = (str) => {
        return str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';
    };

    const allowedRoles = ['SuperAdmin', 'StationManager', '調度員', '駕駛長'];

    checkAuthAndGetRole(allowedRoles).then((user) => {
        document.body.style.display = 'block'; 
        const nav = document.querySelector('.navbar');
        nav.innerHTML += `
            <div class="ml-auto flex items-center gap-4 text-white text-sm font-bold pr-4">
                <span>👤 ${escapeHTML(user.name)} (${escapeHTML(user.role)})</span>
                <button id="btnLogout" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded transition">登出</button>
            </div>
        `;
        document.getElementById('btnLogout').addEventListener('click', logout);

        if (user.role === '駕駛長') {
            const adminPanel = document.getElementById('adminControlPanel');
            if (adminPanel) adminPanel.style.display = 'none';
            document.querySelectorAll('.admin-action-col').forEach(el => el.style.display = 'none');
        }

        const vehiclesCol = collection(db, "Vehicles");
        const dbStatusEl = document.getElementById('db-status');

        let editingDocId = null; 
        const saveBtn = document.getElementById('saveVehicleBtn');
        const cancelBtn = document.getElementById('cancelEditBtn');

        onSnapshot(query(vehiclesCol), (snapshot) => {
          const tbody = document.getElementById('vehiclesBody');
          tbody.innerHTML = '';

          if (snapshot.empty) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500 font-bold">目前車隊中沒有任何車輛。</td></tr>';
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
            dbStatusEl.innerText = "資料庫已連線";
            return;
          }

          let vehiclesData = [];
          snapshot.forEach(doc => { vehiclesData.push({ id: doc.id, ...doc.data() }); });
          vehiclesData.sort((a, b) => (a.plate_number || a.id).localeCompare(b.plate_number || b.id));

          vehiclesData.forEach((data) => {
            const tr = document.createElement('tr');
            if (data.status === 'maintenance') tr.className = 'status-maintenance';
            if (data.status === 'breakdown') tr.className = 'status-breakdown';

            let statusHtml = '';
            if (data.status === 'ready') statusHtml = '<span class="badge badge-ready">正常營運</span>';
            if (data.status === 'maintenance') statusHtml = '<span class="badge badge-maintenance">定保中</span>';
            if (data.status === 'breakdown') statusHtml = '<span class="badge badge-breakdown">故障維修</span>';

            let actionHtml = '';
            if (user.role !== '駕駛長') {
                actionHtml = `
                <td class="admin-action-col" data-label="操作" style="text-align: center;">
                  <button class="btn-edit bg-teal-500 hover:bg-teal-600 text-white px-3 py-1.5 rounded text-sm font-bold mr-2 transition-colors" data-id="${escapeHTML(data.id)}" data-plate="${escapeHTML(data.plate_number)}" data-model="${escapeHTML(data.model)}" data-status="${escapeHTML(data.status)}" data-notes="${escapeHTML(data.notes || '')}">編輯</button>
                  <button class="btn-delete bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors" data-id="${escapeHTML(data.id)}">報廢</button>
                </td>`;
            } else {
                actionHtml = `<td class="admin-action-col" data-label="操作" style="text-align: center;">-</td>`;
            }

            // 💡 修正：移除多餘的重複 <td>
            tr.innerHTML = `
              <td data-label="車牌號碼" style="font-size: 18px; font-weight: bold; letter-spacing: 1px; color: #334155;">${escapeHTML(data.plate_number || data.id)}</td>
              <td data-label="車輛型號" style="font-weight: 600; color: #475569;">${escapeHTML(data.model)}</td>
              <td data-label="目前狀態">${statusHtml}</td>
              <td data-label="備註說明" style="color: #64748b;">${escapeHTML(data.notes || '-')}</td>
              ${actionHtml}
            `;
            tbody.appendChild(tr);
          });

          dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
          dbStatusEl.innerText = "資料庫已連線";

          document.querySelectorAll('.btn-edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
              document.getElementById('inputPlate').value = e.target.getAttribute('data-plate');
              document.getElementById('inputModel').value = e.target.getAttribute('data-model');
              document.getElementById('inputStatus').value = e.target.getAttribute('data-status');
              document.getElementById('inputNotes').value = e.target.getAttribute('data-notes');
              
              editingDocId = e.target.getAttribute('data-id');
              saveBtn.innerText = "💾 儲存修改";
              saveBtn.className = "bg-gradient-to-b from-teal-500 to-teal-600 hover:from-teal-600 hover:to-teal-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold";
              cancelBtn.style.display = "inline-block";
              window.scrollTo({ top: 0, behavior: 'smooth' });
            });
          });

          document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const targetId = e.target.getAttribute('data-id');
              if (confirm("⚠️ 警告：確定要將這台車輛從系統中報廢刪除嗎？")) {
                try { await deleteDoc(doc(db, "Vehicles", targetId)); } 
                catch (err) { console.error("刪除失敗:", err); }
              }
            });
          });
        });

        saveBtn.addEventListener('click', async () => {
          const plate = document.getElementById('inputPlate').value.trim();
          const model = document.getElementById('inputModel').value.trim();
          const status = document.getElementById('inputStatus').value;
          const notes = document.getElementById('inputNotes').value.trim();

          if (!plate || !model) { alert("請輸入完整車牌號碼與車輛型號！"); return; }
          const vehicleData = { plate_number: plate, model: model, status: status, notes: notes };

          try {
            if (editingDocId) {
              await updateDoc(doc(db, "Vehicles", editingDocId), vehicleData);
              resetForm();
            } else {
              await setDoc(doc(db, "Vehicles", plate), vehicleData);
              resetForm();
            }
          } catch (error) { console.error("儲存失敗:", error); }
        });

        cancelBtn.addEventListener('click', resetForm);

        function resetForm() {
          editingDocId = null;
          document.getElementById('inputPlate').value = '';
          document.getElementById('inputModel').value = '';
          document.getElementById('inputStatus').value = 'ready';
          document.getElementById('inputNotes').value = '';
          saveBtn.innerText = "＋ 新增車輛";
          saveBtn.className = "bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold";
          cancelBtn.style.display = "none";
        }

    }).catch((err) => {
        console.error("驗證失敗或未登入", err);
    });
    document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        // 切換按鈕樣式
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active', 'bg-gray-800', 'text-white');
            b.classList.add('bg-white', 'text-gray-600');
        });
        e.target.classList.remove('bg-white', 'text-gray-600');
        e.target.classList.add('active', 'bg-gray-800', 'text-white');
        
        // 執行表格過濾
        const filterVal = e.target.getAttribute('data-filter');
        document.querySelectorAll('#vehiclesBody tr').forEach(tr => {
            // 如果是空資料提示行，不要隱藏
            if (tr.children.length === 1) return;
            
            const isMaintenance = tr.classList.contains('status-maintenance');
            const isBreakdown = tr.classList.contains('status-breakdown');
            const isReady = !isMaintenance && !isBreakdown;

            if (filterVal === 'all') tr.style.display = '';
            else if (filterVal === 'ready' && isReady) tr.style.display = '';
            else if (filterVal === 'maintenance' && isMaintenance) tr.style.display = '';
            else if (filterVal === 'breakdown' && isBreakdown) tr.style.display = '';
            else tr.style.display = 'none';
        });
    });
});
  </script>
</body>
</html>

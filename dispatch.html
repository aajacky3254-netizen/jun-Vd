<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 每日發車時刻表 (異常替補與大休防呆版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "微軟正黑體", "Noto Sans TC", sans-serif; padding: 0; margin: 0; background-color: #f4f6f9; }
    
    .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
    .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; }
    .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block; white-space: nowrap; }
    .navbar a.nav-link:hover { background-color: #374151; color: white; }
    .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}

    .content-area { padding: 0 20px; }
    
    .control-panel {
      background: #fff; padding: 20px; border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
      display: flex; flex-direction: column; gap: 15px; border: 1px solid #e2e8f0;
    }
    .input-row { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;}
    .input-group input, .input-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; outline: none; }
    
    table { width: 100%; border-collapse: collapse; text-align: center; background: #fff; border-radius: 8px; overflow: hidden;}
    th, td { border: 1px solid #e2e8f0; padding: 14px; }
    th { background-color: #1e293b; color: #f8fafc; font-weight: 600; position: sticky; top: 0; z-index: 10; }
  </style>
</head>
<body>
  <nav class="navbar no-print" id="main-nav"></nav>

 <div id="main-content" class="no-print">
  <div class="content-area mt-5">
    <div class="control-panel">
      <!-- 上排：常規新增與操作 -->
      <div class="input-row w-full">
          <div class="input-group"><label>排班日期</label><input type="date" id="inputDate" class="text-blue-700 font-bold border-blue-300 bg-blue-50"></div>
          <div class="input-group"><label>發車時間</label><input type="time" id="inputTime"></div>
          <div class="input-group"><label>到達時間</label><input type="time" id="inputEndTime"></div>
          <div class="input-group"><label>路線/Tour</label><input type="text" id="inputRoute" list="routesList" placeholder="例:200(T5)" style="width: 110px;"></div>
          <div class="input-group"><label>趟數</label><input type="number" id="inputTrips" value="1" min="1" style="width: 70px;" class="font-bold text-center"></div>
          <div class="input-group"><label>起始點</label><input type="text" id="inputStart" list="stationsList" style="width: 140px;"></div>
          <div class="input-group"><label>終點站</label><input type="text" id="inputEnd" list="stationsList" style="width: 140px;"></div>
          <button id="addTripBtn" class="bg-blue-600 text-white px-5 rounded-lg font-bold hover:bg-blue-700 transition shadow-sm">＋ 新增區塊</button>
          
          <div class="input-group ml-4 border-l-2 border-gray-200 pl-4">
              <label class="text-teal-700">複製來源日</label>
              <input type="date" id="inputCopySource" class="bg-teal-50 border-teal-300 text-teal-800 font-bold" style="width: 140px;">
          </div>
          <button id="btnCopyFromDate" class="bg-teal-600 hover:bg-teal-700 text-white px-5 rounded-lg font-bold transition shadow-sm border border-teal-700">📋 複製時刻</button>
          
          <div style="flex-grow: 1;"></div> 
          <button id="btnClearDispatch" class="bg-gray-500 hover:bg-gray-600 text-white px-5 rounded-lg font-bold transition shadow-sm">🧹 一鍵清空</button>
          <button id="btnAutoDispatch" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 rounded-lg font-bold transition shadow-sm">✨ 智慧調度</button>
      </div>

      <!-- ✨ 下排：突發異常處理專區 (一鍵替補) -->
      <div class="input-row w-full mt-2 pt-4 border-t border-rose-100 bg-rose-50/50 p-3 rounded-lg">
          <div class="flex items-center gap-4">
              <span class="text-rose-700 font-black text-sm flex items-center gap-1">🚨 突發請假替補</span>
              <select id="sickDriver" class="border border-rose-300 rounded px-3 py-2 text-sm bg-white text-rose-700 outline-none shadow-sm font-bold">
                  <option value="">1. 選擇請假駕駛</option>
              </select>
              <span class="text-gray-400 font-black">➔</span>
              <select id="stbDriver" class="border border-teal-300 rounded px-3 py-2 text-sm bg-white text-teal-700 outline-none shadow-sm font-bold">
                  <option value="">2. 選擇待命 (STB) 駕駛</option>
              </select>
              <button id="btnEmergencyReplace" class="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2 rounded-lg font-bold text-sm shadow-sm transition">一鍵轉移車趟</button>
          </div>
          <div class="ml-4 text-xs text-rose-500 font-bold self-center">※ 僅會轉移該請假駕駛「本日」的所有排定車趟。</div>
      </div>

      <datalist id="routesList"></datalist>
      <datalist id="stationsList"></datalist>
    </div>

    <table id="dispatchTable">
      <thead>
        <tr><th>發車~到達區間</th><th>路線 (Tour)</th><th>趟數</th><th>起站</th><th>終站</th><th>駕駛長</th><th>車輛配置</th><th>操作</th></tr>
      </thead>
      <tbody id="dispatchBody"></tbody>
    </table>
  </div>
 </div>

<script type="module">
  import { db } from './firebase-init.js';
  import { collection, query, onSnapshot, doc, updateDoc, deleteDoc, getDoc, getDocs, writeBatch, addDoc, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { checkAuthAndGetRole, renderNavbar } from './auth.js';

  const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';
  const timeToMins = (t) => { if(!t) return 0; let [h, m] = t.split(':').map(Number); return h * 60 + m; };

  // 🎯 修復點 1：最安全的班別提取器 (防止 Crash 白畫面)
  const getChineseShift = (shiftStr) => {
      if (!shiftStr || typeof shiftStr !== 'string') return "無";
      const match = shiftStr.match(/\((.*?)\)/);
      return match ? match[1] : (shiftStr.split(' ')[0] || "無");
  };

  // 🎯 安心提示系統 (Toast)
  const showToast = (msg) => {
      let toast = document.getElementById('save-toast');
      if (!toast) {
          toast = document.createElement('div');
          toast.id = 'save-toast';
          toast.className = 'fixed bottom-8 right-8 bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-2xl font-bold transition-opacity duration-300 z-50 pointer-events-none border-2 border-white';
          document.body.appendChild(toast);
      }
      toast.innerText = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 2500);
  };
  
  checkAuthAndGetRole(['總公司', '站長', '調度員']).then(async (user) => {
      renderNavbar(user, 'dispatch');
      
      const dispatchesCol = collection(db, "daily_dispatches");
      const tbody = document.getElementById('dispatchBody');
      const dateInput = document.getElementById('inputDate');
      dateInput.value = new Date().toISOString().split('T')[0];

      let currentAvailableDrivers = [];
      let currentStandbyDrivers = []; // ✨ 存放待命駕駛
      let currentAvailableVehicles = [];
      let currentDayTrips = []; 
      let unsubscribeDispatch = null; 

      onSnapshot(collection(db, "Routes"), snap => { document.getElementById('routesList').innerHTML = snap.docs.map(d => `<option value="${escapeHTML(d.data().name)}">`).join(''); });
      onSnapshot(collection(db, "Stations"), snap => { document.getElementById('stationsList').innerHTML = snap.docs.map(d => `<option value="${escapeHTML(d.data().name)}">`).join(''); });

      // 取得單一日期的週表與 DayKey
      async function getDriverRosterForDate(dateObj) {
          const target = new Date(dateObj.valueOf());
          target.setDate(target.getDate() - ((dateObj.getDay() + 6) % 7) + 3);
          const weekId = `${dateObj.getFullYear()}-W${(1 + Math.ceil((target.valueOf() - target.setMonth(0, 1)) / 604800000)).toString().padStart(2, '0')}`;
          const dayKey = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][dateObj.getDay()];
          const docSnap = await getDoc(doc(db, "weekly_schedules", weekId));
          return docSnap.exists() ? { roster: docSnap.data().roster, dayKey } : null;
      }

      // ✨ 改良版：同時載入「今天」與「昨天」的駕駛清單
      async function loadResources(selectedDate) {
          currentAvailableDrivers = []; 
          currentStandbyDrivers = [];
          currentAvailableVehicles = [];
          const addedDrivers = new Set();
          
          const vSnap = await getDocs(collection(db, "Vehicles"));
          vSnap.forEach(v => { if (v.data().status === 'ready') currentAvailableVehicles.push({ plate: v.id }); });

          const currD = new Date(selectedDate);
          const prevD = new Date(selectedDate);
          prevD.setDate(prevD.getDate() - 1);

          const [currData, prevData] = await Promise.all([
              getDriverRosterForDate(currD),
              getDriverRosterForDate(prevD)
          ]);

          // 🎯 強化防呆檢查 typeof === 'string'
          if (currData && currData.roster) {
              for (let dId in currData.roster) {
                  const shift = currData.roster[dId][currData.dayKey];
                  if (shift && typeof shift === 'string' && !shift.includes("OFF")) {
                      const driverObj = { empId: dId, name: currData.roster[dId].name, shift: shift, isPrevNight: false };
                      currentAvailableDrivers.push(driverObj);
                      addedDrivers.add(dId);
                      if (shift.includes("STB") || shift.includes("待命")) {
                          currentStandbyDrivers.push(driverObj);
                      }
                  }
              }
          }

          // 2. 處理「昨天」上夜班的駕駛 (跨日繼承，處理過午夜的班次)
          if (prevData && prevData.roster) {
              for (let dId in prevData.roster) {
                  const prevShift = prevData.roster[dId][prevData.dayKey];
                  if (prevShift && typeof prevShift === 'string' && prevShift.includes("N (夜)") && !addedDrivers.has(dId)) {
                      currentAvailableDrivers.push({ empId: dId, name: prevData.roster[dId].name, shift: prevShift, isPrevNight: true });
                  }
              }
          }
         currentAvailableDrivers.sort((a, b) => a.empId.localeCompare(b.empId));
          
          const stbSelect = document.getElementById('stbDriver');
          stbSelect.innerHTML = '<option value="">2. 選擇待命 (STB) 駕駛</option>' + 
              currentStandbyDrivers.map(d => `<option value="${d.empId}" data-name="${d.name}">${d.empId} ${d.name}</option>`).join('');
      }
      
    function loadDispatchForDate(dateStr) {
          if (unsubscribeDispatch) unsubscribeDispatch(); 
          const q = query(dispatchesCol, where("date", "==", dateStr));

          unsubscribeDispatch = onSnapshot(q, async (snapshot) => {
              await loadResources(dateStr);
              currentDayTrips = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d.date === dateStr); 
              currentDayTrips.sort((a, b) => (a.departure_time || "").localeCompare(b.departure_time || ""));
              
              const assignedDriverIds = new Set(currentDayTrips.filter(t => t.assigned_empid).map(t => t.assigned_empid));
              const sickSelect = document.getElementById('sickDriver');
              sickSelect.innerHTML = '<option value="">1. 選擇請假駕駛</option>' + 
                  currentAvailableDrivers.filter(d => assignedDriverIds.has(d.empId)).map(d => `<option value="${d.empId}" data-name="${d.name}">${d.empId} ${d.name}</option>`).join('');

              tbody.innerHTML = currentDayTrips.map(data => {
                  let drvOpts = `<option value="尚未指派">尚未指派</option>` + currentAvailableDrivers.map(d => {
                      let chineseShift = getChineseShift(d.shift); // 使用安全護盾函數
                      let displayTag = d.isPrevNight ? `昨夜` : chineseShift;
                      return `<option value="${d.name}" data-empid="${d.empId}" ${data.assigned_driver===d.name?'selected':''}>${d.empId} ${d.name} (${displayTag})</option>`;
                  }).join('');

                  let vehOpts = `<option value="尚未指派">尚未指派</option>` + currentAvailableVehicles.map(v => `<option value="${v.plate}" ${data.assigned_vehicle===v.plate?'selected':''}>${v.plate}</option>`).join('');
                  
                  return `<tr>
                      <td class="font-bold">${data.departure_time} ${data.arrival_time ? '~ '+data.arrival_time : ''}</td>
                      <td class="text-blue-700 font-bold">${data.route}</td>
                      <td class="font-bold text-gray-700 bg-gray-50">${data.trip_count || 1} 趟</td>
                      <td>${data.start_point}</td><td>${data.end_point}</td>
                      <td><select class="driver-select outline-none cursor-pointer p-1 rounded hover:bg-gray-100" data-id="${data.id}">${drvOpts}</select></td>
                      <td><select class="vehicle-select outline-none cursor-pointer p-1 rounded hover:bg-gray-100" data-id="${data.id}">${vehOpts}</select></td>
                      <td><button class="btn-delete-trip bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded transition shadow-sm" data-id="${data.id}">刪除</button></td>
                  </tr>`;
              }).join('') || '<tr><td colspan="8" class="py-10 text-gray-400 font-bold">目前無排定車趟</td></tr>';
          });
      }

      loadDispatchForDate(dateInput.value);
      dateInput.addEventListener('change', (e) => loadDispatchForDate(e.target.value));

      // ✨ 安心存檔：新增區塊
      document.getElementById('addTripBtn').onclick = async () => {
          if(!document.getElementById('inputTime').value || !document.getElementById('inputRoute').value) {
              return alert("發車時間與路線為必填！");
          }
          await addDoc(dispatchesCol, {
              date: dateInput.value, departure_time: document.getElementById('inputTime').value, arrival_time: document.getElementById('inputEndTime').value,
              route: document.getElementById('inputRoute').value, trip_count: document.getElementById('inputTrips').value || 1, 
              start_point: document.getElementById('inputStart').value, end_point: document.getElementById('inputEnd').value,
              assigned_driver: "尚未指派", assigned_empid: "", assigned_vehicle: "尚未指派", status: "pending"
          });
          document.getElementById('inputTrips').value = 1; 
          showToast("✅ 車趟已新增並安全存入資料庫！");
      };

      // ✨ 安心存檔：表格內下拉變更即時寫入
      tbody.addEventListener('change', async (e) => {
          const tripId = e.target.dataset.id;
          if (e.target.classList.contains('driver-select')) {
              await updateDoc(doc(db, "daily_dispatches", tripId), { assigned_driver: e.target.value, assigned_empid: e.target.options[e.target.selectedIndex].dataset.empid || "" });
              showToast("✅ 駕駛變更已自動存檔！");
          }
          if (e.target.classList.contains('vehicle-select')) {
              await updateDoc(doc(db, "daily_dispatches", tripId), { assigned_vehicle: e.target.value });
              showToast("✅ 車輛變更已自動存檔！");
          }
      });

      tbody.addEventListener('click', async (e) => {
          if (e.target.classList.contains('btn-delete-trip')) {
              await deleteDoc(doc(db, "daily_dispatches", e.target.dataset.id));
              showToast("🗑️ 車趟已刪除");
          }
      });

      // 異常替補與拷貝按鈕邏輯 (維持不變)
      document.getElementById('btnEmergencyReplace').addEventListener('click', async () => {
          const sickSelect = document.getElementById('sickDriver');
          const stbSelect = document.getElementById('stbDriver');
          const sickId = sickSelect.value;
          const stbId = stbSelect.value;

          if (!sickId || !stbId) return alert("請同時選擇「請假駕駛」與「待命駕駛」！");
          if (sickId === stbId) return alert("請假者與待命者不能是同一人！");

          const stbName = stbSelect.options[stbSelect.selectedIndex].dataset.name;
          const sickName = sickSelect.options[sickSelect.selectedIndex].dataset.name;

          const tripsToTransfer = currentDayTrips.filter(t => t.assigned_empid === sickId);
          if (tripsToTransfer.length === 0) return alert("該請假駕駛今日無排定車趟！");

          if (!confirm(`確定要將 [${sickName}] 的 ${tripsToTransfer.length} 筆車趟，全數轉移給待命駕駛 [${stbName}] 嗎？\n(此操作不可逆)`)) return;

          try {
              const batch = writeBatch(db);
              tripsToTransfer.forEach(trip => { batch.update(doc(db, "daily_dispatches", trip.id), { assigned_driver: stbName, assigned_empid: stbId }); });
              await batch.commit();
              alert(`✅ 突發替補成功！已轉移 ${tripsToTransfer.length} 筆車趟至 ${stbName}。`);
              sickSelect.value = ""; stbSelect.value = "";
          } catch (err) { alert("轉移失敗，請檢查網路連線。"); }
      });

      // (拷貝、清空與智慧調度功能程式碼與先前回覆完全相同，請放心套用即可)
      // 這裡為避免程式碼過於冗長，我們直接接續先前的邏輯
      const copySourceInput = document.getElementById('inputCopySource');
      const yesterdayInit = new Date(); yesterdayInit.setDate(yesterdayInit.getDate() - 1);
      copySourceInput.value = yesterdayInit.toISOString().split('T')[0];

      document.getElementById('btnCopyFromDate').addEventListener('click', async () => {
          const sourceDate = copySourceInput.value;
          const targetDate = dateInput.value;
          if (!sourceDate) return alert("請先選擇要複製的來源日期！");
          if (sourceDate === targetDate) return alert("來源日期與當前排班日期相同，無需複製！");
          if(currentDayTrips.length > 0) { if(!confirm(`⚠️ 畫面上已經有 ${targetDate} 的車趟。將跳過重複班次，繼續載入嗎？`)) return; }
          const btn = document.getElementById('btnCopyFromDate');
          btn.innerText = "⏳ 載入中..."; btn.disabled = true;

          try {
              const existingSchedules = new Set();
              currentDayTrips.forEach(trip => existingSchedules.add(`${trip.route}_${trip.departure_time}`));
              const q = query(dispatchesCol, where("date", "==", sourceDate));
              const snap = await getDocs(q);
              
              if(snap.empty) { alert(`找不到 ${sourceDate} 的發車紀錄！`); } else {
                  const batch = writeBatch(db);
                  let count = 0, skipCount = 0;
                  snap.forEach(docSnap => {
                      const oldData = docSnap.data();
                      const uniqueKey = `${oldData.route}_${oldData.departure_time}`;
                      if (!existingSchedules.has(uniqueKey)) {
                          const newTripRef = doc(collection(db, "daily_dispatches"));
                          batch.set(newTripRef, {
                              date: targetDate, departure_time: oldData.departure_time, arrival_time: oldData.arrival_time || "",
                              route: oldData.route, trip_count: oldData.trip_count || 1, start_point: oldData.start_point || "", end_point: oldData.end_point || "",
                              assigned_driver: "尚未指派", assigned_empid: "", assigned_vehicle: "尚未指派", status: "pending"
                          });
                          count++;
                      } else { skipCount++; }
                  });
                  if (count > 0) { await batch.commit(); showToast(`✅ 成功拷貝 ${count} 筆時刻！`); } 
                  else { showToast(`無新增班次。(跳過 ${skipCount} 筆重複)`); }
              }
          } catch (err) { alert("複製失敗。"); }
          btn.innerText = "📋 複製時刻"; btn.disabled = false;
      });

      document.getElementById('btnClearDispatch').addEventListener('click', async () => {
          const tripsToClear = currentDayTrips.filter(t => t.assigned_driver !== "尚未指派" || t.assigned_vehicle !== "尚未指派");
          if(tripsToClear.length === 0) return alert("無已指派車趟可清空！");
          if(!confirm(`⚠️ 確定要清空這 ${tripsToClear.length} 筆車趟的人車指派嗎？`)) return;
          try {
              const batch = writeBatch(db);
              tripsToClear.forEach(trip => batch.update(doc(db, "daily_dispatches", trip.id), { assigned_driver: "尚未指派", assigned_empid: "", assigned_vehicle: "尚未指派" }));
              await batch.commit();
              showToast("✅ 排班已全數清空！");
          } catch (err) { alert("清空失敗。"); }
      });

      document.getElementById('btnAutoDispatch').addEventListener('click', async () => {
          const tripsToDispatch = currentDayTrips.filter(t => t.assigned_driver === "尚未指派" || t.assigned_vehicle === "尚未指派");
          if (tripsToDispatch.length === 0) return alert("畫面中無空缺車趟可調度！");
          
          let driverSchedules = {}; let vehicleSchedules = {}; 
          const batch = writeBatch(db); let changes = 0;

          for (let trip of tripsToDispatch) {
              let assigned_driver = trip.assigned_driver, assigned_empid = trip.assigned_empid, assigned_vehicle = trip.assigned_vehicle;
              let tStart = timeToMins(trip.departure_time);
              let tEnd = timeToMins(trip.arrival_time || trip.departure_time) + 20; 

              if (assigned_driver === "尚未指派" && currentAvailableDrivers.length > 0) {
                  let bestDriver = null;
                  for (let d of currentAvailableDrivers) {
                      let sched = driverSchedules[d.empId] || [];
                      if (sched.some(s => (tStart < s.end && tEnd > s.start))) continue;
                      
                      let totalDrivingMinutes = sched.reduce((total, s) => total + (s.end - s.start), 0);
                      let newTripDuration = tEnd - tStart;
                      if (totalDrivingMinutes + newTripDuration > 480) continue; 
              
                      let minStart = sched.length > 0 ? Math.min(...sched.map(s => s.start), tStart) : tStart;
                      let maxEnd = sched.length > 0 ? Math.max(...sched.map(s => s.end), tEnd) : tEnd;
                      if (maxEnd - minStart > 720) continue;

                      // 廢除兩頭班檢核
                      let isValidContinuous = true;
                      let combinedTrips = [];
                      if (sched.length > 0) {
                          combinedTrips = [...sched, {start: tStart, end: tEnd}].sort((a, b) => a.start - b.start);
                          for (let i = 0; i < combinedTrips.length - 1; i++) {
                              if (combinedTrips[i+1].start - combinedTrips[i].end > 180) { isValidContinuous = false; break; }
                          }
                      } else {
                          combinedTrips = [{start: tStart, end: tEnd}];
                      }
                      if (!isValidContinuous) continue;
                      
                      // ✨ 核心法規升級：連續工作 4.5 小時 (270分) 必須有 >= 30 分鐘的大休
                      let currentBlockStart = combinedTrips[0].start;
                      let isValidBreak = true;
                      for (let i = 0; i < combinedTrips.length - 1; i++) {
                          let gap = combinedTrips[i+1].start - combinedTrips[i].end;
                          if (gap >= 30) { // 遇到 30 分鐘以上大休，結算上一段連續區塊
                              if (combinedTrips[i].end - currentBlockStart > 270) { isValidBreak = false; break; }
                              currentBlockStart = combinedTrips[i+1].start; // 重置區塊起點
                          }
                      }
                      // 檢查最後一個區塊是否超時
                      if (combinedTrips[combinedTrips.length-1].end - currentBlockStart > 270) isValidBreak = false;
                      if (!isValidBreak) continue; 

                      bestDriver = d; break; 
                  }
                  if (bestDriver) {
                      assigned_driver = bestDriver.name; assigned_empid = bestDriver.empId;
                      if (!driverSchedules[bestDriver.empId]) driverSchedules[bestDriver.empId] = [];
                      driverSchedules[bestDriver.empId].push({start: tStart, end: tEnd});
                      changes++; 
                  }
              }
              
              if (assigned_vehicle === "尚未指派" && currentAvailableVehicles.length > 0) {
                  let bestVehicle = null;
                  for (let v of currentAvailableVehicles) {
                      let sched = vehicleSchedules[v.plate] || [];
                      if (!sched.some(s => (tStart < s.end && tEnd > s.start))) { bestVehicle = v; break; }
                  }
                  if (bestVehicle) {
                      assigned_vehicle = bestVehicle.plate;
                      if (!vehicleSchedules[assigned_vehicle]) vehicleSchedules[assigned_vehicle] = [];
                      vehicleSchedules[assigned_vehicle].push({start: tStart, end: tEnd});
                      changes++;
                  }
              }

              if (assigned_driver !== trip.assigned_driver || assigned_vehicle !== trip.assigned_vehicle) {
                  batch.update(doc(db, "daily_dispatches", trip.id), { assigned_driver, assigned_empid, assigned_vehicle });
              }
          }
          
          if (changes > 0) { await batch.commit(); alert(`✨ 智慧調度完成！已指派 ${changes} 個空缺。\n(已通過 4.5H 大休強制檢核)`); } 
          else { alert("目前無符合勞基法規範之駕駛/車輛可供調度。"); }
      });
    }
  // (保持之前的邏輯，僅略過長代碼)
      document.getElementById('btnAutoDispatch').addEventListener('click', async () => { alert('請保留上一階段的 AI 智慧調度程式碼。'); });

  }).catch(err => console.error(err));
</script>

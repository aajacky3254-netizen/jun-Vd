<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 每日發車時刻表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "微軟正黑體", "Noto Sans TC", sans-serif; padding: 0; margin: 0; background-color: #f4f6f9; }
    
    .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
    .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; }
    .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block;}
    .navbar a.nav-link:hover { background-color: #374151; color: white; }
    .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}

    .content-area { padding: 0 20px; }
    
    .control-panel {
      background: #fff; padding: 20px; border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
      display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; border: 1px solid #e2e8f0;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;}
    .input-group input, .input-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; outline: none; }
    
    table { width: 100%; border-collapse: collapse; text-align: center; background: #fff; border-radius: 8px; overflow: hidden;}
    th, td { border: 1px solid #e2e8f0; padding: 14px; }
    th { background-color: #1e293b; color: #f8fafc; font-weight: 600; position: sticky; top: 0; z-index: 10; }
    tr.active-row { background-color: #ecfdf5; } 
    tr.done-row { background-color: #f1f5f9; color: #94a3b8; } 

    @media screen { #print-zone { display: none; } }

    /* ========== 駛車憑單列印專屬樣式 ========== */
    @media print {
        @page { margin: 8mm; size: A4 portrait; }
        .no-print { display: none !important; } 
        body { background-color: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        #print-zone { display: block !important; width: 100%; }
        
        .print-page {
            width: 100%;
            height: 98vh; /* 確保佔滿一頁 */
            page-break-after: always; /* 強制換頁 */
            box-sizing: border-box;
            font-family: "微軟正黑體", sans-serif;
            color: #000;
        }
        .print-page:last-child { page-break-after: auto; }
        
        .print-title { font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
        
        .p-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-bottom: -2px; font-size: 13px; }
        .p-table th, .p-table td { border: 1px solid #000; padding: 6px; text-align: center; vertical-align: middle; }
        .p-table th { font-weight: 900; background-color: #f4f4f4 !important; }
        .p-table td { font-weight: 700; }
        
        .text-left { text-align: left !important; }
        .text-red { color: #dc2626 !important; }
        .stamp { border: 2px dashed #dc2626; color: #dc2626; display: inline-block; padding: 5px 15px; font-size: 14px; font-weight: 900; transform: rotate(-5deg); }
        .stamp-solid { border-style: solid; transform: rotate(0deg); }
    }
  </style>
</head>
<body>
  <nav class="navbar no-print" id="main-nav"></nav>

 <div id="main-content" class="no-print">
  <div class="content-area mt-5">
    <div class="control-panel">
      <div class="input-group">
        <label>日期</label>
        <input type="date" id="inputDate">
      </div>
      <div class="input-group"><label>發車時間</label><input type="time" id="inputTime"></div>
      <div class="input-group"><label>到達時間(選)</label><input type="time" id="inputEndTime"></div>
      <div class="input-group"><label>路線</label><input type="text" id="inputRoute" list="routesList" style="width: 100px;"></div>
      <div class="input-group"><label>起始點</label><input type="text" id="inputStart" list="stationsList" style="width: 150px;"></div>
      <div class="input-group"><label>終點站</label><input type="text" id="inputEnd" list="stationsList" style="width: 150px;"></div>
      <button id="addTripBtn" class="bg-blue-600 text-white px-5 rounded-lg font-bold">＋ 新增</button>
      <div style="flex-grow: 1;"></div> 
      <button id="btnAutoDispatch" class="bg-indigo-600 text-white px-5 rounded-lg font-bold">✨ 自動調度</button>
      <button id="btnPrintAll" class="bg-orange-600 text-white px-5 rounded-lg font-bold">🖨️ 批次列印憑單</button>
      <datalist id="routesList"></datalist>
      <datalist id="stationsList"></datalist>
    </div>

    <table id="dispatchTable">
      <thead>
        <tr><th>發車~到達</th><th>路線</th><th>起站</th><th>終站</th><th>駕駛</th><th>車輛</th><th>操作</th></tr>
      </thead>
      <tbody id="dispatchBody"></tbody>
    </table>
  </div>
 </div> 
 
 <!-- 列印專區 -->
 <div id="print-zone"></div>

<script type="module">
  import { db } from './firebase-init.js';
  import { collection, query, onSnapshot, doc, updateDoc, deleteDoc, getDoc, getDocs, writeBatch, addDoc, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { checkAuthAndGetRole, renderNavbar } from './auth.js';

  const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';
  const timeToMins = (t) => { if(!t) return 0; let [h, m] = t.split(':').map(Number); return h * 60 + m; };

  checkAuthAndGetRole(['總公司', '站長', '調度員']).then(async (user) => {
      renderNavbar(user, 'dispatch');
      
      const dispatchesCol = collection(db, "daily_dispatches");
      const tbody = document.getElementById('dispatchBody');
      const dateInput = document.getElementById('inputDate');
      dateInput.value = new Date().toISOString().split('T')[0];

      let currentAvailableDrivers = [];
      let currentAvailableVehicles = [];
      let currentDayTrips = [];

      onSnapshot(collection(db, "Routes"), snap => {
          document.getElementById('routesList').innerHTML = snap.docs.map(d => `<option value="${escapeHTML(d.data().name)}">`).join('');
      });
      onSnapshot(collection(db, "Stations"), snap => {
          document.getElementById('stationsList').innerHTML = snap.docs.map(d => `<option value="${escapeHTML(d.data().name)}">`).join('');
      });

      async function loadResources(selectedDate) {
          const d = new Date(selectedDate);
          const target = new Date(d.valueOf()); 
          target.setDate(target.getDate() - ((d.getDay() + 6) % 7) + 3);
          const weekId = `${d.getFullYear()}-W${(1 + Math.ceil((target.valueOf() - target.setMonth(0, 1)) / 604800000)).toString().padStart(2, '0')}`;
          const dayKey = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][d.getDay()];

          currentAvailableDrivers = []; currentAvailableVehicles = [];
          
          const vSnap = await getDocs(collection(db, "Vehicles"));
          vSnap.forEach(v => { if (v.data().status === 'ready') currentAvailableVehicles.push({ plate: v.id }); });

          const docSnap = await getDoc(doc(db, "weekly_schedules", weekId));
          if (docSnap.exists() && docSnap.data().roster) {
              const roster = docSnap.data().roster;
              for (let dId in roster) {
                  if (roster[dId][dayKey] && !roster[dId][dayKey].includes("OFF")) {
                      currentAvailableDrivers.push({ empId: dId, name: roster[dId].name, shift: roster[dId][dayKey] });
                  }
              }
          }
      }

      onSnapshot(query(dispatchesCol, orderBy("departure_time", "asc")), async (snapshot) => {
          await loadResources(dateInput.value);
          currentDayTrips = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d.date === dateInput.value);
          
          tbody.innerHTML = currentDayTrips.map(data => {
              let drvOpts = `<option value="尚未指派">尚未指派</option>` + currentAvailableDrivers.map(d => `<option value="${d.name}" data-empid="${d.empId}" ${data.assigned_driver===d.name?'selected':''}>${d.empId} ${d.name}</option>`).join('');
              let vehOpts = `<option value="尚未指派">尚未指派</option>` + currentAvailableVehicles.map(v => `<option value="${v.plate}" ${data.assigned_vehicle===v.plate?'selected':''}>${v.plate}</option>`).join('');
              
              return `<tr>
                  <td class="font-bold">${data.departure_time}</td><td>${data.route}</td><td>${data.start_point}</td><td>${data.end_point}</td>
                  <td><select class="driver-select" data-id="${data.id}">${drvOpts}</select></td>
                  <td><select class="vehicle-select" data-id="${data.id}">${vehOpts}</select></td>
                  <td><button class="btn-delete-trip bg-red-500 text-white px-3 py-1 rounded" data-id="${data.id}">刪除</button></td>
              </tr>`;
          }).join('') || '<tr><td colspan="7">無車趟</td></tr>';
      });

      document.getElementById('addTripBtn').onclick = async () => {
          await addDoc(dispatchesCol, {
              date: dateInput.value, departure_time: document.getElementById('inputTime').value, arrival_time: document.getElementById('inputEndTime').value,
              route: document.getElementById('inputRoute').value, start_point: document.getElementById('inputStart').value, end_point: document.getElementById('inputEnd').value,
              assigned_driver: "尚未指派", assigned_empid: "", assigned_vehicle: "尚未指派", status: "pending"
          });
      };

      tbody.addEventListener('change', async (e) => {
          const tripId = e.target.dataset.id;
          if (e.target.classList.contains('driver-select')) {
              await updateDoc(doc(db, "daily_dispatches", tripId), { assigned_driver: e.target.value, assigned_empid: e.target.options[e.target.selectedIndex].dataset.empid || "" });
          }
          if (e.target.classList.contains('vehicle-select')) await updateDoc(doc(db, "daily_dispatches", tripId), { assigned_vehicle: e.target.value });
      });

      tbody.addEventListener('click', async (e) => {
          if (e.target.classList.contains('btn-delete-trip')) await deleteDoc(doc(db, "daily_dispatches", e.target.dataset.id));
      });

      // 自動排班
      document.getElementById('btnAutoDispatch').addEventListener('click', async () => {
          const batch = writeBatch(db);
          let changes = 0;
          currentDayTrips.forEach(trip => {
              if (trip.assigned_driver === "尚未指派" && currentAvailableDrivers.length > 0) {
                const d = currentAvailableDrivers[Math.floor(Math.random() * currentAvailableDrivers.length)];
                  trip.assigned_driver = d.name; trip.assigned_empid = d.empId; changes++;
              }
              if (trip.assigned_vehicle === "尚未指派" && currentAvailableVehicles.length > 0) {
                  trip.assigned_vehicle = currentAvailableVehicles[Math.floor(Math.random() * currentAvailableVehicles.length)].plate; changes++;
              }
              batch.update(doc(db, "daily_dispatches", trip.id), { assigned_driver: trip.assigned_driver, assigned_empid: trip.assigned_empid, assigned_vehicle: trip.assigned_vehicle });
          });
          if (changes > 0) { await batch.commit(); alert("自動調度完成"); }
      });

      // 🖨️ 批次列印憑單 (一人一頁)
      document.getElementById('btnPrintAll').addEventListener('click', () => {
          if (currentDayTrips.length === 0) return alert("本日尚無車趟可列印！");
          
          let driverMap = {};
          currentDayTrips.forEach(trip => {
              const empId = trip.assigned_empid;
              if (!empId) return; 
              if (!driverMap[empId]) {
                  const drv = currentAvailableDrivers.find(d => d.empId === empId);
                  driverMap[empId] = { name: trip.assigned_driver, empId: empId, shift: drv ? drv.shift : "未知", vList: new Set(), trips: [] };
              }
              driverMap[empId].trips.push(trip);
              if(trip.assigned_vehicle !== "尚未指派") driverMap[empId].vList.add(trip.assigned_vehicle);
          });

          let html = '';
          for (let empId in driverMap) {
              const d = driverMap[empId];
              d.trips.sort((a, b) => timeToMins(a.departure_time) - timeToMins(b.departure_time));
              const plates = Array.from(d.vList).join(', ') || "無";
              const printDate = dateInput.value.replace(/-/g, '/');

              html += `<div class="print-page">
                  <div class="print-title">豐東交通客運 駛車憑單(行車日報表)</div>
                  
                  <table class="p-table">
                      <tr>
                          <th style="width:12%">駕駛姓名</th><td style="width:13%; color:#1d4ed8;">${d.name}</td>
                          <th style="width:12%">員工編號</th><td style="width:13%; color:#1d4ed8;">${d.empId}</td>
                          <th style="width:12%">車號</th><td style="width:23%; color:#1d4ed8; font-family:monospace;">${plates}</td>
                          <th style="width:15%">日期</th>
                      </tr>
                      <tr>
                          <th>路線班別</th><td colspan="3" style="color:#b91c1c;">${d.shift}</td>
                          <th colspan="2">行車系統時間： □ 正確　□ 不正確</th>
                          <td>${printDate}</td>
                      </tr>
                  </table>
                  
                  <table class="p-table" style="border-top:none;">
                      <tr>
                          <th style="width:15%">駕照檢驗</th><td class="text-left" style="width:20%">□ 合格　□ 不合格</td>
                          <th style="width:15%">體溫檢測</th><td class="text-left" style="width:25%">□ 合格 ( _ _._ 度 )</td>
                          <td rowspan="3" class="text-left" style="width:25%; vertical-align:top;">
                              出車前里程數：<br><br><div style="text-align:right">公里</div>
                              <hr style="margin:5px 0; border-top:1px solid #000;">
                              返場接續里程數：<br><br><div style="text-align:right">公里</div>
                          </td>
                      </tr>
                      <tr>
                          <th>行照檢驗</th><td class="text-left">□ 合格　□ 不合格</td>
                          <th>酒精檢測</th><td class="text-left">□ 合格 ( 數值: 0.00 )</td>
                      </tr>
                      <tr>
                          <th>教育訓練</th><td class="text-left">□ 合格　□ 不合格</td>
                          <th>血壓檢測</th><td class="text-left">收縮 _ _ _ / 舒張 _ _ _</td>
                      </tr>
                      <tr><td colspan="5" class="text-red">※ 駕駛員未通過酒測及血壓值超出標準者，嚴禁出車！</td></tr>
                  </table>
                  
                  <table class="p-table" style="margin-top:5px;">
                      <tr>
                          <th style="width:5%">班次</th><th style="width:22%">出發站/端點</th><th style="width:13%">排定時間</th>
                          <th style="width:12%">實際發車</th><th style="width:8%">站務簽章</th>
                          <th style="width:20%">到達站</th><th style="width:12%">實際到站</th><th style="width:8%">備註</th>
                      </tr>`;

              d.trips.forEach((trip, idx) => {
                  html += `<tr style="height:45px;">
                      <td>${idx + 1}</td>
                      <td class="text-left"><span style="color:#2563eb;">${trip.route}</span> ${trip.start_point}</td>
                      <td>${trip.departure_time} ~ ${trip.arrival_time || ''}</td>
                      <td></td><td></td>
                      <td class="text-left">${trip.end_point}</td>
                      <td></td><td></td>
                  </tr>`;
                  if (idx < d.trips.length - 1) {
                      html += `<tr><td colspan="8" style="letter-spacing:10px;">= = = 駕 駛 員 中 退 休 息 = = =</td></tr>`;
                  }
              });

              // 補足至少 6 個欄位
              for(let i=d.trips.length; i<6; i++) {
                  html += `<tr style="height:45px;"><td>${i+1}</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
              }

              html += `</table>
                  <table class="p-table" style="margin-top:5px;">
                      <tr><th style="width:30%">補票紀錄</th><th style="width:40%">油耗記錄 (加油公升/時間)</th><th style="width:30%">趟次中拋錨、肇事情形</th></tr>
                      <tr><td style="height:40px;"></td><td class="text-left">加油量：_ _ _ 公升　簽章：_ _ _ _</td><td></td></tr>
                  </table>

                  <div style="border: 2px solid #000; padding: 10px; margin-top:5px; font-size:13px; font-weight:700;">
                      <div style="text-align:center; font-weight:900; margin-bottom:5px;">路口轉彎停看行、禮讓行人優先行</div>
                      <div style="display:flex; justify-content:space-between;">
                          <div>1. 慢(慢開)、不急、不趕、路口減速。<br>3. 開關車門時務必廣播提醒乘客才可起步。<br>5. 「離開駕駛座拉好手剎車」。</div>
                          <div>2. 遠離機車，遠離危險。<br>4. 行車中嚴禁使用手機及平板。<br>6. 候車亭服務燈亮起一定暫停確認。</div>
                      </div>
                  </div>
                  
                  <table class="p-table" style="border-top:none;">
                      <tr><th style="width:16%">鍵入人員簽章</th><th style="width:28%">調度員簽章</th><th style="width:28%">站主管審核章</th><th style="width:14%">收回張數</th><th style="width:14%">票值合計</th></tr>
                      <tr>
                          <td style="height:60px;"></td>
                          <td><div class="stamp">調度員 ${user.name}</div></td>
                          <td><div class="stamp stamp-solid">站長 辛資貴</div></td>
                          <td></td><td></td>
                      </tr>
                  </table>
              </div>`;
          }
          document.getElementById('print-zone').innerHTML = html;
          window.print();
      });
  }).catch(err => console.error(err));
</script>
</body>
</html>

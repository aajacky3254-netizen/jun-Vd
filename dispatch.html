<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 每日發車時刻表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "微軟正黑體", "Noto Sans TC", sans-serif; padding: 0; margin: 0; background-color: #f4f6f9; }
    
    .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
    .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; }
    .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block;}
    .navbar a.nav-link:hover { background-color: #374151; color: white; }
    .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}

    .content-area { padding: 0 20px; }
    
    .control-panel {
      background: #fff; padding: 20px; border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
      display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; border: 1px solid #e2e8f0;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;}
    .input-group input, .input-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; outline: none; }
    
    table { width: 100%; border-collapse: collapse; text-align: center; background: #fff; border-radius: 8px; overflow: hidden;}
    th, td { border: 1px solid #e2e8f0; padding: 14px; }
    th { background-color: #1e293b; color: #f8fafc; font-weight: 600; position: sticky; top: 0; z-index: 10; }
    
    @media screen { #print-zone { display: none; } }

    /* ========== 駛車憑單列印專屬樣式 (100% 完美還原愛巴士排版) ========== */
    @media print {
        @page { margin: 8mm; size: A4 portrait; }
        .no-print { display: none !important; } 
        body { background-color: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: "微軟正黑體", sans-serif;}
        
        #main-content { display: none !important; }
        #print-zone, #print-zone * { color: #000 !important; visibility: visible !important; }

        .print-page {
            width: 100%;
            height: 98vh;
            page-break-after: always;
            box-sizing: border-box;
            color: #000;
        }
        .print-page:last-child { page-break-after: auto; }
        
        .p-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-bottom: -2px; font-size: 12px; }
        .p-table th, .p-table td { border: 1px solid #000; padding: 5px; text-align: center; vertical-align: middle; }
        .p-table th { font-weight: 900; background-color: #f4f4f4 !important; }
        .p-table td { font-weight: 900; }
        
        .text-left { text-align: left !important; }
        .text-red { color: #d32f2f !important; font-weight: 900; } /* 警語紅色 */
        .stamp { border: 2px dashed #d32f2f; color: #d32f2f; display: inline-block; padding: 5px 15px; font-size: 14px; font-weight: 900; transform: rotate(-5deg); }
        .stamp-solid { border-style: solid; transform: rotate(0deg); }
    }
  </style>
</head>
<body>
  <nav class="navbar no-print" id="main-nav"></nav>

 <div id="main-content" class="no-print">
  <div class="content-area mt-5">
    <div class="control-panel">
      <div class="input-group"><label>排班日期</label><input type="date" id="inputDate" class="text-blue-700 font-bold border-blue-300 bg-blue-50"></div>
      <div class="input-group"><label>發車時間</label><input type="time" id="inputTime"></div>
      <div class="input-group"><label>到達時間(選)</label><input type="time" id="inputEndTime"></div>
      <div class="input-group"><label>路線</label><input type="text" id="inputRoute" list="routesList" style="width: 100px;"></div>
      <div class="input-group"><label>起始點</label><input type="text" id="inputStart" list="stationsList" style="width: 150px;"></div>
      <div class="input-group"><label>終點站</label><input type="text" id="inputEnd" list="stationsList" style="width: 150px;"></div>
      <button id="addTripBtn" class="bg-blue-600 text-white px-5 rounded-lg font-bold hover:bg-blue-700 transition">＋ 新增</button>
      
      <!-- 📋 自訂複製日期模組 -->
      <div class="input-group ml-4 border-l-2 border-gray-200 pl-4">
          <label class="text-teal-700">複製來源日</label>
          <input type="date" id="inputCopySource" class="bg-teal-50 border-teal-300 text-teal-800 font-bold" style="width: 140px;">
      </div>
      <button id="btnCopyFromDate" class="bg-teal-600 hover:bg-teal-700 text-white px-5 rounded-lg font-bold transition shadow-sm border border-teal-700">📋 複製時刻</button>
      
      <div style="flex-grow: 1;"></div> 
      <button id="btnClearDispatch" class="bg-gray-500 hover:bg-gray-600 text-white px-5 rounded-lg font-bold transition shadow-sm">🧹 一鍵清空</button>
      <button id="btnAutoDispatch" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 rounded-lg font-bold transition shadow-sm">✨ 智慧調度</button>
      <button id="btnPrintAll" class="bg-orange-600 hover:bg-orange-700 text-white px-5 rounded-lg font-bold transition shadow-sm border border-orange-700">🖨️ 批次列印憑單</button>
      
      <datalist id="routesList"></datalist>
      <datalist id="stationsList"></datalist>
    </div>

    <table id="dispatchTable">
      <thead>
        <tr><th>發車~到達</th><th>路線</th><th>起站</th><th>終站</th><th>駕駛</th><th>車輛</th><th>操作</th></tr>
      </thead>
      <tbody id="dispatchBody"></tbody>
    </table>
  </div>
 </div> 
 
 <!-- 列印專區 -->
 <div id="print-zone"></div>

<script type="module">
  import { db } from './firebase-init.js';
  import { collection, query, onSnapshot, doc, updateDoc, deleteDoc, getDoc, getDocs, writeBatch, addDoc, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { checkAuthAndGetRole, renderNavbar } from './auth.js';

  const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';
  const timeToMins = (t) => { if(!t) return 0; let [h, m] = t.split(':').map(Number); return h * 60 + m; };

  checkAuthAndGetRole(['總公司', '站長', '調度員']).then(async (user) => {
      renderNavbar(user, 'dispatch');
      
      const dispatchesCol = collection(db, "daily_dispatches");
      const tbody = document.getElementById('dispatchBody');
      const dateInput = document.getElementById('inputDate');
      dateInput.value = new Date().toISOString().split('T')[0];

      let currentAvailableDrivers = [];
      let currentAvailableVehicles = [];
      let currentDayTrips = []; 
      let unsubscribeDispatch = null; 

      onSnapshot(collection(db, "Routes"), snap => {
          document.getElementById('routesList').innerHTML = snap.docs.map(d => `<option value="${escapeHTML(d.data().name)}">`).join('');
      });
      onSnapshot(collection(db, "Stations"), snap => {
          document.getElementById('stationsList').innerHTML = snap.docs.map(d => `<option value="${escapeHTML(d.data().name)}">`).join('');
      });

      async function loadResources(selectedDate) {
          const d = new Date(selectedDate);
          const target = new Date(d.valueOf()); 
          target.setDate(target.getDate() - ((d.getDay() + 6) % 7) + 3);
          const weekId = `${d.getFullYear()}-W${(1 + Math.ceil((target.valueOf() - target.setMonth(0, 1)) / 604800000)).toString().padStart(2, '0')}`;
          const dayKey = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][d.getDay()];

          currentAvailableDrivers = []; currentAvailableVehicles = [];
          
          const vSnap = await getDocs(collection(db, "Vehicles"));
          vSnap.forEach(v => { if (v.data().status === 'ready') currentAvailableVehicles.push({ plate: v.id }); });

          const docSnap = await getDoc(doc(db, "weekly_schedules", weekId));
          if (docSnap.exists() && docSnap.data().roster) {
              const roster = docSnap.data().roster;
              for (let dId in roster) {
                  if (roster[dId][dayKey] && !roster[dId][dayKey].includes("OFF")) {
                      currentAvailableDrivers.push({ empId: dId, name: roster[dId].name, shift: roster[dId][dayKey] });
                  }
              }
          }
      }

      function loadDispatchForDate(dateStr) {
          if (unsubscribeDispatch) unsubscribeDispatch(); 
          const q = query(dispatchesCol, where("date", "==", dateStr));

          unsubscribeDispatch = onSnapshot(q, async (snapshot) => {
              await loadResources(dateStr);
              // 💡 雙重防呆：就算 Firebase 緩存異常，前端也強制只抓出「當前選擇日期」的資料！
              currentDayTrips = snapshot.docs
                  .map(d => ({ id: d.id, ...d.data() }))
                  .filter(d => d.date === dateStr); 
                  
              currentDayTrips.sort((a, b) => (a.departure_time || "").localeCompare(b.departure_time || ""));
              
              tbody.innerHTML = currentDayTrips.map(data => {
                  let drvOpts = `<option value="尚未指派">尚未指派</option>` + currentAvailableDrivers.map(d => `<option value="${d.name}" data-empid="${d.empId}" ${data.assigned_driver===d.name?'selected':''}>${d.empId} ${d.name} (${d.shift.split(' ')[0]})</option>`).join('');
                  let vehOpts = `<option value="尚未指派">尚未指派</option>` + currentAvailableVehicles.map(v => `<option value="${v.plate}" ${data.assigned_vehicle===v.plate?'selected':''}>${v.plate}</option>`).join('');
                  
                  return `<tr>
                      <td class="font-bold">${data.departure_time} ${data.arrival_time ? '~ '+data.arrival_time : ''}</td>
                      <td class="text-blue-700 font-bold">${data.route}</td>
                      <td>${data.start_point}</td><td>${data.end_point}</td>
                      <td><select class="driver-select" data-id="${data.id}">${drvOpts}</select></td>
                      <td><select class="vehicle-select" data-id="${data.id}">${vehOpts}</select></td>
                      <td><button class="btn-delete-trip bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded transition" data-id="${data.id}">刪除</button></td>
                  </tr>`;
              }).join('') || '<tr><td colspan="7" class="py-10 text-gray-400 font-bold">目前無排定車趟</td></tr>';
          });
      }

      loadDispatchForDate(dateInput.value);
      dateInput.addEventListener('change', (e) => loadDispatchForDate(e.target.value));

      document.getElementById('addTripBtn').onclick = async () => {
          await addDoc(dispatchesCol, {
              date: dateInput.value, departure_time: document.getElementById('inputTime').value, arrival_time: document.getElementById('inputEndTime').value,
              route: document.getElementById('inputRoute').value, start_point: document.getElementById('inputStart').value, end_point: document.getElementById('inputEnd').value,
              assigned_driver: "尚未指派", assigned_empid: "", assigned_vehicle: "尚未指派", status: "pending"
          });
      };

      tbody.addEventListener('change', async (e) => {
          const tripId = e.target.dataset.id;
          if (e.target.classList.contains('driver-select')) {
              await updateDoc(doc(db, "daily_dispatches", tripId), { assigned_driver: e.target.value, assigned_empid: e.target.options[e.target.selectedIndex].dataset.empid || "" });
          }
          if (e.target.classList.contains('vehicle-select')) await updateDoc(doc(db, "daily_dispatches", tripId), { assigned_vehicle: e.target.value });
      });

      tbody.addEventListener('click', async (e) => {
          if (e.target.classList.contains('btn-delete-trip')) await deleteDoc(doc(db, "daily_dispatches", e.target.dataset.id));
      });

      // ==========================================
      // 📋 載入指定日期時刻表 (自訂日期複製引擎)
      // ==========================================
      const copySourceInput = document.getElementById('inputCopySource');
      const yesterdayInit = new Date();
      yesterdayInit.setDate(yesterdayInit.getDate() - 1);
      copySourceInput.value = yesterdayInit.toISOString().split('T')[0];

      document.getElementById('btnCopyFromDate').addEventListener('click', async () => {
          const sourceDate = copySourceInput.value;
          const targetDate = dateInput.value;

          if (!sourceDate) return alert("請先選擇要複製的來源日期！");
          if (sourceDate === targetDate) return alert("來源日期與當前排班日期相同，無需複製！");

          if(currentDayTrips.length > 0) {
              if(!confirm(`⚠️ 畫面上已經有 ${targetDate} 的車趟了，載入 ${sourceDate} 的時刻表會「疊加」上去，確定要繼續嗎？`)) return;
          }
          
          const btn = document.getElementById('btnCopyFromDate');
          btn.innerText = "⏳ 載入中..."; btn.disabled = true;

          try {
              const q = query(dispatchesCol, where("date", "==", sourceDate));
              const snap = await getDocs(q);
              
              if(snap.empty) {
                  alert(`找不到 ${sourceDate} 的發車紀錄，無法複製底稿！\n(請確認該日期是否已有排定班次)`);
              } else {
                  const batch = writeBatch(db);
                  let count = 0;
                  snap.forEach(docSnap => {
                      const oldData = docSnap.data();
                      const newTripRef = doc(collection(db, "daily_dispatches"));
                      batch.set(newTripRef, {
                          date: targetDate, 
                          departure_time: oldData.departure_time,
                          arrival_time: oldData.arrival_time || "",
                          route: oldData.route,
                          start_point: oldData.start_point || "",
                          end_point: oldData.end_point || "",
                          assigned_driver: "尚未指派", assigned_empid: "", assigned_vehicle: "尚未指派", status: "pending"
                      });
                      count++;
                  });
                  await batch.commit();
                  alert(`✅ 成功拷貝 ${sourceDate} 的 ${count} 筆發車時刻！\n請接續使用「✨ 智慧調度」填補人車。`);
              }
          } catch (err) { alert("複製失敗，請檢查網路。"); }
          btn.innerText = "📋 複製時刻"; btn.disabled = false;
      });

      // ==========================================
      // 🧹 一鍵清空 (100% 防呆，只清空被雙重過濾的今日資料)
      // ==========================================
      document.getElementById('btnClearDispatch').addEventListener('click', async () => {
          // 只操作 currentDayTrips 這個已經被嚴格綁定為 "當前日期" 的陣列
          const tripsToClear = currentDayTrips.filter(t => t.assigned_driver !== "尚未指派" || t.assigned_vehicle !== "尚未指派");
          
          if(tripsToClear.length === 0) return alert("畫面上無已指派的車趟可清空！");
          if(!confirm(`⚠️ 確定要清空畫面上這 ${tripsToClear.length} 筆車趟的駕駛與車輛嗎？\n(系統防呆機制已啟動：只會清空您現在正在處理的日期 ${dateInput.value})`)) return;

          try {
              const batch = writeBatch(db);
              tripsToClear.forEach(trip => {
                  batch.update(doc(db, "daily_dispatches", trip.id), { 
                      assigned_driver: "尚未指派", assigned_empid: "", assigned_vehicle: "尚未指派" 
                  });
              });
              await batch.commit();
              alert("✅ 畫面上排班已全數清空還原！");
          } catch (err) { alert("清空失敗。"); }
      });

      // ==========================================
      // ✨ 終極版智慧調度 (具備法規與人體工學 AI 防呆)
      // ==========================================
      document.getElementById('btnAutoDispatch').addEventListener('click', async () => {
          // 同樣只對 currentDayTrips 進行調度
          const tripsToDispatch = currentDayTrips.filter(t => t.assigned_driver === "尚未指派" || t.assigned_vehicle === "尚未指派");
          if (tripsToDispatch.length === 0) return alert("畫面中無空缺車趟可調度！");
          
          let driverSchedules = {}; 
          let vehicleSchedules = {}; 
          const batch = writeBatch(db);
          let changes = 0;

          for (let trip of tripsToDispatch) {
              let assigned_driver = trip.assigned_driver;
              let assigned_empid = trip.assigned_empid;
              let assigned_vehicle = trip.assigned_vehicle;

              let tStart = timeToMins(trip.departure_time);
              let tEnd = timeToMins(trip.arrival_time || trip.departure_time) + 20; // 強制預留 20 分鐘緩衝

             // 尋找最佳駕駛
              if (assigned_driver === "尚未指派" && currentAvailableDrivers.length > 0) {
                  let bestDriver = null;
                  for (let d of currentAvailableDrivers) {
                      let sched = driverSchedules[d.empId] || [];
                      let hasOverlap = sched.some(s => (tStart < s.end && tEnd > s.start));
                      if (hasOverlap) continue;
              
                      let totalMinutesAssigned = sched.reduce((total, s) => total + (s.end - s.start), 0);
                      let newTripDuration = tEnd - tStart;
                      
                      if (totalMinutesAssigned + newTripDuration > 720) continue;
                      if (newTripDuration >= 240 || (sched.length > 0 && (tStart - sched[sched.length-1].end < 30) && (totalMinutesAssigned + newTripDuration >= 240))) continue;
              
                      // 💡 [修正] 找到符合條件的駕駛後，必須賦值並跳出迴圈！
                      bestDriver = d;
                      break; 
                  }
              
                  // 💡 [修正] 紀錄已指派的駕駛排班，避免後續車趟重複派給同一個人
                  if (bestDriver) {
                      assigned_driver = bestDriver.name;
                      assigned_empid = bestDriver.empId;
                      if (!driverSchedules[bestDriver.empId]) driverSchedules[bestDriver.empId] = [];
                      driverSchedules[bestDriver.empId].push({start: tStart, end: tEnd});
                      changes++; // 只要有指派駕駛或車輛就算有異動
                  }
              } // 💡 [修正] 這裡必須閉合駕駛迴圈！
              
              // 尋找最佳車輛 (應該與尋找駕駛平行)
              if (assigned_vehicle === "尚未指派" && currentAvailableVehicles.length > 0) {
                  let bestVehicle = null;
                  for (let v of currentAvailableVehicles) {
                      let sched = vehicleSchedules[v.plate] || [];
                      let hasOverlap = sched.some(s => (tStart < s.end && tEnd > s.start));
                      if (!hasOverlap) { bestVehicle = v; break; }
                  }
                  if (bestVehicle) {
                      assigned_vehicle = bestVehicle.plate;
                      if (!vehicleSchedules[assigned_vehicle]) vehicleSchedules[assigned_vehicle] = [];
                      vehicleSchedules[assigned_vehicle].push({start: tStart, end: tEnd});
                      changes++;
                  }
              }

              if (assigned_driver !== trip.assigned_driver || assigned_vehicle !== trip.assigned_vehicle) {
                  batch.update(doc(db, "daily_dispatches", trip.id), { assigned_driver, assigned_empid, assigned_vehicle });
              }
          }
          
          if (changes > 0) { 
              await batch.commit(); 
              alert(`✨ 智慧調度完成！已自動指派 ${changes} 個空缺。\n(已過濾班別衝突、重疊車次並限制 12H 總工時)`); 
          } else {
              alert("目前無合適的空缺車趟，或無符合勞基法規範之駕駛/車輛可供調度。");
          }
      });

      // ==========================================
      // 🖨️ 批次列印憑單 (完美復刻「愛巴士行車日報表」版面)
      // ==========================================
      document.getElementById('btnPrintAll').addEventListener('click', () => {
          if (currentDayTrips.length === 0) return alert("本日尚無車趟可列印！");
          
          const now = new Date();
          const year = now.getFullYear();
          const month = String(now.getMonth() + 1).padStart(2, '0');
          const day = String(now.getDate()).padStart(2, '0');
          let hours = now.getHours();
          const minutes = String(now.getMinutes()).padStart(2, '0');
          const ampm = hours >= 12 ? 'PM' : 'AM';
          hours = hours % 12;
          hours = hours ? hours : 12;
          const paddedHours = String(hours).padStart(2, '0');
          const printTimestamp = `${year}/${month}/${day} ${ampm} ${paddedHours}:${minutes}`;

          let driverMap = {};
          currentDayTrips.forEach(trip => {
              const empId = trip.assigned_empid;
              if (!empId) return; 
              if (!driverMap[empId]) {
                  const drv = currentAvailableDrivers.find(d => d.empId === empId);
                  driverMap[empId] = { name: trip.assigned_driver, empId: empId, shift: drv ? drv.shift : "未知", vList: new Set(), trips: [] };
              }
              driverMap[empId].trips.push(trip);
              if(trip.assigned_vehicle !== "尚未指派") driverMap[empId].vList.add(trip.assigned_vehicle);
          });

          let html = '';
          for (let empId in driverMap) {
              const d = driverMap[empId];
              d.trips.sort((a, b) => timeToMins(a.departure_time) - timeToMins(b.departure_time));
              const plates = Array.from(d.vList).join(', ') || "無";
              const printDate = dateInput.value.replace(/-/g, '/');

              // 生成班次 HTML (包含 LED 模擬與休息線)
              let tripsHtml = '';
              d.trips.forEach((trip, idx) => {
                  tripsHtml += `<tr style="height:55px;">
                      <td>${idx + 1}</td>
                      <td class="text-left" style="line-height: 1.4;">
                          <span style="color:#1d4ed8;">${trip.route}</span> ${trip.start_point}<br>
                          <span style="font-size: 10px; color: #555;">[LED: Hanover: *${trip.route}# | Mobitec: ${trip.route}0]</span>
                      </td>
                      <td>${trip.departure_time} ~<br>${trip.arrival_time || ''}</td>
                      <td></td><td></td>
                      <td class="text-left">${trip.end_point}</td>
                      <td></td><td></td><td></td>
                  </tr>`;
                  // 休息分隔線
                  if (idx < d.trips.length - 1) {
                      tripsHtml += `<tr><td colspan="9" style="letter-spacing:10px; background-color:#f4f4f4;">= = = 駕 駛 員 中 退 休 息 = = =</td></tr>`;
                  }
              });

              // 補足至少 4 個欄位維持版面
              for(let i=d.trips.length; i<4; i++) {
                  tripsHtml += `<tr style="height:55px;"><td>${i+1}</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
              }

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車輛調度系統 - 視覺化時間軸控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 模擬 The Bus 深色硬核介面 */
    body { background-color: #0f172a; color: #e2e8f0; font-family: "Noto Sans TC", "微軟正黑體", sans-serif; overflow: hidden; display: none; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    
    .navbar { background-color: #1e293b; display: flex; align-items: center; padding: 0 20px; border-b: 1px solid #334155; height: 60px;}
    .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; }
    .navbar a.nav-link { color: #94a3b8; padding: 0 15px; text-decoration: none; font-size: 14px; transition: 0.3s; line-height: 60px; }
    .navbar a.nav-link:hover { color: white; }
    .navbar a.nav-link.active { border-bottom: 3px solid #3b82f6; color: #fff; font-weight: bold; }

    /* 時間軸背景格線 (24小時切分) */
    .timeline-grid { 
        background-image: linear-gradient(to right, #334155 1px, transparent 1px); 
        background-size: 4.1666% 100%; 
    }
    
    /* 軌道與區塊 */
    .trip-track { border-bottom: 1px solid #1e293b; height: 70px; display: flex; align-items: center; position: relative; }
    .trip-track:hover { background-color: #1e293b; }
    
    .trip-block { 
        position: absolute; height: 44px; top: 13px; border-radius: 6px;
        background-color: #14b8a6; /* The Bus 的青綠色 */
        display: flex; flex-direction: column; justify-content: center; padding: 0 10px; color: #042f2e;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); transition: all 0.2s; overflow: hidden; border: 1px solid #0d9488;
    }
    .trip-block.assigned { background-color: #0d9488; color: #ccfbf1; } /* 已指派的顏色 */
    .trip-block.drag-over { border: 2px dashed #facc15; transform: scale(1.02); filter: brightness(1.2); }
    
    /* 資源卡片 */
    .resource-card { cursor: grab; transition: transform 0.1s, border-color 0.2s; user-select: none; }
    .resource-card:active { cursor: grabbing; transform: scale(0.96); opacity: 0.8; }
    .resource-card:hover { border-color: #3b82f6; }
    
    /* 隱藏列印區域 */
    @media screen { #print-zone { display: none; } }
    @media print {
        body * { visibility: hidden; }
        #print-zone, #print-zone * { visibility: visible; }
        #print-zone { position: absolute; left: 0; top: 0; width: 100%; display: block !important; }
    }
  </style>
</head>
<body class="flex flex-col h-screen">

  <nav class="navbar" id="main-nav">
    <a href="index.html" class="navbar-brand">🚌 視覺化調度系統</a>
    <a href="schedule.html" class="nav-link">🗓️ 週班表管理</a>
    <a href="dispatch.html" class="nav-link active">🚦 每日發車控制台</a>
    <a href="drivers.html" class="nav-link">👨‍✈️ 人事管理系統</a>
    <a href="vehicles.html" class="nav-link">🚍 車輛資訊系統</a>
  </nav>

  <!-- 頂部控制列 -->
  <div class="bg-gray-900 p-3 flex gap-3 items-center border-b border-gray-700 text-sm">
    <input type="date" id="inputDate" class="bg-gray-800 border border-gray-600 text-white rounded px-3 py-1.5 outline-none font-bold">
    <div class="h-6 w-px bg-gray-700 mx-2"></div>
    <input type="time" id="inputTime" class="bg-gray-800 border border-gray-600 text-white rounded px-2 py-1 outline-none">
    <input type="text" id="inputRoute" placeholder="路線" class="bg-gray-800 border border-gray-600 text-white rounded px-2 py-1 w-20 outline-none">
    <input type="text" id="inputStart" placeholder="起站" class="bg-gray-800 border border-gray-600 text-white rounded px-2 py-1 w-28 outline-none">
    <span class="text-gray-500">➔</span>
    <input type="text" id="inputEnd" placeholder="終站" class="bg-gray-800 border border-gray-600 text-white rounded px-2 py-1 w-28 outline-none">
    <button id="addTripBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded font-bold transition">＋ 新增</button>
    
    <div class="flex-grow"></div>
    
    <button id="btnClearAssign" class="bg-red-900/50 hover:bg-red-800 text-red-400 border border-red-800 px-3 py-1.5 rounded font-bold transition">一鍵清除</button>
    <button id="btnAutoDispatch" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded font-bold transition shadow-[0_0_10px_rgba(79,70,229,0.5)]">✨ 智慧調度</button>
    <button id="btnPrintAll" class="bg-orange-600 hover:bg-orange-500 text-white px-3 py-1.5 rounded font-bold transition">🖨️ 列印</button>
  </div>

  <!-- 主畫面：分割左右 -->
  <div class="flex flex-1 overflow-hidden relative">
      
    <!-- === 左側：時間軸與車趟區 (75%) === -->
    <main class="w-3/4 flex flex-col bg-slate-900 relative">
        <!-- 頂部時間刻度 -->
        <div class="flex text-[10px] text-gray-400 border-b border-gray-700 py-1 pl-48 bg-slate-800 font-mono">
            <div class="flex-1 flex justify-between px-1">
                <span>00</span><span>01</span><span>02</span><span>03</span><span>04</span><span>05</span><span>06</span><span>07</span><span>08</span><span>09</span><span>10</span><span>11</span><span>12</span><span>13</span><span>14</span><span>15</span><span>16</span><span>17</span><span>18</span><span>19</span><span>20</span><span>21</span><span>22</span><span>23</span>
            </div>
        </div>

        <!-- 軌道區 -->
        <div class="flex-1 overflow-y-auto timeline-grid" id="timelineBody">
            <!-- JavaScript 動態生成車趟軌道 -->
            <div class="flex items-center justify-center h-full text-gray-500 font-bold">載入中...</div>
        </div>
    </main>

    <!-- === 右側：資源池 (25%) === -->
    <aside class="w-1/4 bg-slate-800 flex flex-col border-l border-gray-700 shadow-xl z-10">
        <!-- 頁籤切換 -->
        <div class="flex text-sm font-bold">
            <button id="tabDrivers" class="flex-1 py-3 bg-slate-700 text-blue-400 border-b-2 border-blue-500">👨‍✈️ 待命駕駛</button>
            <button id="tabVehicles" class="flex-1 py-3 bg-slate-900 text-gray-400 hover:text-white border-b-2 border-transparent">🚍 可用車輛</button>
        </div>

        <!-- 司機列表 -->
        <div id="poolDrivers" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
        
        <!-- 車輛列表 -->
        <div id="poolVehicles" class="flex-1 overflow-y-auto p-3 space-y-2 hidden"></div>
    </aside>

  </div>

  <div id="print-zone"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, setDoc, query, where, orderBy, onSnapshot, doc, getDoc, getDocs, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js'; 

    const allowedRoles = ['SuperAdmin', 'StationManager', '調度員'];

    checkAuthAndGetRole(allowedRoles).then((user) => {
        document.body.style.display = 'flex';
        const nav = document.querySelector('.navbar');
        nav.innerHTML += `<div class="ml-auto flex items-center gap-4 text-white font-bold px-4"><span class="text-xs bg-slate-700 px-3 py-1 rounded-full border border-slate-600">👤 ${user.name}</span><button id="btnLogout" class="text-gray-400 hover:text-red-500 transition">登出</button></div>`;
        document.getElementById('btnLogout').addEventListener('click', logout);

        const app = initializeApp({
          apiKey: "AIzaSyAnhhaiWXn5KFtU1YdB0oR_S9E0qhAlJuI", authDomain: "jun-bus-dispatch.firebaseapp.com", projectId: "jun-bus-dispatch"
        });
        const db = getFirestore(app);
        
        const dispatchesCol = collection(db, "daily_dispatches");
        const dateInput = document.getElementById('inputDate');
        dateInput.value = new Date().toISOString().split('T')[0];

        let currentAvailableDrivers = [];
        let currentAvailableVehicles = [];
        let currentDayTrips = [];
        let unsubscribeDispatch = null;

        // 頁籤切換邏輯
        const tabD = document.getElementById('tabDrivers');
        const tabV = document.getElementById('tabVehicles');
        const poolD = document.getElementById('poolDrivers');
        const poolV = document.getElementById('poolVehicles');

        tabD.addEventListener('click', () => {
            tabD.className = "flex-1 py-3 bg-slate-700 text-blue-400 border-b-2 border-blue-500";
            tabV.className = "flex-1 py-3 bg-slate-900 text-gray-400 hover:text-white border-b-2 border-transparent";
            poolD.classList.remove('hidden'); poolV.classList.add('hidden');
        });
        tabV.addEventListener('click', () => {
            tabV.className = "flex-1 py-3 bg-slate-700 text-emerald-400 border-b-2 border-emerald-500";
            tabD.className = "flex-1 py-3 bg-slate-900 text-gray-400 hover:text-white border-b-2 border-transparent";
            poolV.classList.remove('hidden'); poolD.classList.add('hidden');
        });

        // 核心：時間轉 X 軸百分比算法 (一天1440分鐘)
        function timeToPercent(timeStr) {
            if(!timeStr) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return ((h * 60 + m) / 1440) * 100;
        }

        async function loadResources(selectedDate) {
            const d = new Date(selectedDate);
            const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            const target = new Date(d.valueOf());
            target.setDate(target.getDate() - ((d.getDay() + 6) % 7) + 3);
            const firstThu = target.valueOf();
            target.setMonth(0, 1);
            if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
            const weekId = `${d.getFullYear()}-W${(1 + Math.ceil((firstThu - target) / 604800000)).toString().padStart(2, '0')}`;
            const dayKey = days[d.getDay()];

            // 抓駕駛
            currentAvailableDrivers = []; 
            try {
                const docSnap = await getDoc(doc(db, "weekly_schedules", weekId));
                if (docSnap.exists() && docSnap.data().roster) {
                    const roster = docSnap.data().roster;
                    for (let driverId in roster) {
                        const shift = roster[driverId][dayKey];
                        if (shift && shift !== "OFF" && shift !== "OFF (休)") {
                            currentAvailableDrivers.push({ empId: driverId, name: roster[driverId].name, shift: shift });
                        }
                    }
                }
            } catch (e) {}

            // 抓車輛
            currentAvailableVehicles = [];
            try {
                const snapshot = await getDocs(collection(db, "Vehicles"));
                snapshot.forEach(docSnap => {
                    const v = docSnap.data();
                    if (v.status === 'ready') currentAvailableVehicles.push({ plate: v.plate_number || docSnap.id, model: v.model });
                });
            } catch (e) {}
            
            renderResourcePool();
        }

        function renderResourcePool() {
            poolD.innerHTML = '';
            currentAvailableDrivers.forEach(d => {
                poolD.innerHTML += `
                    <div class="resource-card bg-slate-700 border border-slate-600 rounded p-2.5 flex items-center gap-3" draggable="true" data-type="driver" data-name="${d.name}" data-empid="${d.empId}">
                        <div class="bg-blue-500/20 text-blue-400 p-2 rounded text-lg">👨‍✈️</div>
                        <div>
                            <div class="font-bold text-sm text-white">${d.empId} ${d.name}</div>
                            <div class="text-xs text-blue-300">${d.shift}</div>
                        </div>
                    </div>`;
            });

            poolV.innerHTML = '';
            currentAvailableVehicles.forEach(v => {
                poolV.innerHTML += `
                    <div class="resource-card bg-slate-700 border border-slate-600 rounded p-2.5 flex items-center gap-3" draggable="true" data-type="vehicle" data-plate="${v.plate}">
                        <div class="bg-emerald-500/20 text-emerald-400 p-2 rounded text-lg">🚍</div>
                        <div>
                            <div class="font-bold text-sm text-white">${v.plate}</div>
                            <div class="text-xs text-emerald-300 truncate w-40">${v.model}</div>
                        </div>
                    </div>`;
            });

            // 綁定拖曳起始事件
            document.querySelectorAll('.resource-card').forEach(card => {
                card.addEventListener('dragstart', (e) => {
                    const data = { type: card.dataset.type };
                    if(data.type === 'driver') { data.name = card.dataset.name; data.empid = card.dataset.empid; }
                    else { data.plate = card.dataset.plate; }
                    e.dataTransfer.setData('application/json', JSON.stringify(data));
                    e.dataTransfer.effectAllowed = 'copy';
                });
            });
        }

        async function listenToDispatches(selectedDate) {
            await loadResources(selectedDate);
            if (unsubscribeDispatch) unsubscribeDispatch();

            unsubscribeDispatch = onSnapshot(query(dispatchesCol, where("date", "==", selectedDate), orderBy("departure_time", "asc")), (snapshot) => {
                const timeline = document.getElementById('timelineBody');
                timeline.innerHTML = ''; currentDayTrips = []; 

                if (snapshot.empty) { timeline.innerHTML = '<div class="flex items-center justify-center h-full text-gray-500 font-bold">本日無車趟</div>'; return; }
                snapshot.forEach(docSnap => currentDayTrips.push({ id: docSnap.id, ...docSnap.data() }));

                currentDayTrips.forEach(data => {
                    const leftPercent = timeToPercent(data.departure_time);
                    // 視覺化區塊寬度：預設畫 90 分鐘 (約 6.25%)
                    const widthPercent = (90 / 1440) * 100;
                    
                    const isAssigned = (data.assigned_driver !== "尚未指派" && data.assigned_vehicle !== "尚未指派");
                    const blockClass = isAssigned ? "trip-block assigned" : "trip-block";
                    
                    const driverText = data.assigned_driver === "尚未指派" ? "👤 需指派駕駛" : `👤 ${data.assigned_driver}`;
                    const vehText = data.assigned_vehicle === "尚未指派" ? "🚍 需指派車輛" : `🚍 ${data.assigned_vehicle}`;

                    // HTML 軌道結構
                    const trackHtml = `
                        <div class="trip-track group relative drop-zone" data-trip-id="${data.id}">
                            <!-- 左側表頭資訊 -->
                            <div class="w-48 flex-shrink-0 px-3 py-2 flex flex-col justify-center bg-slate-900 border-r border-gray-700 z-10 h-full group-hover:bg-slate-800">
                                <div class="flex items-center gap-2">
                                    <span class="bg-yellow-500/20 text-yellow-400 text-xs px-1.5 rounded font-bold">${data.route}</span>
                                    <span class="text-gray-300 font-mono text-sm">${data.departure_time}</span>
                                </div>
                                <div class="text-[11px] text-gray-500 mt-1 truncate" title="${data.start_point} ➔ ${data.end_point}">${data.start_point} ➔ ${data.end_point}</div>
                            </div>
                            
                            <!-- 絕對定位的車趟時間區塊 -->
                            <div class="${blockClass}" style="left: calc(12rem + ${leftPercent}% * 0.85); width: ${widthPercent}% * 0.85; min-width: 130px;">
                                <div class="text-xs font-bold truncate">${driverText}</div>
                                <div class="text-[10px] opacity-80 truncate">${vehText}</div>
                            </div>
                            
                            <!-- 刪除按鈕 (懸浮顯示) -->
                            <button class="absolute right-4 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition btn-delete" data-id="${data.id}">🗑️</button>
                        </div>`;
                    
                    timeline.insertAdjacentHTML('beforeend', trackHtml);
                });

                bindDropZones();
                
                // 綁定刪除按鈕
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm("確定刪除此車趟？")) await deleteDoc(doc(db, "daily_dispatches", e.target.dataset.id));
                    });
                });
            });
        }

        // === 核心：拖放事件綁定 ===
        function bindDropZones() {
            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault(); // 允許 Drop
                    zone.querySelector('.trip-block').classList.add('drag-over');
                });
                zone.addEventListener('dragleave', e => {
                    zone.querySelector('.trip-block').classList.remove('drag-over');
                });
                zone.addEventListener('drop', async e => {
                    e.preventDefault();
                    zone.querySelector('.trip-block').classList.remove('drag-over');
                    
                    try {
                        const tripId = zone.dataset.tripId;
                        const data = JSON.parse(e.dataTransfer.getData('application/json'));
                        
                        let payload = {};
                        if(data.type === 'driver') {
                            payload = { assigned_driver: data.name, assigned_empid: data.empid };
                        } else if (data.type === 'vehicle') {
                            payload = { assigned_vehicle: data.plate };
                        }
                        
                        // 寫入 Firebase，畫面會透過 onSnapshot 自動更新
                        await updateDoc(doc(db, "daily_dispatches", tripId), payload);
                    } catch(err) { console.error("指派失敗", err); }
                });
            });
        }

        // 新增車趟 (維持原邏輯)
        document.getElementById('addTripBtn').addEventListener('click', async () => {
            const date = dateInput.value;
            const time = document.getElementById('inputTime').value;
            const route = document.getElementById('inputRoute').value.trim();
            const start = document.getElementById('inputStart').value.trim();
            const end = document.getElementById('inputEnd').value.trim();
            if (!time || !route || !start) return alert("請填寫時間、路線與起點！");  

            await addDoc(dispatchesCol, { date, departure_time: time, route, start_point: start, end_point: end, assigned_driver: "尚未指派", assigned_empid: "", assigned_vehicle: "尚未指派", status: "pending" });
            document.getElementById('inputTime').value = ''; document.getElementById('inputRoute').value = ''; document.getElementById('inputStart').value = ''; document.getElementById('inputEnd').value = '';
        });

        dateInput.addEventListener('change', e => listenToDispatches(e.target.value));
        listenToDispatches(dateInput.value);

        // (智慧調度與列印的邏輯，為了確保架構完整，您可以直接貼上先前回答中對 btnAutoDispatch 與 btnPrintAll 的寫法，完全相容此資料結構)

    }).catch((err) => console.error("驗證失敗或未登入", err));
</script>
</body>
</html>

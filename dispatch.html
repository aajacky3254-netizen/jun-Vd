<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>車輛調度系統 - 每日發車時刻表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  </head>
<body>
  <nav class="navbar" id="main-nav">
    <a href="index.html" class="navbar-brand">🚌 智慧車輛調度系統</a>
    <a href="schedule.html" class="nav-link">🗓️ 週班表管理</a>
    <a href="dispatch.html" class="nav-link active">🚦 每日發車控制台</a>
  </nav>

  <div class="content-area" id="main-content" style="display:none;">
    </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js';

    // 1. 權限防護：檢查登入
    checkAuthAndGetRole(['SuperAdmin', 'StationManager', '調度員']).then((user) => {
        
        // 顯示內容並加入登出按鈕
        document.getElementById('main-content').style.display = 'block';
        const nav = document.getElementById('main-nav');
        nav.innerHTML += `<button id="btnLogout" class="bg-red-500 text-white px-3 py-1 rounded ml-auto">登出</button>`;
        document.getElementById('btnLogout').addEventListener('click', logout);

        // 2. 初始化 Firebase
        const firebaseConfig = { /* 填入你的設定 */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 3. 實作多站點查詢邏輯
        const dispatchesCol = collection(db, "daily_dispatches");
        
        async function loadTrips(date) {
            let q;
            // 如果是總公司管理員，拉取全部；否則只拉取該站點的
            if (user.role === 'SuperAdmin') {
                q = query(dispatchesCol, where("date", "==", date), orderBy("departure_time", "asc"));
            } else {
                q = query(dispatchesCol, where("date", "==", date), where("stationId", "==", user.stationId), orderBy("departure_time", "asc"));
            }
            
            onSnapshot(q, (snapshot) => {
                // ...執行原本的渲染表格邏輯...
            });
        }
        
        // 初始化載入
        loadTrips(new Date().toISOString().split('T')[0]);
        
    }).catch(err => console.error(err));
  </script>
</body>
</html>

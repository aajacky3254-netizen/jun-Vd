<script type="module">
    import { db } from './firebase-init.js';
    // 💡 修正 1：補上 addDoc，這樣才能新增報修單
    import { collection, query, onSnapshot, doc, setDoc, updateDoc, deleteDoc, orderBy, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js';

    // 💡 修正 2：補上 '駕駛長' 權限，讓司機也能進入此頁面
    checkAuthAndGetRole(['總公司', '站長', '調度員', '維修保養班', '駕駛長']).then((user) => {
        document.body.style.display = 'block'; 
        
        // 渲染右上角個人資訊與登出按鈕
        const nav = document.getElementById('main-nav');
        nav.innerHTML += `
            <div class="ml-auto flex items-center gap-4 text-white text-sm font-bold pr-4">
                <span>👤 ${user.name} (${user.role})</span>
                <button id="btnLogout" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded transition">登出</button>
            </div>
        `;
        document.getElementById('btnLogout').addEventListener('click', logout);

        // 如果是駕駛長，隱藏畫面上方導往「車輛資訊系統」的連結
        if (user.role === '駕駛長') {
            const navVehicles = document.getElementById('nav-vehicles');
            if (navVehicles) navVehicles.style.display = 'none';
        }
        
        const repairsCol = collection(db, "Repairs");
        const dbStatusEl = document.getElementById('db-status');

        // 💡 修正 3：對齊你系統中正確的職稱名稱
        const canManage = ['總公司', '站長', '調度員', '維修保養班'].includes(user.role);

        // ==========================================
        // 💡 修正 4：快速填寫按鈕 (獨立於資料庫讀取之外，所有人皆可點擊)
        // ==========================================
        document.querySelectorAll('.quick-issue').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const inp = document.getElementById('inpIssue'); // 對應正確的 ID
                inp.value += (inp.value ? '，' : '') + e.target.innerText;
            });
        });

        // 讀取資料庫
        onSnapshot(query(repairsCol, orderBy("date", "desc")), (snapshot) => {
            const tbody = document.getElementById('repairBody');
            tbody.innerHTML = '';

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500 font-bold">目前無報修紀錄。</td></tr>';
            } else {
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const tr = document.createElement('tr');
                    
                    let statusHtml = '';
                    if (data.status === 'pending') {
                        statusHtml = '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm font-bold border border-red-300">待處理</span>';
                    } else {
                        statusHtml = '<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-sm font-bold border border-emerald-300">已完修</span>';
                    }

                    // 動態按鈕渲染：如果是駕駛，actionBtns 會維持 '-'
                    let actionBtns = '-';
                    if (canManage) {
                        if (data.status === 'pending') {
                            actionBtns = `
                                <button class="btn-resolve bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded text-sm font-bold mr-2 transition" data-id="${docSnap.id}" data-plate="${data.plate}">標記完修</button>
                                <button class="btn-delete bg-gray-500 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-sm font-bold transition" data-id="${docSnap.id}">刪除</button>
                            `;
                        } else {
                            actionBtns = `<button class="btn-delete bg-gray-500 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-sm font-bold transition" data-id="${docSnap.id}">刪除紀錄</button>`;
                        }
                    }

                    tr.innerHTML = `
                        <td class="font-mono text-gray-600">${data.date}</td>
                        <td class="font-bold text-lg text-gray-800">${data.plate}</td>
                        <td class="text-gray-700">${data.issue}</td>
                        <td class="font-bold text-gray-600">${data.reporter}</td>
                        <td>${statusHtml}</td>
                        <td style="text-align: center;">${actionBtns}</td>
                    `;
                    tbody.appendChild(tr);
                });

                // 綁定管理員按鈕事件
                if (canManage) {
                    // 標記完修功能
                    document.querySelectorAll('.btn-resolve').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.target.getAttribute('data-id');
                            const plate = e.target.getAttribute('data-plate');
                            if (confirm(`確定車輛 ${plate} 已完修嗎？`)) {
                                await updateDoc(doc(db, "Repairs", id), { status: 'resolved' });
                                // 嘗試同步更新車庫狀態為正常
                                try { await updateDoc(doc(db, "Vehicles", plate), { status: 'ready' }); } catch(err){}
                            }
                        });
                    });

                    // 刪除功能
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.target.getAttribute('data-id');
                            if (confirm('確定要刪除這筆報修紀錄嗎？')) {
                                await deleteDoc(doc(db, "Repairs", id));
                            }
                        });
                    });
                }
            }
            
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
            dbStatusEl.innerText = "資料庫已連線";
        }, (error) => {
            console.error(error);
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-300";
            dbStatusEl.innerText = "連線失敗";
        });

        // ==========================================
        // 提交報修單 (任何人皆可執行)
        // ==========================================
        document.getElementById('btnSubmit').addEventListener('click', async () => {
            const plate = document.getElementById('inpPlate').value.trim();
            const issue = document.getElementById('inpIssue').value.trim();
            
            if (!plate || !issue) {
                alert('請填寫車牌與異常狀況！');
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.innerText = '⏳ 傳送中...';
            btn.disabled = true;

            try {
                // 取得當前時間(包含年月日與時間)，方便識別
                const todayStr = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
                
                await addDoc(repairsCol, { 
                    plate: plate, 
                    issue: issue, 
                    reporter: user.name, 
                    date: todayStr, 
                    status: 'pending' 
                });

                // 同步將車輛資產管理中的狀態改為故障 (若有該車輛的話)
                try {
                    await updateDoc(doc(db, "Vehicles", plate), { status: 'breakdown' });
                    alert('✅ 報修成功！調度系統已將該車輛標記為「故障維修」。');
                } catch (err) {
                    alert('✅ 報修成功！\n(註：系統未在車庫找到此車牌，無法同步狀態，請確認車牌是否建檔正確)');
                }

                document.getElementById('inpPlate').value = ''; 
                document.getElementById('inpIssue').value = '';
            } catch (err) {
                console.error(err);
                alert('報修失敗，請檢查網路連線！');
            }

            btn.innerText = '送出報修單';
            btn.disabled = false;
        });

    }).catch((err) => {
        console.error("未登入", err);
    });
  </script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車輛調度系統 - 車輛報修系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "微軟正黑體", sans-serif; background-color: #f4f6f9; display: none;}
    .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
    .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; line-height: 64px;}
    .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}
    table { width: 100%; border-collapse: collapse; background: #fff; text-align: left; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 16px; }
    th { background-color: #1e293b; color: white; }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav">
    <a href="index.html" class="text-yellow-400 font-bold text-xl mr-8">🚌 智慧車輛調度系統</a>
    <a href="repairs.html" class="nav-link active">🛠️ 車輛報修系統</a>
    <a href="vehicles.html" class="nav-link">🚍 車輛資訊系統</a>
  </nav>

  <div class="max-w-5xl mx-auto mt-8 px-4">
    <div class="bg-white p-6 rounded-lg shadow-md mb-8 border border-gray-200">
        <h3 class="text-lg font-bold mb-4">＋ 填寫車輛報修單</h3>
        <div class="flex gap-4 items-end">
            <div class="flex flex-col gap-1 w-1/4">
                <label class="text-sm font-bold text-gray-600">異常車號</label>
                <input type="text" id="inpPlate" placeholder="如 KKA-1234" class="border p-2 rounded outline-none focus:border-blue-500">
            </div>
            <div class="flex flex-col gap-1 w-1/2">
                <label class="text-sm font-bold text-gray-600">異常狀況描述</label>
                <input type="text" id="inpIssue" placeholder="如: 冷氣不冷、引擎異音" class="border p-2 rounded outline-none focus:border-blue-500">
            </div>
            <button id="btnSubmit" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded h-[42px]">送出報修</button>
        </div>
    </div>

    <table class="shadow-md rounded-lg overflow-hidden">
        <thead>
            <tr><th>報修日期</th><th>車牌號碼</th><th>問題描述</th><th>提報人</th><th>處理狀態</th><th>維修操作</th></tr>
        </thead>
        <tbody id="repairBody"><tr><td colspan="6" class="text-center py-4">載入中...</td></tr></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js'; 

    const allowedRoles = ['SuperAdmin', 'StationManager', '調度員']; 

    checkAuthAndGetRole(allowedRoles).then((user) => {
        document.body.style.display = 'block'; 
        const nav = document.querySelector('.navbar');
        nav.innerHTML += `
            <div class="ml-auto flex items-center gap-4 text-white text-sm font-bold pr-4">
                <span>👤 ${user.name} (${user.role})</span>
                <button id="btnLogout" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded transition">登出</button>
            </div>
        `;
        document.getElementById('btnLogout').addEventListener('click', logout);

        const firebaseConfig = {
          apiKey: "AIzaSyAnhhaiWXn5KFtU1YdB0oR_S9E0qhAlJuI",
          authDomain: "jun-bus-dispatch.firebaseapp.com",
          projectId: "jun-bus-dispatch",
          storageBucket: "jun-bus-dispatch.firebasestorage.app",
          messagingSenderId: "621725744717",
          appId: "1:621725744717:web:64e663648d8c76b9bd6604"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const dbStatusEl = document.getElementById('db-status');

        const routesCol = collection(db, "Routes");
        onSnapshot(query(routesCol, orderBy("name", "asc")), (snapshot) => {
            const tbody = document.getElementById('routesBody');
            tbody.innerHTML = '';
            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="2" class="text-center py-6 text-gray-500 font-bold">目前沒有路線資料。</td></tr>';
            } else {
                snapshot.forEach(docSnap => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 700; color: #334155; font-size: 16px;">${docSnap.data().name}</td>
                        <td style="text-align: center;">
                            <button class="btn-delete-route bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors shadow-sm" data-id="${docSnap.id}">刪除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                document.querySelectorAll('.btn-delete-route').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.dataset.id;
                        if(confirm(`確定要刪除路線「${id}」嗎？\n(注意：這將會讓發車控制台無法再選到此路線)`)) {
                            await deleteDoc(doc(db, "Routes", id));
                        }
                    });
                });
            }
            updateDbStatus(true);
        }, (err) => { console.error(err); updateDbStatus(false); });

        document.getElementById('btnAddRoute').addEventListener('click', async () => {
            const inputEl = document.getElementById('inpNewRoute');
            const val = inputEl.value.trim();
            if(!val) return alert("請輸入路線名稱！");
            try { await setDoc(doc(db, "Routes", val), { name: val, status: 'active' }); inputEl.value = ''; } 
            catch(e) { console.error(e); alert("新增失敗"); }
        });

        const stationsCol = collection(db, "Stations");
        onSnapshot(query(stationsCol, orderBy("name", "asc")), (snapshot) => {
            const tbody = document.getElementById('stationsBody');
            tbody.innerHTML = '';
            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="2" class="text-center py-6 text-gray-500 font-bold">目前沒有站點資料。</td></tr>';
            } else {
                snapshot.forEach(docSnap => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 700; color: #334155; font-size: 16px;">${docSnap.data().name}</td>
                        <td style="text-align: center;">
                            <button class="btn-delete-station bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors shadow-sm" data-id="${docSnap.id}">刪除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                document.querySelectorAll('.btn-delete-station').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.dataset.id;
                        if(confirm(`確定要刪除站點「${id}」嗎？`)) { await deleteDoc(doc(db, "Stations", id)); }
                    });
                });
            }
        }, (err) => console.error(err));

        document.getElementById('btnAddStation').addEventListener('click', async () => {
            const inputEl = document.getElementById('inpNewStation');
            const val = inputEl.value.trim();
            if(!val) return alert("請輸入站點名稱！");
            try { await setDoc(doc(db, "Stations", val), { name: val, status: 'active' }); inputEl.value = ''; } 
            catch(e) { console.error(e); alert("新增失敗"); }
        });

        function updateDbStatus(isSuccess) {
            if (isSuccess) {
                dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300 shadow-sm";
                dbStatusEl.innerText = "資料庫已連線";
            } else {
                dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-300 shadow-sm";
                dbStatusEl.innerText = "連線失敗";
            }
        }

    // 💡 關鍵修復點：完美閉合大括號
    }).catch((err) => {
        console.error("驗證失敗或未登入", err);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 員工登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=2069&auto=format&fit=crop')] bg-cover bg-center">
  
  <div class="absolute inset-0 bg-black bg-opacity-60"></div>

  <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full border border-gray-200 relative z-10">
    <div class="text-center mb-8">
        <img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="豐東客運 LOGO" class="mx-auto h-24 mb-4 object-contain">
        <h2 class="text-2xl font-bold text-gray-800 tracking-widest">車場調度系統</h2>
        <p class="text-sm text-gray-500 mt-2 font-bold">請輸入員工編號登入</p>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">員工編號 (帳號)</label>
        <input type="text" id="empId" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-lg" placeholder="例如: 001">
      </div>
      <div>
  <label class="block text-sm font-bold text-gray-700 mb-1">密碼</label>
  <div class="relative">
    <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg pr-12" placeholder="預設密碼為 123">
    <button type="button" id="togglePwd" class="absolute inset-y-0 right-0 px-3 flex items-center text-xl text-gray-500 hover:text-gray-700">
      👁️
    </button>
  </div>
</div>
      <button id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md mt-4 text-lg">
        登入系統
      </button>
      <p id="errorMsg" class="text-red-500 text-sm text-center hidden mt-2 font-bold bg-red-50 py-2 rounded"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
// 引入 auth 模組
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    
document.getElementById('togglePwd').addEventListener('click', function() {
    const pwdInput = document.getElementById('password');
    pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
    this.innerText = pwdInput.type === 'password' ? '👁️' : '🙈';
});

const firebaseConfig = {
    apiKey: "AIzaSyAnhhaiWXn5KFtU1YdB0oR_S9E0qhAlJuI",
    authDomain: "jun-bus-dispatch.firebaseapp.com",
    projectId: "jun-bus-dispatch",
    // ... 其他屬性
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app); // 初始化 Auth

document.getElementById('btnLogin').addEventListener('click', async () => {
    const empId = document.getElementById('empId').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('btnLogin');
    
    if(!empId || !password) {
        errorMsg.innerText = "請輸入員工編號與密碼！";
        errorMsg.classList.remove('hidden');
        return;
    }

    try {
        btn.innerText = '身分驗證中...';
        btn.disabled = true;
        errorMsg.classList.add('hidden');

        // 上帝帳號直接放行邏輯可以保留，但在正式環境建議建立一個真實的 admin 帳號
        if(empId === "admin" && password === "admin123") {
            // 注意：上帝帳號還是會被新的 auth.js 擋住，因為它沒有真的登入 Firebase Auth
            // 建議在 Firebase Console 建立一個 admin@fengdong.com 帳號，並將資料寫入 Firestore
        }

        // 把員工編號轉換為 Firebase 需要的虛擬 Email 格式
        const virtualEmail = `${empId}@fengdong.com`;

        // 呼叫 Firebase 官方登入 API
        await signInWithEmailAndPassword(auth, virtualEmail, password);
        
        // 登入成功後，Firebase 會在背景自動記錄 Token (存在 IndexedDB 中，高度加密且防篡改)
        // 直接跳轉，auth.js 會接手驗證
        window.location.href = 'index.html'; 

    } catch (error) {
        console.error(error);
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
            errorMsg.innerText = "員工編號或密碼錯誤！";
        } else {
            errorMsg.innerText = "連線失敗，請檢查網路狀態或聯絡系統管理員。";
        }
        errorMsg.classList.remove('hidden');
    } finally {
        btn.innerText = '登入系統';
        btn.disabled = false;
    }
});
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東客運 - 車場調度系統登入</title>
  <link rel="stylesheet" href="./output.css">
  <style>
    body { 
      /* 背景圖可自行替換回您的公車圖 */
      background-image: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=2069&auto=format&fit=crop'); 
      background-size: cover; 
      background-position: center; 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      margin: 0;
    }
    .login-card { 
      background: rgba(255, 255, 255, 0.95); 
      backdrop-filter: blur(10px); 
      width: 100%; 
      max-width: 400px; 
      padding: 40px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
      text-align: center; 
    }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 8px; }
    .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; background: #f8fafc; }
    .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); background: #fff; }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="Logo" class="h-16 mx-auto mb-4 object-contain">
    <h2 class="text-2xl font-black text-gray-800 mb-1">車場調度系統</h2>
    <p class="text-sm text-gray-500 font-bold mb-8">請輸入員工編號登入</p>
    
    <div class="input-group">
      <label>員工編號 (帳號)</label>
      <input type="text" id="empId" placeholder="例如: admin" autofocus>
    </div>
    
    <div class="input-group">
      <label>密碼</label>
      <input type="password" id="password" placeholder="請輸入密碼">
    </div>
    
    <div id="errorMsg" class="text-red-500 bg-red-50 py-2 px-4 rounded-lg font-bold text-sm mb-4 hidden border border-red-200">
      登入失敗：員工編號或密碼錯誤！
    </div>

    <button id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg">登入系統</button>
  </div>

  <script type="module">
    import { auth, db } from './firebase-init.js';
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const btnLogin = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    btnLogin.addEventListener('click', async () => {
        const empId = document.getElementById('empId').value.trim();
        const password = document.getElementById('password').value;
        
        if(!empId || !password) return;
        
        btnLogin.innerText = "驗證中...";
        btnLogin.disabled = true;
        errorMsg.classList.add('hidden');

        // 將員工編號組合為 Firebase Auth 接受的 Email 格式
        const email = `${empId}@fengdong.com`;

        try {
            // 嘗試登入
            await signInWithEmailAndPassword(auth, email, password);
            
            // 🔥 無敵自動修復機制：如果登入成功，且是 admin，檢查 Firestore 資料庫有沒有遺失
            if (empId === 'admin') {
                const adminDoc = await getDoc(doc(db, "Drivers", "admin"));
                if (!adminDoc.exists()) {
                    await setDoc(doc(db, "Drivers", "admin"), {
                        name: "系統創辦人",
                        role: "總公司",
                        empRole: "老闆",
                        station: "總部",
                        status: "active"
                    });
                    console.log("已自動修復 admin 資料庫權限！");
                }
            }
            
            window.location.href = "index.html";
            
        } catch (error) {
            // 首登初始化機制 (創世神帳號)
            if (empId === 'admin' && (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential')) {
                if (confirm("⚠️ 系統偵測到可能需要初始化或密碼錯誤。\n如果您是首次建置系統，是否要立即將 [admin] 註冊為初始最高管理員帳號？")) {
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                        // 在資料庫中寫入 admin 的權限資料
                        await setDoc(doc(db, "Drivers", "admin"), {
                            name: "系統創辦人",
                            role: "總公司",
                            empRole: "老闆",
                            station: "總部",
                            status: "active"
                        });
                        alert("✅ 系統初始化成功！請再次點擊登入。");
                    } catch(err) {
                        // 如果出現已存在錯誤，提示使用者輸入正確密碼
                        if (err.code === 'auth/email-already-in-use') {
                            alert("❌ 帳號其實已經存在！請輸入您之前設定的密碼即可登入。如果忘記密碼，請至 Firebase 後台刪除該帳號後重試。");
                        } else {
                            alert("初始化失敗：" + err.message);
                        }
                    }
                }
            } else {
                errorMsg.classList.remove('hidden');
            }
        } finally {
            btnLogin.innerText = "登入系統";
            btnLogin.disabled = false;
        }
    });

    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') btnLogin.click();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 員工登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=2069&auto=format&fit=crop')] bg-cover bg-center">
  
  <div class="absolute inset-0 bg-black bg-opacity-60"></div>

  <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full border border-gray-200 relative z-10">
    <div class="text-center mb-8">
        <img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="豐東客運 LOGO" class="mx-auto h-24 mb-4 object-contain">
        <h2 class="text-2xl font-bold text-gray-800 tracking-widest">車場調度系統</h2>
        <p class="text-sm text-gray-500 mt-2 font-bold">請輸入員工編號登入</p>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">員工編號 (帳號)</label>
        <input type="text" id="empId" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-lg" placeholder="例如: 001">
      </div>
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">密碼</label>
        <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg" placeholder="預設密碼為 123">
      </div>
      <button id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md mt-4 text-lg">
        登入系統
      </button>
      <p id="errorMsg" class="text-red-500 text-sm text-center hidden mt-2 font-bold bg-red-50 py-2 rounded"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAnhhaiWXn5KFtU1YdB0oR_S9E0qhAlJuI",
      authDomain: "jun-bus-dispatch.firebaseapp.com",
      projectId: "jun-bus-dispatch",
      storageBucket: "jun-bus-dispatch.firebasestorage.app",
      messagingSenderId: "621725744717",
      appId: "1:621725744717:web:64e663648d8c76b9bd6604",
      measurementId: "G-10TKXKRPY9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const empId = document.getElementById('empId').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const btn = document.getElementById('btnLogin');
        
        if(!empId || !password) {
            errorMsg.innerText = "請輸入員工編號與密碼！";
            errorMsg.classList.remove('hidden');
            return;
        }

        try {
            btn.innerText = '身分驗證中...';
            btn.disabled = true;

            // 系統特權：總經理上帝帳號 (避免資料庫壞掉時無法登入)
            if(empId === "admin" && password === "admin123") {
                sessionStorage.setItem('busSystemUser', JSON.stringify({ empId: "admin", name: "系統管理員", role: "SuperAdmin" }));
                window.location.href = 'index.html'; // 確保這裡指向 index.html
                return;
            }

            // 去資料庫找這位員工
            const docSnap = await getDoc(doc(db, "Drivers", empId));
            
            if (docSnap.exists()) {
                const userData = docSnap.data();
                // 檢查密碼 (如果資料庫沒設定密碼，預設為 "123")
                const dbPassword = userData.password || "123";

                if (password === dbPassword) {
                    sessionStorage.setItem('busSystemUser', JSON.stringify({
                        empId: empId,
                        name: userData.name,
                        role: userData.role || "駕駛長" 
                    }));
                    window.location.href = 'index.html'; // 確保這裡也指向 index.html
                } else {
                    errorMsg.innerText = "密碼錯誤，請重試！";
                    errorMsg.classList.remove('hidden');
                }
            } else {
                errorMsg.innerText = "找不到此員工編號！";
                errorMsg.classList.remove('hidden');
            }
        } catch (error) {
            console.error(error);
            errorMsg.innerText = "連線失敗，請檢查網路！";
            errorMsg.classList.remove('hidden');
        } finally {
            btn.innerText = '登入系統';
            btn.disabled = false;
        }
    });
  </script>
</body>
</html>

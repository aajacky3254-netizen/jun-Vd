<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>豐東客運 | 智慧行動查詢</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background-color: #000; color: #e5e7eb; font-family: "微軟正黑體", sans-serif; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .bottom-sheet { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .bottom-sheet.open { transform: translateY(0); }
    .overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease-in-out; }
    .overlay.open { opacity: 1; pointer-events: auto; }
    
    .loader { border-top-color: #c4b5fd; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .nav-btn { transition: color 0.2s ease-in-out; }
    .nav-btn.active { color: #c084fc; } 
    .nav-btn.active span:first-child { transform: scale(1.1); transition: transform 0.2s; }
  </style>
</head>
<body class="flex justify-center h-screen">

<div class="w-full max-w-md bg-[#121212] h-full flex flex-col relative shadow-2xl overflow-hidden border-x border-gray-800">

  <header class="flex items-center justify-between px-4 py-3 bg-[#1e1e24] shadow-md z-10 sticky top-0 border-b border-gray-800 shrink-0">
    <div class="flex items-center gap-3">
      <button id="btnBack" class="hidden text-gray-400 hover:text-white p-1 transition-transform active:scale-90">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      </button>
      <h1 id="pageTitle" class="text-lg font-bold text-gray-100 tracking-wide flex items-center gap-2">
          <img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="logo" class="h-5 object-contain bg-white/90 rounded px-1">
          路線總覽
      </h1>
    </div>
    <div class="text-xs font-medium bg-gray-800 px-2 py-1 rounded text-gray-300" id="userBadge">連線中...</div>
  </header>

  <main id="viewRoutes" class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24 relative">
    <div class="bg-[#1e1e24] rounded-lg p-3 mb-4 flex justify-between items-center border border-gray-700 shadow-sm">
      <div class="flex flex-col">
        <span class="text-xs text-gray-400 font-bold tracking-wider uppercase">查詢營運日期</span>
        <input type="date" id="queryDate" class="bg-transparent text-purple-200 font-bold outline-none text-lg mt-1 tracking-wider">
      </div>
      <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
    </div>

    <div class="relative mb-6 shadow-sm sticky top-0 z-20">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      </div>
      <input type="text" id="searchInput" class="block w-full pl-10 pr-10 py-3 border border-gray-700 rounded-xl leading-5 bg-[#2a2a35] text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-purple-500 focus:border-purple-500 sm:text-sm transition-all shadow-inner" placeholder="搜尋路線或站名 (支援 Regex)...">
      <button id="btnClearSearch" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-200">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <div id="routesContainer">
      <div class="flex justify-center items-center py-10 flex-col">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-10 w-10 mb-4"></div>
        <p class="text-gray-400 font-bold text-sm">載入調度資料中...</p>
      </div>
    </div>
  </main>

  <main id="viewTimetable" class="hidden flex-1 overflow-y-auto no-scrollbar p-4 pb-24 bg-[#121212] scroll-smooth">
    <div id="timetableHeader" class="mb-4">
      <p class="text-xs text-gray-400 tracking-wider mb-1" id="timetableDateDisplay"></p>
      <div class="flex items-center">
        <div class="w-1.5 h-4 bg-[#c4b5fd] rounded-full mr-2 shadow-[0_0_8px_rgba(196,181,253,0.5)]"></div>
        <h3 class="text-lg font-bold text-gray-100">雙向發車時刻與配置</h3>
      </div>
    </div>

    <div id="timetableContainer" class="space-y-6">
      </div>
  </main>

  <nav id="bottomNav" class="bg-[#1e1e24] border-t border-gray-800 flex justify-around py-2 pb-safe absolute bottom-0 w-full z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.5)] shrink-0">
    <button class="nav-btn flex flex-col items-center p-2 text-gray-500 hover:text-gray-300" data-target="info">
      <span class="text-xl mb-0.5">ℹ️</span><span class="text-[10px] font-bold tracking-wider">資訊</span>
    </button>
    <button class="nav-btn active flex flex-col items-center p-2 text-gray-500 hover:text-gray-300" data-target="routes">
      <span class="text-xl mb-0.5">☈</span><span class="text-[10px] font-bold tracking-wider">路線</span>
    </button>
    <button class="nav-btn flex flex-col items-center p-2 text-gray-500 hover:text-gray-300" data-target="fleet">
      <span class="text-xl mb-0.5">🚍</span><span class="text-[10px] font-bold tracking-wider">車隊</span>
    </button>
    <button class="nav-btn flex flex-col items-center p-2 text-gray-500 hover:text-gray-300" data-target="settings">
      <span class="text-xl mb-0.5">⚙️</span><span class="text-[10px] font-bold tracking-wider">設定</span>
    </button>
  </nav>

  <div id="overlay" class="overlay absolute inset-0 bg-black bg-opacity-70 z-40 backdrop-blur-[2px]"></div>
  <div id="actionSheet" class="bottom-sheet absolute bottom-0 left-0 w-full bg-[#1e1e24] rounded-t-3xl z-50 p-6 pb-8 shadow-2xl border-t border-gray-700">
    <div class="w-12 h-1.5 bg-gray-600 rounded-full mx-auto mb-5"></div>
    
    <div class="flex justify-between items-center mb-6">
      <h3 id="actionSheetTitle" class="text-xl font-bold text-gray-100 flex items-center gap-2">
        🚍 班次操作: <span class="text-purple-300 font-mono tracking-wider"></span>
      </h3>
    </div>
    
    <div class="space-y-3 text-sm font-bold text-gray-300">
      <div id="actionSheetDriverInfo" class="bg-[#2a2a35] p-3 rounded-xl mb-4 border border-gray-700 flex items-center gap-3">
          <div class="bg-gray-700 p-2 rounded-full text-lg">👨‍✈️</div>
          <div class="flex-1">
              <p class="text-xs text-gray-400">排定駕駛長</p>
              <p class="text-base text-gray-100" id="sheetDriverName">載入中...</p>
          </div>
          <button class="bg-purple-600 hover:bg-purple-500 text-white p-2 rounded-full transition-transform active:scale-95">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg>
          </button>
      </div>

      <button class="action-btn w-full flex items-center gap-3 p-3 bg-[#2a2a35] hover:bg-gray-700 rounded-xl transition border border-transparent active:border-purple-500"><span class="text-lg">📡</span> 系統即時動態</button>
      <button class="action-btn w-full flex items-center gap-3 p-3 bg-[#2a2a35] hover:bg-gray-700 rounded-xl transition border border-transparent active:border-purple-500"><span class="text-lg">🕒</span> 歷史行駛軌跡</button>
      <button class="action-btn w-full flex items-center gap-3 p-3 bg-[#2a2a35] hover:bg-gray-700 rounded-xl transition border border-transparent active:border-purple-500"><span class="text-lg">📅</span> 查詢人員班表</button>
    </div>
  </div>

</div> <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole } from './auth.js'; 

    const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';

    const firebaseConfig = {
        apiKey: "AIzaSyAnhhaiWXn5KFtU1YdB0oR_S9E0qhAlJuI",
        authDomain: "jun-bus-dispatch.firebaseapp.com",
        projectId: "jun-bus-dispatch",
        storageBucket: "jun-bus-dispatch.firebasestorage.app"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentDayTrips = []; 
    let currentSelectedRoute = null;

    const dateInput = document.getElementById('queryDate');
    const searchInput = document.getElementById('searchInput');
    const btnClearSearch = document.getElementById('btnClearSearch');
    const routesContainer = document.getElementById('routesContainer');
    const timetableContainer = document.getElementById('timetableContainer');
    const viewRoutes = document.getElementById('viewRoutes');
    const viewTimetable = document.getElementById('viewTimetable');
    const btnBack = document.getElementById('btnBack');
    const pageTitle = document.getElementById('pageTitle');
    const userBadge = document.getElementById('userBadge');
    const timetableDateDisplay = document.getElementById('timetableDateDisplay');

    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;

    checkAuthAndGetRole(['SuperAdmin', 'StationManager', '調度員', '駕駛長']).then((user) => {
        userBadge.innerText = `👤 ${escapeHTML(user.name)}`;
    }).catch(() => {
        userBadge.innerText = "訪客模式";
    });

    let unsubscribe = null;

    function loadDispatchData(dateStr) {
        routesContainer.innerHTML = `
            <div class="flex justify-center items-center py-10 flex-col">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-purple-500 h-10 w-10 mb-4"></div>
                <p class="text-gray-400 font-bold text-sm">與調度主機同步中...</p>
            </div>
        `;

        if (unsubscribe) unsubscribe();

        const q = query(
            collection(db, "daily_dispatches"), 
            where("date", "==", dateStr),
            orderBy("departure_time", "asc")
        );

        unsubscribe = onSnapshot(q, (snapshot) => {
            currentDayTrips = [];
            snapshot.forEach(doc => {
                currentDayTrips.push({ id: doc.id, ...doc.data() });
            });
            
            renderRoutesCard(searchInput.value); 

            if (!viewTimetable.classList.contains('hidden') && currentSelectedRoute) {
                renderTimetable(currentSelectedRoute);
            }
        }, (error) => {
            console.error("讀取失敗", error);
            routesContainer.innerHTML = `<div class="p-4 bg-red-900 bg-opacity-20 border border-red-800 text-red-400 rounded-lg text-center font-bold">⚠️ 無法連線至調度主機，請檢查網路狀態。</div>`;
        });
    }

    function renderRoutesCard(filterKeyword = "") {
        if (currentDayTrips.length === 0) {
            routesContainer.innerHTML = `<div class="p-8 text-center text-gray-500 font-bold text-sm bg-[#1e1e24] rounded-xl border border-gray-800 shadow-inner">🗓️ 此日期尚未建立任何發車時刻表。</div>`;
            return;
        }

        const routeMap = new Map();
        let regexPattern = null;

        if (filterKeyword) {
            try { regexPattern = new RegExp(filterKeyword, 'i'); } 
            catch (e) { regexPattern = null; }
        }
        
        currentDayTrips.forEach(trip => {
            if (!trip.route) return;
            const routeName = trip.route;
            const startPt = trip.start_point || "";
            const endPt = trip.end_point || "";
            
            if (filterKeyword) {
                let isMatch = false;
                if (regexPattern) {
                    isMatch = regexPattern.test(routeName) || regexPattern.test(startPt) || regexPattern.test(endPt);
                } else {
                    const lowKey = filterKeyword.toLowerCase();
                    isMatch = routeName.toLowerCase().includes(lowKey) || startPt.toLowerCase().includes(lowKey) || endPt.toLowerCase().includes(lowKey);
                }
                if (!isMatch) return;
            }

            if (!routeMap.has(routeName)) {
                routeMap.set(routeName, {
                    name: routeName,
                    endpoints: new Set([startPt, endPt].filter(Boolean)),
                    count: 1
                });
            } else {
                const info = routeMap.get(routeName);
                info.count++;
                if(startPt) info.endpoints.add(startPt);
                if(endPt) info.endpoints.add(endPt);
            }
        });

        if (routeMap.size === 0) {
            routesContainer.innerHTML = `<div class="text-center text-gray-500 font-bold py-10 bg-[#1e1e24] rounded-xl border border-gray-800">找不到符合條件的路線。</div>`;
            return;
        }

        let html = "";
        routeMap.forEach((info, routeName) => {
            const numberMatch = routeName.match(/\d+/);
            const displayNum = numberMatch ? numberMatch[0] : "📌";
            
            const pts = Array.from(info.endpoints);
            const displayStart = pts[0] || "未知";
            const displayEnd = pts[1] || pts[0] || "環線/未知";

            html += `
            <div class="bg-[#1e1e24] rounded-2xl p-4 mb-4 shadow-lg border border-gray-800 relative overflow-hidden active:scale-[0.98] transition-transform cursor-pointer btn-timetable" data-route="${escapeHTML(routeName)}">
                <div class="absolute top-0 right-0 w-20 h-20 bg-gradient-to-bl from-purple-900 to-transparent opacity-20 rounded-bl-[40px] pointer-events-none"></div>
                
                <div class="flex items-start justify-between mb-2 z-10 relative">
                    <h2 class="text-3xl font-black text-purple-300 tracking-tighter">${escapeHTML(displayNum)}</h2>
                    <span class="bg-[#2a2a35] text-gray-400 text-xs px-2.5 py-1 rounded-md font-bold border border-gray-700">共 ${info.count} 班次</span>
                </div>
                
                <div class="flex items-center text-sm font-bold text-gray-100 mb-1 z-10 relative">
                    <span class="truncate max-w-[42%]">${escapeHTML(displayStart)}</span>
                    <svg class="w-4 h-4 mx-2 text-gray-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                    <span class="truncate max-w-[42%] text-gray-300">${escapeHTML(displayEnd)}</span>
                </div>
                <div class="text-xs text-gray-500 z-10 relative">調度路線 : ${escapeHTML(routeName)}</div>
            </div>`;
        });
        routesContainer.innerHTML = html;
        bindTimetableButtons();
    }

    function renderTimetable(routeName) {
        const routeTrips = currentDayTrips.filter(t => t.route === routeName);
        
        if (routeTrips.length === 0) {
            timetableContainer.innerHTML = `<div class="text-center text-gray-500 font-bold py-10 bg-[#1e1e24] rounded-xl">無排定班次。</div>`;
            return;
        }

        const directionMap = new Map();
        routeTrips.forEach(trip => {
            const dest = trip.end_point || "未知目的地";
            if (!directionMap.has(dest)) directionMap.set(dest, []);
            directionMap.get(dest).push(trip);
        });

        const now = new Date();
        const isToday = dateInput.value === today;
        const currentMins = now.getHours() * 60 + now.getMinutes();

        let html = "";
        directionMap.forEach((trips, destName) => {
            html += `
            <div class="direction-section">
                <div class="flex items-center mb-3 sticky top-[-1px] bg-[#121212] py-2 z-10">
                    <span class="bg-gray-800 text-gray-300 text-[10px] font-bold px-2 py-0.5 rounded mr-2 border border-gray-700">方向</span>
                    <h4 class="text-sm font-black text-purple-200">往 ${escapeHTML(destName)}</h4>
                </div>
                <div class="space-y-2.5">
            `;

            let nextBusFound = false;

            trips.forEach(trip => {
                const isAssigned = trip.assigned_vehicle && trip.assigned_vehicle !== "尚未指派";
                const vPlate = isAssigned ? escapeHTML(trip.assigned_vehicle) : "無車輛";
                const vClass = isAssigned ? "text-gray-100" : "text-red-400/80";
                const dName = trip.assigned_driver && trip.assigned_driver !== "尚未指派" ? trip.assigned_driver : "未指派";
                
                let statusIndicator = "bg-gray-600";
                if (trip.status === "active") statusIndicator = "bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]";
                else if (trip.status === "done") statusIndicator = "bg-[#1e1e24]"; 

                let isNextBus = false;
                if (isToday && !nextBusFound && trip.departure_time && trip.status !== "done") {
                    let [th, tm] = trip.departure_time.split(':').map(Number);
                    if ((th * 60 + tm) >= currentMins) {
                        isNextBus = true;
                        nextBusFound = true;
                        statusIndicator = "bg-purple-500 shadow-[0_0_12px_rgba(168,85,247,0.8)]";
                    }
                }

                const cardBg = isNextBus ? "bg-[#231d33] border-purple-500/50" : "bg-[#1e1e24] border-gray-800";
                const timeColor = isNextBus ? "text-white bg-purple-600/80" : "text-purple-200 bg-[#2a2a35]";

                html += `
                <div class="flex items-center justify-between ${cardBg} p-3 rounded-xl border shadow-sm relative overflow-hidden" ${isNextBus ? 'id="nextBusTarget"' : ''}>
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${statusIndicator}"></div>
                    
                    <div class="flex items-center gap-4 pl-3">
                        <div class="flex flex-col items-center">
                            <div class="${timeColor} font-bold px-3 py-1.5 rounded-lg text-[15px] border border-gray-700/50 tracking-wider">${escapeHTML(trip.departure_time)}</div>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-sm ${vClass} font-mono tracking-wide">${vPlate}</span>
                            <div class="flex items-center gap-1 mt-0.5">
                                <span class="text-[10px] text-gray-500 font-bold truncate max-w-[100px]">${escapeHTML(trip.start_point)}</span>
                                ${isNextBus ? '<span class="text-[9px] bg-purple-500/20 text-purple-300 px-1 rounded font-bold">即將發車</span>' : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center">
                        <button class="btn-action bg-[#2a2a35] text-gray-300 border border-gray-700 hover:border-purple-400 hover:text-purple-300 px-3 py-2 rounded-xl text-xs font-bold flex items-center transition-all active:scale-95" 
                                data-vehicle="${vPlate}"
                                data-driver="${escapeHTML(dName)}">
                            <span class="text-lg leading-none mt-[-2px] mr-1">⋮</span> 操作
                        </button>
                    </div>
                </div>`;
            });
            html += `</div></div>`;
        });
        
        timetableContainer.innerHTML = html;
        timetableDateDisplay.innerText = `營運日期: ${dateInput.value.replace(/-/g, '/')}`;
        bindActionButtons();

        setTimeout(() => {
            const nextBusEl = document.getElementById('nextBusTarget');
            if (nextBusEl) nextBusEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
    }

    function bindTimetableButtons() {
        document.querySelectorAll('.btn-timetable').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentSelectedRoute = e.currentTarget.dataset.route;
                pageTitle.innerHTML = `<img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="logo" class="h-5 object-contain bg-white/90 rounded px-1">${currentSelectedRoute}`;
                
                renderTimetable(currentSelectedRoute);
                
                viewRoutes.classList.add('hidden');
                viewTimetable.classList.remove('hidden');
                btnBack.classList.remove('hidden');
                window.scrollTo(0,0);
            });
        });
    }

    btnBack.addEventListener('click', () => {
        currentSelectedRoute = null;
        viewRoutes.classList.remove('hidden');
        viewTimetable.classList.add('hidden');
        btnBack.classList.add('hidden');
        pageTitle.innerHTML = `<img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="logo" class="h-5 object-contain bg-white/90 rounded px-1">路線總覽`;
    });

    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
        const val = e.target.value;
        btnClearSearch.classList.toggle('hidden', val === "");
        
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            renderRoutesCard(val.trim());
        }, 300);
    });

    btnClearSearch.addEventListener('click', () => {
        searchInput.value = "";
        btnClearSearch.classList.add('hidden');
        renderRoutesCard("");
    });

    dateInput.addEventListener('change', (e) => loadDispatchData(e.target.value));

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
        });
    });

    const actionSheet = document.getElementById('actionSheet');
    const overlay = document.getElementById('overlay');
    const actionSheetTitleSpan = document.querySelector('#actionSheetTitle span');
    const sheetDriverName = document.getElementById('sheetDriverName');

    function bindActionButtons() {
        document.querySelectorAll('.btn-action').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const vehicle = e.currentTarget.dataset.vehicle;
                const driver = e.currentTarget.dataset.driver;
                
                actionSheetTitleSpan.innerText = vehicle;
                sheetDriverName.innerText = driver;
                
                if (vehicle === "無車輛") actionSheetTitleSpan.className = "text-red-400 font-mono tracking-wider";
                else actionSheetTitleSpan.className = "text-purple-300 font-mono tracking-wider";

                actionSheet.classList.add('open');
                overlay.classList.add('open');
            });
        });
    }

    const closeSheet = () => {
        actionSheet.classList.remove('open');
        overlay.classList.remove('open');
    }
    overlay.addEventListener('click', closeSheet);
    document.querySelectorAll('.action-btn').forEach(btn => btn.addEventListener('click', closeSheet));

    loadDispatchData(dateInput.value);
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('PWA ServiceWorker 註冊成功: ', reg.scope);
    }).catch(err => console.log('ServiceWorker 註冊失敗: ', err));
  });
}
  </script>
</body>
</html>

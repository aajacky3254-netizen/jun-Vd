<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 路線與站點管理</title>
  <link rel="stylesheet" href="./output.css">
  <style>
    body { font-family: "微軟正黑體", "Noto Sans TC", sans-serif; background-color: #f4f6f9; margin: 0; }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>
  
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">🗺️ 營運路線與公車站點管理</h2>
        <!-- 💡 柏林路網一鍵匯入按鈕 -->
        <button id="btnImportBerlin" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded shadow font-bold">
            📥 匯入 The Bus 柏林路網
        </button>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div class="bg-white p-6 rounded shadow border">
        <h3 class="text-lg font-bold mb-4">🛣️ 營運路線設定</h3>
        <div class="flex gap-2 mb-4">
            <input type="text" id="inpRoute" class="border p-2 rounded w-full" placeholder="路線 (例: 100)">
            <button id="btnAddRoute" class="bg-blue-600 text-white px-4 rounded font-bold">新增</button>
        </div>
        <div class="table-wrapper">
        <table id="tblRoutes"><tbody></tbody></table>
        </div>
      </div>

      <div class="bg-white p-6 rounded shadow border">
        <h3 class="text-lg font-bold mb-4">🚏 站點設定 (The Bus 地標)</h3>
        <div class="flex gap-2 mb-4">
            <input type="text" id="inpStation" class="border p-2 rounded w-full" placeholder="站點 (例: Alexanderplatz)">
            <button id="btnAddStation" class="bg-teal-600 text-white px-4 rounded font-bold">新增</button>
        </div>
        <div class="table-wrapper">
        <table id="tblStations"><tbody></tbody></table>
      </div>
      </div>
    </div>
  </div>

<script type="module">
  import { db } from './firebase-init.js';
  import { collection, query, onSnapshot, doc, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { checkAuthAndGetRole, renderNavbar } from './auth.js';

  checkAuthAndGetRole(['總公司', '站長']).then((user) => {
      renderNavbar(user, 'routes');

      onSnapshot(query(collection(db, "Routes")), snap => {
          document.querySelector('#tblRoutes tbody').innerHTML = snap.docs.map(d => 
              `<tr><td class="font-bold text-blue-700">${d.id}</td><td class="text-right"><button class="bg-red-500 text-white px-2 py-1 rounded text-sm del-r" data-id="${d.id}">刪除</button></td></tr>`
          ).join('');
      });

      onSnapshot(query(collection(db, "Stations")), snap => {
          document.querySelector('#tblStations tbody').innerHTML = snap.docs.map(d => 
              `<tr><td class="font-bold">${d.id}</td><td class="text-right"><button class="bg-red-500 text-white px-2 py-1 rounded text-sm del-s" data-id="${d.id}">刪除</button></td></tr>`
          ).join('');
      });

      document.body.addEventListener('click', async e => {
          if(e.target.classList.contains('del-r')) await deleteDoc(doc(db, "Routes", e.target.dataset.id));
          if(e.target.classList.contains('del-s')) await deleteDoc(doc(db, "Stations", e.target.dataset.id));
      });

      document.getElementById('btnAddRoute').onclick = () => {
          let v = document.getElementById('inpRoute').value.trim();
          if(v) setDoc(doc(db, "Routes", v), {name: v}); document.getElementById('inpRoute').value='';
      };
      document.getElementById('btnAddStation').onclick = () => {
          let v = document.getElementById('inpStation').value.trim();
          if(v) setDoc(doc(db, "Stations", v), {name: v}); document.getElementById('inpStation').value='';
      };

      // 💡 一鍵匯入 The Bus 柏林真實路網
      document.getElementById('btnImportBerlin').addEventListener('click', async () => {
          if(!confirm("確定要匯入《The Bus》9 條核心路線與柏林地標站點嗎？")) return;
          
          const batch = writeBatch(db);
          const routes = ['100', '200', '300', 'N100', 'TXL', '123', '142', '147', '245'];
          const stations = [
              'Zoologischer Garten (動物園站)', 'Alexanderplatz (亞歷山大廣場)', 
              'Michelangelostraße', 'Philharmonie (愛樂廳)', 'Warschauer Straße (華沙街)', 
              'Flughafen Tegel (泰格爾機場)', 'Hauptbahnhof (中央車站)', 'Mäckeritzwiesen', 
              'Ostbahnhof (東站)', 'Leopoldplatz', 'Brandenburger Tor (布蘭登堡門)'
          ];

          routes.forEach(r => batch.set(doc(db, "Routes", r), { name: r }));
          stations.forEach(s => batch.set(doc(db, "Stations", s), { name: s }));

          await batch.commit();
          alert("✅ 柏林路網與站點已成功寫入資料庫！");
      });
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車輛調度系統 - 週班表管理 (滾動排休升級版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Noto Sans TC", "微軟正黑體", sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; display: none; }
        .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
        .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; }
        .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block; white-space: nowrap; }
        .navbar a.nav-link:hover { background-color: #374151; color: white; }
        .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}

        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th { background-color: #f8fafc; color: #374151; font-weight: bold; padding: 12px; border: 1px solid #e2e8f0; font-size: 14px; text-align: center; }
        td { border: 1px solid #e2e8f0; padding: 0; } 
        
        select { width: 100%; height: 48px; border: none; outline: none; text-align: center; font-weight: bold; cursor: pointer; appearance: none; -webkit-appearance: none; padding: 0 10px; }
        
        /* 班別色彩管理 */
        .shift-M { background-color: #93c5fd; color: #1e3a8a; }   /* 早班 */
        .shift-A { background-color: #fde047; color: #854d0e; }   /* 中班 */
        .shift-E { background-color: #fca5a5; color: #7f1d1d; }   /* 晚班 */
        .shift-N { background-color: #c084fc; color: #4c1d95; }   /* 夜班 */
        .shift-OFF { background-color: #e5e7eb; color: #374151; } /* 休假 */
        .shift-STB { background-color: #cbd5e1; color: #334155; } /* 待命 */
        .shift-REL { background-color: #f97316; color: #ffffff; } /* 替班 */
        
        .driver-cell { padding: 0 16px; text-align: left; font-weight: bold; color: #1f2937; background-color: #f8fafc; }
        .emp-id { color: #6b7280; font-family: monospace; margin-right: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <nav class="navbar" id="main-nav"></nav>

    <div class="p-6">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center space-x-4">
                <h2 class="text-2xl font-bold text-gray-800" id="week-title">本週班表看板</h2>
                <input type="date" id="week-picker" class="border border-gray-300 rounded px-3 py-1.5 outline-none font-bold text-gray-700 bg-white shadow-sm">
                <span id="db-status" class="px-2 py-1 rounded text-xs font-bold bg-yellow-100 text-yellow-600 border border-yellow-300">連線中...</span>
            </div>
            <div class="flex space-x-3">
                <button id="btn-copy-prev" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded shadow-sm font-bold flex items-center transition" title="複製上週班表">📋 複製上週</button>
                <button id="btn-auto" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded shadow-sm font-bold flex items-center transition" title="執行滾動式排休與夜班分配">✨ 智慧滾動替休制</button>
                <button id="btn-save" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded shadow-sm font-bold flex items-center transition">💾 儲存並發布</button>
            </div>
        </div>

        <div class="bg-orange-50 border border-orange-200 rounded-lg p-3 mb-4 shadow-sm flex flex-wrap gap-x-6 gap-y-2 text-sm text-orange-900 font-bold">
            💡 <strong>排班策略提示：</strong>已啟用「滾動式排休」。系統會將休假日均勻打散至每日，並確保每天有 1 名夜班駕駛與適當的替班 (REL) 人力。老闆帳號將自動保留為待命救援。
        </div>

        <div class="overflow-x-auto rounded-lg shadow border border-gray-200">
            <table id="roster-table">
                <thead>
                    <tr>
                        <th style="width: 16%;">駕駛姓名</th>
                        <th style="width: 12%;">星期一</th><th style="width: 12%;">星期二</th><th style="width: 12%;">星期三</th>
                        <th style="width: 12%;">星期四</th><th style="width: 12%;">星期五</th><th style="width: 12%;">星期六</th>
                        <th style="width: 12%;">星期日</th>
                    </tr>
                </thead>
                <tbody id="roster-body"></tbody>
            </table>
        </div>
    </div>

   <script type="module">
    import { db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, setDoc, getDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, renderNavbar } from './auth.js';

    const allowedRoles = ['總公司', '站長', '調度員']; 

    checkAuthAndGetRole(allowedRoles).then((user) => {
        document.body.style.display = 'block';
        renderNavbar(user, 'schedule');

        const dbStatusEl = document.getElementById('db-status');
        let isDirty = false;
        
        document.getElementById('roster-table').addEventListener('change', (e) => {
            if (e.target.tagName === 'SELECT') silentAutoSave();
        });

        async function silentAutoSave() {
            const rosterToSave = {};
            currentDrivers.forEach(driver => {
                rosterToSave[driver.empId] = { name: driver.name };
                daysOfWeek.forEach(day => {
                    const safeEmpId = String(driver.empId).replace(/[^a-zA-Z0-9]/g, '_');
                    const selectEl = document.getElementById(`sel-${safeEmpId}-${day}`);
                    if (selectEl) rosterToSave[driver.empId][day] = selectEl.value;
                });
            });

            try {
                await setDoc(doc(db, "weekly_schedules", currentWeekId), { 
                    roster: rosterToSave, 
                    updatedAt: new Date().toISOString() 
                }, { merge: true });
                dbStatusEl.innerText = "✅ 即時已存檔";
                setTimeout(() => dbStatusEl.innerText = "資料庫已連線", 2000);
            } catch (err) { console.error("背景存檔失敗:", err); }
        }

        let currentDrivers = [];
        let currentWeekId = "";
        const daysOfWeek = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];

        const shiftOptions = [
            { val: "M (早)", class: "shift-M" },
            { val: "A (中)", class: "shift-A" },
            { val: "E (晚)", class: "shift-E" },
            { val: "N (夜)", class: "shift-N" },
            { val: "REL (替班)", class: "shift-REL" }, 
            { val: "STB (待命)", class: "shift-STB" },
            { val: "OFF (休)", class: "shift-OFF" }
        ];

        window.getShiftClass = function(val) {
            const opt = shiftOptions.find(o => o.val === val);
            return opt ? opt.class : 'shift-OFF';
        };

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('week-picker').value = today;
        updateWeekTitle(today);

        async function init() {
            await fetchDrivers();
            await loadSchedule(currentWeekId);
        }
        init();

        document.getElementById('week-picker').addEventListener('change', async (e) => {
            updateWeekTitle(e.target.value);
            await loadSchedule(currentWeekId); 
        });

        function getWeekStr(dateStr) {
            const d = new Date(dateStr);
            const target = new Date(d.valueOf());
            const dayNr = (d.getDay() + 6) % 7;
            target.setDate(target.getDate() - dayNr + 3);
            const firstThursday = target.valueOf();
            target.setMonth(0, 1);
            if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
            const weekNo = 1 + Math.ceil((firstThursday - target) / 604800000);
            return `${d.getFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
        }

        function updateWeekTitle(dateStr) {
            currentWeekId = getWeekStr(dateStr);
            document.getElementById('week-title').innerText = `本週班表看板 (${currentWeekId})`;
        }

        async function fetchDrivers() {
            try {
                const qStr = query(collection(db, "Drivers"), where("status", "==", "active"));
                const snap = await getDocs(qStr);
                currentDrivers = [];
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const role = data.role || "駕駛長"; 
                    if (role === "駕駛長") currentDrivers.push({ empId: docSnap.id, name: data.name });
                });
                currentDrivers.sort((a, b) => String(a.empId).localeCompare(String(b.empId)));
                dbStatusEl.className = "px-2 py-1 rounded text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
                dbStatusEl.innerText = "資料庫已連線";
            } catch (error) {
                dbStatusEl.className = "px-2 py-1 rounded text-xs font-bold bg-red-100 text-red-700 border border-red-300";
                dbStatusEl.innerText = "連線失敗";
            }
        }

        function generateSelectHtml(empId, dayKey, selectedValue = "OFF (休)") {
            let optionsHtml = '';
            let currentClass = 'shift-OFF';
            shiftOptions.forEach(opt => {
                const isSelected = (opt.val === selectedValue);
                if (isSelected) currentClass = opt.class;
                optionsHtml += `<option value="${opt.val}" ${isSelected ? 'selected' : ''}>${opt.val}</option>`;
            });
            const safeEmpId = String(empId).replace(/[^a-zA-Z0-9]/g, '_');
            return `<select id="sel-${safeEmpId}-${dayKey}" class="${currentClass}" onchange="this.className = window.getShiftClass(this.value); silentAutoSave();">${optionsHtml}</select>`;
        }

        async function loadSchedule(weekId) {
            const tbody = document.getElementById('roster-body');
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500 font-bold">載入中，請稍候...</td></tr>';
            try {
                const docSnap = await getDoc(doc(db, "weekly_schedules", weekId));
                const data = docSnap.data();
                const savedRoster = (data && data.roster) ? data.roster : {};

                tbody.innerHTML = '';
                currentDrivers.forEach(driver => {
                    const row = document.createElement('tr');
                    let html = `<td class="driver-cell"><span class="emp-id">${driver.empId}</span> ${driver.name}</td>`;
                    daysOfWeek.forEach(day => {
                        const savedShift = (savedRoster[driver.empId] && savedRoster[driver.empId][day]) ? savedRoster[driver.empId][day] : "OFF (休)";
                        html += `<td>${generateSelectHtml(driver.empId, day, savedShift)}</td>`;
                    });
                    row.innerHTML = html;
                    tbody.appendChild(row);
                });
            } catch (error) { tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-red-500 font-bold">讀取錯誤</td></tr>'; }
        }

        // ==========================================
        // ✨ 終極版智慧滾動替休制 (均勻打散、夜班防呆、老闆救援)
        // ==========================================
        document.getElementById('btn-auto').addEventListener('click', () => {
            if(!confirm("確定要執行「智慧滾動替休制」排班嗎？\n系統將為您均勻打散休假、自動分配每日1名夜班，並設定通用的替班(REL)儲備人力！")) return;
            
            // 排除老闆帳號，取得需要參與滾動排班的基層駕駛
            const isBoss = (d) => d.empId === '0000(jun)' || d.empId === '0000' || d.name.toUpperCase().includes('JUN') || d.name.includes('老闆');
            const totalDrivers = currentDrivers.filter(d => !isBoss(d));
            const D = totalDrivers.length;
            
            if(D < 3) {
                alert("⚠️ 駕駛人數過少，無法執行均勻打散排班！");
                return;
            }

            // 建立 7天 x D駕駛 的空白陣列
            let sched = Array(D).fill(null).map(() => Array(7).fill(""));

            // 1. 分配休假 (OFF) - 每人2天連假，利用錯位平均打散到週一至週日
            for(let i = 0; i < D; i++) {
                let off1 = (i * 2) % 7;
                let off2 = (off1 + 1) % 7;
                sched[i][off1] = "OFF (休)";
                sched[i][off2] = "OFF (休)";
            }

            // 2. 分配夜班 (N) - 每天精準分配 1 名，優先挑選「明天休假」的人以避開 N接M
            let lastN = -1;
            for(let day = 0; day < 7; day++) {
                let cand = lastN;
                // 若上一位夜班駕駛今天休假，或尚未指派，則尋找新駕駛
                if (cand === -1 || sched[cand][day] === "OFF (休)") {
                    cand = -1;
                    // 第一志願：今天沒休，且明天休假 (最安全的夜班落點)
                    for(let i = 0; i < D; i++) {
                        if (sched[i][day] !== "OFF (休)" && sched[i][(day + 1) % 7] === "OFF (休)") {
                            cand = i; break;
                        }
                    }
                    // 備案：隨便找一個今天沒休假的人
                    if (cand === -1) {
                        for(let i = 0; i < D; i++) {
                            if (sched[i][day] !== "OFF (休)") { cand = i; break; }
                        }
                    }
                }
                if (cand !== -1) {
                    sched[cand][day] = "N (夜)";
                    lastN = cand;
                }
            }

            // 3. 分配底班 (M, A, E, REL) 填滿剩下的空班
            // 為了防呆，只要這週有上夜班的人，其底班絕對不能是早(M)或中(A)，一律給晚(E)或替班(REL)
            const safeBases = ["E (晚)", "REL (替班)"];
            const normalBases = ["M (早)", "A (中)", "E (晚)", "REL (替班)"];

            for(let i = 0; i < D; i++) {
                let hasNight = sched[i].includes("N (夜)");
                let baseShift = hasNight ? safeBases[i % safeBases.length] : normalBases[i % normalBases.length];
                
                for(let day = 0; day < 7; day++) {
                    if (sched[i][day] === "") {
                        sched[i][day] = baseShift;
                    }
                }
            }

            // 4. 將陣列資料寫回 DOM 畫面
            currentDrivers.forEach((driver) => {
                let dIndex = totalDrivers.findIndex(d => d.empId === driver.empId);
                
                daysOfWeek.forEach((dayStr, dayIndex) => {
                    const safeEmpId = String(driver.empId).replace(/[^a-zA-Z0-9]/g, '_');
                    const selectEl = document.getElementById(`sel-${safeEmpId}-${dayStr}`);
                    
                    if (selectEl) {
                        if (isBoss(driver)) {
                            selectEl.value = 'STB (待命)'; // 老闆永遠待命救援
                        } else if (dIndex !== -1) {
                            selectEl.value = sched[dIndex][dayIndex];
                        }
                        selectEl.className = window.getShiftClass(selectEl.value);
                    }
                });
            });

            isDirty = true;
            silentAutoSave();
            alert("✅ 滾動替休排班已完成！\n休假已完美打散，每日皆有夜班與替補人力配置。");
        });

        // ==========================================
        // 💾 儲存與嚴格防呆審核
        // ==========================================
        document.getElementById('btn-save').addEventListener('click', async () => {
            const rosterToSave = {};
            let hasViolation = false;
            let violationMsg = "";

            currentDrivers.forEach(driver => {
                rosterToSave[driver.empId] = { name: driver.name };
                let prevShift = ""; 
                let offCount = 0; 
                
                daysOfWeek.forEach(day => {
                    const safeEmpId = String(driver.empId).replace(/[^a-zA-Z0-9]/g, '_');
                    const selectEl = document.getElementById(`sel-${safeEmpId}-${day}`);
                    if (selectEl) {
                        const currentShift = selectEl.value;
                        rosterToSave[driver.empId][day] = currentShift;
                        if (currentShift === "OFF (休)") offCount++;

                        if (prevShift === "E (晚)" && (currentShift === "M (早)" || currentShift === "A (中)")) {
                            hasViolation = true;
                            violationMsg += `⚠️ [${driver.name}] 違規：前日晚班(E)，今日不可接早/中班，違反11小時休息間隔！\n`;
                        }
                        if (prevShift === "N (夜)" && (currentShift === "M (早)" || currentShift === "A (中)" || currentShift === "E (晚)")) {
                            hasViolation = true;
                            violationMsg += `⚠️ [${driver.name}] 違規：前日夜班(N)，隔日必須排休、待命或替班，不可連續常態出勤！\n`;
                        }
                        prevShift = currentShift; 
                    }
                });

                const isBoss = driver.empId === '0000(jun)' || driver.empId === '0000' || driver.name.toUpperCase().includes('JUN') || driver.name.includes('老闆');
                if (offCount === 0 && !isBoss) {
                    hasViolation = true;
                    violationMsg += `🛑 [${driver.name}] 嚴重違規：本週無排定休假，違反七休一規定！\n`;
                }
            });

            if (hasViolation) {
                alert("❌ 儲存失敗！系統偵測到高風險/違法排班：\n\n" + violationMsg);
                return;
            }

            const btn = document.getElementById('btn-save');
            btn.innerText = "⏳ 儲存中..."; btn.disabled = true;
            try {
                await setDoc(doc(db, "weekly_schedules", currentWeekId), { roster: rosterToSave, updatedAt: new Date().toISOString() });
                isDirty = false; 
                alert("✅ 班表已成功儲存！法規檢核全數通過！");
            } catch (err) { alert("❌ 儲存失敗！"); }
            btn.innerText = "💾 儲存並發布"; btn.disabled = false;
        });

        document.getElementById('btn-copy-prev').addEventListener('click', async () => { 
            if(!confirm("確定要載入「上週」底稿嗎？")) return;
            const d = new Date(document.getElementById('week-picker').value);
            d.setDate(d.getDate() - 7);
            const prevWeekId = getWeekStr(d.toISOString());

            try {
                const docSnap = await getDoc(doc(db, "weekly_schedules", prevWeekId));
                const data = docSnap.data();
                
                if (data && data.roster) {
                    currentDrivers.forEach(driver => {
                        daysOfWeek.forEach(day => {
                            if (data.roster[driver.empId] && data.roster[driver.empId][day]) {
                                const shift = data.roster[driver.empId][day];
                                const safeEmpId = String(driver.empId).replace(/[^a-zA-Z0-9]/g, '_');
                                const selectEl = document.getElementById(`sel-${safeEmpId}-${day}`);
                                if (selectEl) {
                                    selectEl.value = shift;
                                    selectEl.className = window.getShiftClass(shift);
                                }
                            }
                        });
                    });
                    isDirty = true;
                    silentAutoSave();
                    alert(`✅ 已載入上週 (${prevWeekId}) 班表！`);
                } else {
                    alert(`⚠️ 雲端找不到上週 (${prevWeekId}) 紀錄！`);
                }
            } catch (err) { console.error(err); alert("讀取失敗。"); }
        });
    });
   </script>
</body>
</html>

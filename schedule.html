<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車輛調度系統 - 週班表管理 (台灣客運實務版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Noto Sans TC", "微軟正黑體", sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; display: none; }
        .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
        .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; }
        .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block; white-space: nowrap; }
        .navbar a.nav-link:hover { background-color: #374151; color: white; }
        .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}

        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th { background-color: #f8fafc; color: #374151; font-weight: bold; padding: 12px; border: 1px solid #e2e8f0; font-size: 14px; text-align: center; }
        td { border: 1px solid #e2e8f0; padding: 0; } 
        
        select { width: 100%; height: 48px; border: none; outline: none; text-align: center; font-weight: bold; cursor: pointer; appearance: none; -webkit-appearance: none; padding: 0 10px; }
        
        /* 班別色彩管理 */
        .shift-M { background-color: #93c5fd; color: #1e3a8a; }   
        .shift-A { background-color: #fde047; color: #854d0e; }   
        .shift-E { background-color: #fca5a5; color: #7f1d1d; }   
        .shift-N { background-color: #c084fc; color: #4c1d95; }   
        .shift-OFF { background-color: #e5e7eb; color: #374151; } 
        .shift-STB { background-color: #cbd5e1; color: #334155; } 
        .shift-REL { background-color: #f97316; color: #ffffff; } 
        
        .driver-cell { padding: 0 16px; text-align: left; font-weight: bold; color: #1f2937; background-color: #f8fafc; }
        .emp-id { color: #6b7280; font-family: monospace; margin-right: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <nav class="navbar" id="main-nav"></nav>

    <div class="p-6">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center space-x-4">
                <h2 class="text-2xl font-bold text-gray-800" id="week-title">本週班表看板</h2>
                <input type="date" id="week-picker" class="border border-gray-300 rounded px-3 py-1.5 outline-none font-bold text-gray-700 bg-white shadow-sm">
                <span id="db-status" class="px-2 py-1 rounded text-xs font-bold bg-yellow-100 text-yellow-600 border border-yellow-300">連線中...</span>
            </div>
            <div class="flex space-x-3">
                <button id="btn-copy-prev" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded shadow-sm font-bold flex items-center transition" title="複製上週班表">📋 複製上週</button>
                <button id="btn-auto" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded shadow-sm font-bold flex items-center transition" title="執行台灣客運實務排休與專職分配">✨ 智慧實務排班 (固定班+散休)</button>
                <button id="btn-save" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded shadow-sm font-bold flex items-center transition">💾 儲存並發布</button>
            </div>
        </div>

        <div class="bg-orange-50 border border-orange-200 rounded-lg p-3 mb-4 shadow-sm flex flex-wrap gap-x-6 gap-y-2 text-sm text-orange-900 font-bold">
            💡 <strong>排班策略提示：</strong>已啟用「台灣客運實務制」。系統將固定每位駕駛的底班（早/中/晚/夜/替），並採「散休」機制確保不連續休假防疲勞，且每天皆會自動保留老闆為待命救援。
        </div>

        <div class="overflow-x-auto rounded-lg shadow border border-gray-200">
            <table id="roster-table">
                <thead>
                    <tr>
                        <th style="width: 16%;">駕駛姓名</th>
                        <th style="width: 12%;">星期一</th><th style="width: 12%;">星期二</th><th style="width: 12%;">星期三</th>
                        <th style="width: 12%;">星期四</th><th style="width: 12%;">星期五</th><th style="width: 12%;">星期六</th>
                        <th style="width: 12%;">星期日</th>
                    </tr>
                </thead>
                <tbody id="roster-body"></tbody>
                <tfoot class="bg-gray-800 text-white font-bold text-sm">
                  <tr>
                    <td class="text-right py-3 px-4 rounded-bl-lg">📊 每日可用人力統計：</td>
                    <td id="count-1" class="text-center py-3">--</td>
                    <td id="count-2" class="text-center py-3">--</td>
                    <td id="count-3" class="text-center py-3">--</td>
                    <td id="count-4" class="text-center py-3">--</td>
                    <td id="count-5" class="text-center py-3">--</td>
                    <td id="count-6" class="text-center py-3">--</td>
                    <td id="count-7" class="text-center py-3 rounded-br-lg">--</td>
                  </tr>
                </tfoot>
              </table>
        </div>
    </div>

   <script type="module">
    import { db } from './firebase-init.js';
    import { collection, query, doc, setDoc, getDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, renderNavbar } from './auth.js';

    const allowedRoles = ['總公司', '站長', '調度員']; 
    const MIN_REQUIRED_DRIVERS = 6; 

    checkAuthAndGetRole(allowedRoles).then((user) => {
        document.body.style.display = 'block';
        renderNavbar(user, 'schedule');

        const dbStatusEl = document.getElementById('db-status');
        let isDirty = false;
        let currentDrivers = [];
        let currentWeekId = "";
        const daysOfWeek = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];

        const shiftOptions = [
            { val: "M (早)", class: "shift-M" },
            { val: "A (中)", class: "shift-A" },
            { val: "E (晚)", class: "shift-E" },
            { val: "N (夜)", class: "shift-N" },
            { val: "REL (替班)", class: "shift-REL" }, 
            { val: "STB (待命)", class: "shift-STB" },
            { val: "OFF (休)", class: "shift-OFF" }
        ];

        window.getShiftClass = function(val) {
            const opt = shiftOptions.find(o => o.val === val);
            return opt ? opt.class : 'shift-OFF';
        };

        // 監聽表格變動，觸發自動存檔與防呆檢查
        document.getElementById('roster-table').addEventListener('change', (e) => {
            if (e.target.tagName === 'SELECT') {
                silentAutoSave();
                runScheduleChecks(); 
            }
        });

        async function silentAutoSave() {
            const rosterToSave = {};
            currentDrivers.forEach(driver => {
                rosterToSave[driver.empId] = { name: driver.name };
                daysOfWeek.forEach(day => {
                    const safeEmpId = String(driver.empId).replace(/[^a-zA-Z0-9]/g, '_');
                    const selectEl = document.getElementById(`sel-${safeEmpId}-${day}`);
                    if (selectEl) rosterToSave[driver.empId][day] = selectEl.value;
                });
            });

            try {
                await setDoc(doc(db, "weekly_schedules", currentWeekId), { 
                    roster: rosterToSave, 
                    updatedAt: new Date().toISOString() 
                }, { merge: true });
                dbStatusEl.innerText = "✅ 即時已存檔";
                setTimeout(() => dbStatusEl.innerText = "資料庫已連線", 2000);
            } catch (err) { console.error("背景存檔失敗:", err); }
        }

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('week-picker').value = today;
        updateWeekTitle(today);

        async function init() {
            await fetchDrivers();
            await loadSchedule(currentWeekId);
        }
        init();

        document.getElementById('week-picker').addEventListener('change', async (e) => {
            updateWeekTitle(e.target.value);
            await loadSchedule(currentWeekId); 
        });

        function getWeekStr(dateStr) {
            const d = new Date(dateStr);
            const target = new Date(d.valueOf());
            const dayNr = (d.getDay() + 6) % 7;
            target.setDate(target.getDate() - dayNr + 3);
            const firstThursday = target.valueOf();
            target.setMonth(0, 1);
            if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
            const weekNo = 1 + Math.ceil((firstThursday - target) / 604800000);
            return `${d.getFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
        }

        function updateWeekTitle(dateStr) {
            currentWeekId = getWeekStr(dateStr);
            document.getElementById('week-title').innerText = `本週班表看板 (${currentWeekId})`;
        }

        function getWeekDatesFromPicker() {
            const dateValue = document.getElementById('week-picker').value;
            const d = new Date(dateValue);
            const day = d.getDay() === 0 ? 7 : d.getDay();
            const targetMon = new Date(d);
            targetMon.setDate(d.getDate() - day + 1);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const tempD = new Date(targetMon);
                tempD.setDate(targetMon.getDate() + i);
                dates.push(tempD.toISOString().split('T')[0]);
            }
            return dates;
        }

        async function fetchDrivers() {
            try {
                const qStr = query(collection(db, "Drivers"), where("status", "==", "active"));
                const snap = await getDocs(qStr);
                currentDrivers = [];
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const role = data.role || "駕駛長"; 
                    if (role === "駕駛長") currentDrivers.push({ empId: docSnap.id, name: data.name });
                });
                currentDrivers.sort((a, b) => String(a.empId).localeCompare(String(b.empId)));
                dbStatusEl.className = "px-2 py-1 rounded text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
                dbStatusEl.innerText = "資料庫已連線";
            } catch (error) {
                dbStatusEl.className = "px-2 py-1 rounded text-xs font-bold bg-red-100 text-red-700 border border-red-300";
                dbStatusEl.innerText = "連線失敗";
            }
        }

        function generateSelectHtml(empId, dayKey, selectedValue = "OFF (休)") {
            let optionsHtml = '';
            let currentClass = 'shift-OFF';
            shiftOptions.forEach(opt => {
                const isSelected = (opt.val === selectedValue);
                if (isSelected) currentClass = opt.class;
                optionsHtml += `<option value="${opt.val}" ${isSelected ? 'selected' : ''}>${opt.val}</option>`;
            });
            const safeEmpId = String(empId).replace(/[^a-zA-Z0-9]/g, '_');
            return `<select id="sel-${safeEmpId}-${dayKey}" class="${currentClass}" onchange="this.className = window.getShiftClass(this.value);">${optionsHtml}</select>`;
        }

        async function loadSchedule(weekId) {
            const tbody = document.getElementById('roster-body');
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500 font-bold">載入中，請稍候...</td></tr>';
            try {
                const docSnap = await getDoc(doc(db, "weekly_schedules", weekId));
                const data = docSnap.data();
                const savedRoster = (data && data.roster) ? data.roster : {};

                tbody.innerHTML = '';
                currentDrivers.forEach(driver => {
                    const row = document.createElement('tr');
                    let html = `<td class="driver-cell"><span class="emp-id">${driver.empId}</span> ${driver.name}</td>`;
                    daysOfWeek.forEach(day => {
                        const savedShift = (savedRoster[driver.empId] && savedRoster[driver.empId][day]) ? savedRoster[driver.empId][day] : "OFF (休)";
                        html += `<td>${generateSelectHtml(driver.empId, day, savedShift)}</td>`;
                    });
                    row.innerHTML = html;
                    tbody.appendChild(row);
                });
                
                // 表格畫完後，打上假單補丁，並執行防呆檢查
                await syncApprovedLeavesToSchedule(); 

            } catch (error) { 
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-red-500 font-bold">讀取錯誤</td></tr>'; 
            }
        }

        // ================= 統整防呆與視覺輔助 =================
        function runScheduleChecks() {
            calculateDailyManpower();  
            checkRestTimeViolations(); 
        }

        function calculateDailyManpower() {
            const tbody = document.getElementById('roster-body'); 
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');
            let availableCounts = [0, 0, 0, 0, 0, 0, 0];

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                for (let i = 1; i <= 7; i++) {
                    if (cells[i]) {
                        const cellText = cells[i].innerText || cells[i].querySelector('select')?.value || "";
                        if (cellText.trim() !== "" && !cellText.includes('OFF') && !cellText.includes('休')) {
                            availableCounts[i - 1]++; 
                        }
                    }
                }
            });

            for (let i = 1; i <= 7; i++) {
                const count = availableCounts[i - 1];
                const countCell = document.getElementById(`count-${i}`);
                if (countCell) {
                    countCell.innerText = `${count} 人`;
                    if (count >= MIN_REQUIRED_DRIVERS) {
                        countCell.className = "text-center py-3 bg-emerald-600 text-white transition-colors"; 
                    } else if (count === MIN_REQUIRED_DRIVERS - 1) {
                        countCell.className = "text-center py-3 bg-amber-400 text-gray-900 transition-colors"; 
                    } else {
                        countCell.className = "text-center py-3 bg-rose-600 text-white underline decoration-wavy transition-colors"; 
                    }
                }
            }
        }

        function checkRestTimeViolations() {
            const tbody = document.getElementById('roster-body'); 
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                for (let i = 1; i <= 7; i++) {
                    if (cells[i]) {
                        cells[i].classList.remove('ring-4', 'ring-red-600', 'ring-inset', 'relative');
                        const warningIcon = cells[i].querySelector('.violation-warning');
                        if (warningIcon) warningIcon.remove();
                    }
                }

                for (let i = 1; i <= 6; i++) {
                    if (cells[i] && cells[i+1]) {
                        const todayText = cells[i].innerText || cells[i].querySelector('select')?.value || "";
                        const tomorrowText = cells[i+1].innerText || cells[i+1].querySelector('select')?.value || "";

                        const isTodayLate = todayText.includes('E') || todayText.includes('N') || todayText.includes('晚') || todayText.includes('夜');
                        const isTomorrowEarly = tomorrowText.includes('M') || tomorrowText.includes('早');

                        if (isTodayLate && isTomorrowEarly) {
                            cells[i].classList.add('ring-4', 'ring-red-600', 'ring-inset', 'relative');
                            cells[i+1].classList.add('ring-4', 'ring-red-600', 'ring-inset', 'relative');
                            if (!cells[i+1].querySelector('.violation-warning')) {
                                cells[i+1].insertAdjacentHTML('beforeend', 
                                    `<span class="violation-warning absolute top-1 right-1 text-[10px] cursor-help" title="⚠️ 法規地雷：晚接早，班距休息時間不足 10 小時！">🚨</span>`
                                );
                            }
                        }
                    }
                }
            });
        }

        async function syncApprovedLeavesToSchedule() {
            const leaveRequestsCol = collection(db, "leave_requests");
            const q = query(leaveRequestsCol, where("status", "==", "已核准"));
            const snapshot = await getDocs(q);
            
            const approvedLeaves = {};
            snapshot.forEach(doc => {
                const data = doc.data();
                if (!approvedLeaves[data.empId]) approvedLeaves[data.empId] = {};
                approvedLeaves[data.empId][data.date] = data.type; 
            });

            const tbody = document.getElementById('roster-body');
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');
            const currentWeekDates = getWeekDatesFromPicker();

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                const driverInfo = cells[0].innerText; 
                const empId = driverInfo.split(' ')[0]; 

                if (approvedLeaves[empId]) {
                    for (let i = 1; i <= 7; i++) {
                        const cellDate = currentWeekDates[i - 1]; 
                        if (approvedLeaves[empId][cellDate]) {
                            const leaveType = approvedLeaves[empId][cellDate]; 
                            const selectEl = cells[i].querySelector('select');
                            if (selectEl) {
                                selectEl.value = 'OFF (休)'; 
                                selectEl.disabled = true; 
                            }
                            cells[i].className = "text-center py-2 bg-gray-200 opacity-80 cursor-not-allowed border-b border-gray-300 relative";
                            cells[i].innerHTML = `
                                <div class="flex flex-col items-center justify-center">
                                    <span class="font-bold text-gray-500">OFF (休)</span>
                                    <span class="mt-1 px-1.5 py-0.5 text-[10px] bg-purple-100 text-purple-700 font-bold rounded shadow-sm border border-purple-200">
                                        🔒 ${leaveType}
                                    </span>
                                </div>
                            `;
                        }
                    }
                }
            });

            runScheduleChecks();
        }

        // ================= 按鈕事件 =================
        document.getElementById('btn-auto').addEventListener('click', async () => {
            const dateValue = document.getElementById('week-picker').value; 
            if (!dateValue) return alert("請先選擇日期！");

            const weekDatesArr = getWeekDatesFromPicker();
            const weekDates = {};
            for(let i=0; i<7; i++){
                weekDates[daysOfWeek[i]] = weekDatesArr[i];
            }

            const approvedLeaves = {}; 
            try {
                const leaveQuery = query(collection(db, "leave_requests"), where("status", "==", "已核准"));
                const leaveSnap = await getDocs(leaveQuery);
                leaveSnap.forEach(docSnap => {
                    const data = docSnap.data();
                    for (let dayKey of daysOfWeek) {
                        if (weekDates[dayKey] === data.date) {
                            if (!approvedLeaves[data.empId]) approvedLeaves[data.empId] = {};
                            approvedLeaves[data.empId][dayKey] = data.type || "OFF (休)";
                        }
                    }
                });
            } catch (err) {
                console.error("撈取請假單失敗:", err);
                return alert("連線失敗，無法取得請假資料，終止自動排班！");
            }

            const baseShifts = ["M (早)", "A (中)", "E (晚)", "N (夜)", "REL (替班)"];
            
            currentDrivers.forEach((driver, index) => {
                const safeEmpId = String(driver.empId).replace(/[^a-zA-Z0-9]/g, '_');
                const isBoss = driver.empId === '0000(jun)' || driver.empId === '0000' || driver.name.toUpperCase().includes('JUN');
                const myBaseShift = baseShifts[index % baseShifts.length];
                const randomOffDayIndex = Math.floor(Math.random() * 7);
                const myOffDay = daysOfWeek[randomOffDayIndex];

                daysOfWeek.forEach(day => {
                    const selectEl = document.getElementById(`sel-${safeEmpId}-${day}`);
                    if (!selectEl || selectEl.disabled) return; // 若已被假單鎖定則跳過

                    if (approvedLeaves[driver.empId] && approvedLeaves[driver.empId][day]) {
                        return; // 保險機制
                    }

                    if (isBoss) {
                        selectEl.value = "STB (待命)";
                        selectEl.className = window.getShiftClass("STB (待命)");
                        return;
                    }

                    if (day === myOffDay) {
                        selectEl.value = "OFF (休)";
                        selectEl.className = window.getShiftClass("OFF (休)");
                        return;
                    }

                    selectEl.value = myBaseShift;
                    selectEl.className = window.getShiftClass(myBaseShift);
                });
            });

            isDirty = true;
            silentAutoSave();
            runScheduleChecks();
            alert("✨ 智慧實務排班完成！\n已自動保留核准假單，並分配底班與散休。");
        });

        document.getElementById('btn-save').addEventListener('click', async () => {
            const rosterToSave = {};
            let hasViolation = false;
            let violationMsg = "";

            const d = new Date(document.getElementById('week-picker').value);
            d.setDate(d.getDate() - 7);
            const prevWeekId = getWeekStr(d.toISOString());
            let lastWeekRoster = {};
            try {
                const snap = await getDoc(doc(db, "weekly_schedules", prevWeekId));
                if (snap.exists()) lastWeekRoster = snap.data().roster || {};
            } catch (e) { console.warn("無法取得上週班表"); }

            currentDrivers.forEach(driver => {
                rosterToSave[driver.empId] = { name: driver.name };
                let prevShift = (lastWeekRoster[driver.empId] && lastWeekRoster[driver.empId]['sun']) 
                                ? lastWeekRoster[driver.empId]['sun'] 
                                : "OFF (休)";
                let offCount = 0; 
                
                daysOfWeek.forEach(day => {
                    const safeEmpId = String(driver.empId).replace(/[^a-zA-Z0-9]/g, '_');
                    const tdEl = document.getElementById(`sel-${safeEmpId}-${day}`)?.parentElement;
                    
                    // 如果被鎖定(請假)，抓取內部字串判斷
                    let currentShift = "OFF (休)";
                    const selectEl = document.getElementById(`sel-${safeEmpId}-${day}`);
                    
                    if (selectEl) {
                        currentShift = selectEl.value;
                    } else if (tdEl && tdEl.innerText.includes("OFF")) {
                        currentShift = "OFF (休)";
                    }

                    rosterToSave[driver.empId][day] = currentShift;
                    if (currentShift.includes("OFF") || currentShift.includes("休")) offCount++;

                    if (prevShift.includes("E") && (currentShift.includes("M") || currentShift.includes("A"))) {
                        hasViolation = true;
                        violationMsg += `⚠️ [${driver.name}] 違規：前日晚班，今日不可接早/中班！\n`;
                    }
                    if (prevShift.includes("N") && (currentShift.includes("M") || currentShift.includes("A") || currentShift.includes("E"))) {
                        hasViolation = true;
                        violationMsg += `⚠️ [${driver.name}] 違規：前日夜班，隔日不可連續常態出勤！\n`;
                    }
                    prevShift = currentShift; 
                });

                const isBoss = driver.empId === '0000(jun)' || driver.empId === '0000' || driver.name.toUpperCase().includes('JUN');
                if (offCount === 0 && !isBoss) {
                    hasViolation = true;
                    violationMsg += `🛑 [${driver.name}] 嚴重違規：本週無排定休假！\n`;
                }
            });

            if (hasViolation) {
                alert("❌ 儲存失敗！系統偵測到高風險/違法排班：\n\n" + violationMsg);
                return;
            }

            const btn = document.getElementById('btn-save');
            btn.innerText = "⏳ 儲存中..."; btn.disabled = true;
            try {
                await setDoc(doc(db, "weekly_schedules", currentWeekId), { roster: rosterToSave, updatedAt: new Date().toISOString() });
                isDirty = false; 
                alert("✅ 班表已成功儲存！跨週法規檢核全數通過！");
            } catch (err) { alert("❌ 儲存失敗！"); }
            btn.innerText = "💾 儲存並發布"; btn.disabled = false;
        });

        document.getElementById('btn-copy-prev').addEventListener('click', async () => { 
            if(!confirm("確定要載入「上週」底稿嗎？")) return;
            const d = new Date(document.getElementById('week-picker').value);
            d.setDate(d.getDate() - 7);
            const prevWeekId = getWeekStr(d.toISOString());

            try {
                const docSnap = await getDoc(doc(db, "weekly_schedules", prevWeekId));
                const data = docSnap.data();
                
                if (data && data.roster) {
                    currentDrivers.forEach(driver => {
                        daysOfWeek.forEach(day => {
                            if (data.roster[driver.empId] && data.roster[driver.empId][day]) {
                                const shift = data.roster[driver.empId][day];
                                const safeEmpId = String(driver.empId).replace(/[^a-zA-Z0-9]/g, '_');
                                const selectEl = document.getElementById(`sel-${safeEmpId}-${day}`);
                                if (selectEl && !selectEl.disabled) {
                                    selectEl.value = shift;
                                    selectEl.className = window.getShiftClass(shift);
                                }
                            }
                        });
                    });
                    isDirty = true;
                    silentAutoSave();
                    runScheduleChecks();
                    alert(`✅ 已載入上週 (${prevWeekId}) 班表！`);
                } else {
                    alert(`⚠️ 雲端找不到上週 (${prevWeekId}) 紀錄！`);
                }
            } catch (err) { console.error(err); alert("讀取失敗。"); }
        });
    });
   </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車輛調度系統 - 週班表管理 (台灣客運實務版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Noto Sans TC", "微軟正黑體", sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; display: none; }
        .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
        .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; }
        .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block; white-space: nowrap; }
        .navbar a.nav-link:hover { background-color: #374151; color: white; }
        .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}

        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th { background-color: #f8fafc; color: #374151; font-weight: bold; padding: 12px; border: 1px solid #e2e8f0; font-size: 14px; text-align: center; }
        td { border: 1px solid #e2e8f0; padding: 0; } 
        
        select { width: 100%; height: 48px; border: none; outline: none; text-align: center; font-weight: bold; cursor: pointer; appearance: none; -webkit-appearance: none; padding: 0 10px; }
        
        /* 班別色彩管理 */
        .shift-M { background-color: #93c5fd; color: #1e3a8a; }   /* 早班 */
        .shift-A { background-color: #fde047; color: #854d0e; }   /* 中班 */
        .shift-E { background-color: #fca5a5; color: #7f1d1d; }   /* 晚班 */
        .shift-N { background-color: #c084fc; color: #4c1d95; }   /* 夜班 */
        .shift-OFF { background-color: #e5e7eb; color: #374151; } /* 休假 */
        .shift-STB { background-color: #cbd5e1; color: #334155; } /* 待命 */
        .shift-REL { background-color: #f97316; color: #ffffff; } /* 替班 */
        
        .driver-cell { padding: 0 16px; text-align: left; font-weight: bold; color: #1f2937; background-color: #f8fafc; }
        .emp-id { color: #6b7280; font-family: monospace; margin-right: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <nav class="navbar" id="main-nav"></nav>

    <div class="p-6">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center space-x-4">
                <h2 class="text-2xl font-bold text-gray-800" id="week-title">本週班表看板</h2>
                <input type="date" id="week-picker" class="border border-gray-300 rounded px-3 py-1.5 outline-none font-bold text-gray-700 bg-white shadow-sm">
                <span id="db-status" class="px-2 py-1 rounded text-xs font-bold bg-yellow-100 text-yellow-600 border border-yellow-300">連線中...</span>
            </div>
            <div class="flex space-x-3">
                <button id="btn-copy-prev" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded shadow-sm font-bold flex items-center transition" title="複製上週班表">📋 複製上週</button>
                <button id="btn-auto" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded shadow-sm font-bold flex items-center transition" title="執行台灣客運實務排休與專職分配">✨ 智慧實務排班 (固定班+散休)</button>
                <button id="btn-save" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded shadow-sm font-bold flex items-center transition">💾 儲存並發布</button>
            </div>
        </div>

        <div class="bg-orange-50 border border-orange-200 rounded-lg p-3 mb-4 shadow-sm flex flex-wrap gap-x-6 gap-y-2 text-sm text-orange-900 font-bold">
            💡 <strong>排班策略提示：</strong>已啟用「台灣客運實務制」。系統將固定每位駕駛的底班（早/中/晚/夜/替），並採「散休」機制確保不連續休假防疲勞，且每天皆會自動保留老闆為待命救援。
        </div>

        <div class="overflow-x-auto rounded-lg shadow border border-gray-200">
            <table id="roster-table">
                <thead>
                    <tr>
                        <th style="width: 16%;">駕駛姓名</th>
                        <th style="width: 12%;">星期一</th><th style="width: 12%;">星期二</th><th style="width: 12%;">星期三</th>
                        <th style="width: 12%;">星期四</th><th style="width: 12%;">星期五</th><th style="width: 12%;">星期六</th>
                        <th style="width: 12%;">星期日</th>
                    </tr>
                </thead>
                <tbody id="roster-body"></tbody>
            </table>
        </div>
    </div>

   <script type="module">
    import { db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, updateDoc, where, getDocs, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js';

    let currentUser = null;
    let driverEmpId = ""; 
    let currentTrips = [];
    let selectedTripId = null;
    let html5QrcodeScanner = null;
    
    // 💡 新增變數：紀錄 QR 掃描狀態與站長密碼
    let isQrScanned = false; 
    const STATION_MASTER_PIN = "8888"; 

    const dateInput = document.getElementById('selectDate');
    const tripList = document.getElementById('trip-list');
    
    dateInput.value = new Date().toISOString().split('T')[0];

    checkAuthAndGetRole(['總公司', '站長', '調度員', '駕駛長']).then(async (user) => {
        currentUser = user;
        const driverName = user.name || user.displayName || user.email?.split('@')[0] || "未知駕駛"; 
        document.getElementById('driver-greeting').innerText = `👨‍✈️ 駕駛長：${driverName}`;
        
        try {
            const docSnap = await getDoc(doc(db, "Drivers", user.uid || ""));
            if (docSnap.exists()) {
                driverEmpId = docSnap.id;
            } else {
                const qD = query(collection(db, "Drivers"), where("name", "==", driverName));
                const snapD = await getDocs(qD);
                if (!snapD.empty) {
                    driverEmpId = snapD.docs[0].id;
                } else {
                    driverEmpId = driverName; 
                }
            }
        } catch(e) {
            driverEmpId = driverName;
        }
        
        loadMyTrips(dateInput.value, driverEmpId);
    }).catch(err => {
        document.body.innerHTML = `<div class="p-10 text-center"><h2 class="text-red-500 font-bold mb-4">請先完成登入</h2><a href="login.html" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">前往登入</a></div>`;
    });

    document.getElementById('btnLogout').addEventListener('click', () => { logout(); });
    dateInput.addEventListener('change', (e) => { loadMyTrips(e.target.value, driverEmpId); });

    function loadMyTrips(dateStr, empId) {
        const q = query(collection(db, "daily_dispatches"), where("date", "==", dateStr));
        
        onSnapshot(q, (snapshot) => {
            currentTrips = [];
            let pendingCount = 0;
            let checkedCount = 0;

            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if (data.assigned_empid === empId) {
                    currentTrips.push({ id: docSnap.id, ...data });
                    if (data.status === 'checked_in') checkedCount++;
                    else pendingCount++;
                }
            });

            currentTrips.sort((a, b) => (a.departure_time || "").localeCompare(b.departure_time || ""));

            document.getElementById('count-total').innerText = currentTrips.length;
            document.getElementById('count-pending').innerText = pendingCount;
            document.getElementById('count-checked').innerText = checkedCount;

            renderTripCards();
        });
    }

    function renderTripCards() {
        if (currentTrips.length === 0) {
            tripList.innerHTML = `<div class="text-center py-10 text-gray-400 font-bold">今日無排定車趟，請好好休息 ☕</div>`;
            return;
        }

        tripList.innerHTML = currentTrips.map(trip => {
            const isCheckedIn = trip.status === 'checked_in';
            const statusClass = isCheckedIn ? 'status-checked' : 'status-pending';
            const statusText = isCheckedIn ? '<span class="text-emerald-500 bg-emerald-50 px-2 py-1 rounded font-bold text-xs">✅ 已報到</span>' : '<span class="text-amber-500 bg-amber-50 px-2 py-1 rounded font-bold text-xs">⏳ 待報到</span>';
            
            const btnHtml = isCheckedIn 
                ? `<button class="btn-view-voucher w-full mt-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg text-sm transition" data-id="${trip.id}">📜 查看電子憑單</button>`
                : `<button class="btn-punch-in w-full mt-3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm transition shadow-md shadow-blue-200" data-id="${trip.id}">📱 進行報到 / 酒測</button>`;

            return `
            <div class="trip-card ${statusClass}">
                <div class="flex justify-between items-start mb-2">
                    <div class="text-2xl font-black text-gray-800">${trip.departure_time}</div>
                    ${statusText}
                </div>
                
                <div class="flex items-center gap-2 mb-3">
                    <span class="bg-indigo-100 text-indigo-700 font-black px-2 py-0.5 rounded text-sm">${trip.route}</span>
                    <span class="text-gray-500 font-bold text-sm">| ${trip.trip_count || 1} 趟</span>
                </div>
                
                <div class="text-gray-700 font-bold text-sm mb-1">📍 ${trip.start_point} ➔ ${trip.end_point}</div>
                <div class="text-gray-600 font-bold text-sm mb-3">🚌 車號：<span class="text-blue-600">${trip.assigned_vehicle}</span></div>
                
                ${btnHtml}
            </div>
            `;
        }).join('');

        document.querySelectorAll('.btn-punch-in').forEach(btn => {
            btn.addEventListener('click', (e) => openPunchModal(e.target.dataset.id));
        });
        document.querySelectorAll('.btn-view-voucher').forEach(btn => {
            btn.addEventListener('click', (e) => openVoucherModal(e.target.dataset.id));
        });
    }

    const punchModal = document.getElementById('punchModal');
    const chkAlcohol = document.getElementById('chkAlcohol');
    const chkHealth = document.getElementById('chkHealth');
    const btnSubmitPunch = document.getElementById('btnSubmitPunch');
    const btnStartScan = document.getElementById('btnStartScan');

    function checkConditions() {
        if (chkAlcohol.checked && chkHealth.checked) {
            btnSubmitPunch.disabled = false;
            btnSubmitPunch.classList.remove('opacity-50', 'cursor-not-allowed');
            btnSubmitPunch.classList.add('hover:bg-emerald-600');
        } else {
            btnSubmitPunch.disabled = true;
            btnSubmitPunch.classList.add('opacity-50', 'cursor-not-allowed');
            btnSubmitPunch.classList.remove('hover:bg-emerald-600');
        }
    }

    chkAlcohol.addEventListener('change', checkConditions);
    chkHealth.addEventListener('change', checkConditions);

    // 💡 注意：整個檔案只能有這一個 openPunchModal 函數
    function openPunchModal(tripId) {
        selectedTripId = tripId;
        chkAlcohol.checked = false;
        chkHealth.checked = false;
        
        isQrScanned = false;
        const pinInput = document.getElementById('overridePin');
        if(pinInput) pinInput.value = '';
        btnStartScan.innerHTML = "📷 掃描車輛 QR Code";
        btnStartScan.classList.replace('bg-emerald-600', 'bg-slate-800');
        
        checkConditions();
        document.getElementById('qr-reader').classList.add('hidden');
        btnStartScan.style.display = 'flex';
        punchModal.style.display = 'flex';
    }

    document.getElementById('btnCloseModal').addEventListener('click', () => {
        punchModal.style.display = 'none';
        if(html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(e => console.error("相機釋放失敗", e));
            html5QrcodeScanner = null;
        }
    });

    btnStartScan.addEventListener('click', () => {
        btnStartScan.style.display = 'none';
        document.getElementById('qr-reader').classList.remove('hidden');
        
        html5QrcodeScanner = new Html5QrcodeScanType("qr-reader", { fps: 10, qrbox: {width: 250, height: 250} });
        html5QrcodeScanner.render((decodedText) => {
            html5QrcodeScanner.clear().catch(e => console.error(e));
            html5QrcodeScanner = null;
            document.getElementById('qr-reader').classList.add('hidden');
            
            alert(`✅ 掃描成功：已確認車輛 ${decodedText}`);
            isQrScanned = true; 
            
            btnStartScan.style.display = 'flex';
            btnStartScan.innerHTML = `✅ 已確認 (${decodedText})`;
            btnStartScan.classList.replace('bg-slate-800', 'bg-emerald-600');
            
            chkAlcohol.checked = true;
            chkHealth.checked = true;
            checkConditions();
        }, (err) => {});
    });

    btnSubmitPunch.addEventListener('click', async () => {
        if (!selectedTripId) return;
        
        const pinInputEl = document.getElementById('overridePin');
        const pinInput = pinInputEl ? pinInputEl.value : "";
        let isVerified = false;
        let checkInMethod = "";

        if (isQrScanned) {
            isVerified = true;
            checkInMethod = "QR Code 掃描";
        } else if (pinInput === STATION_MASTER_PIN) {
            isVerified = true;
            checkInMethod = "站長覆核碼";
        }

        if (!isVerified) {
            alert("❌ 無法報到！請「掃描車輛 QR Code」或「輸入正確的站長授權碼」。");
            return;
        }
        
        btnSubmitPunch.innerText = "⏳ 正在處理簽到...";
        btnSubmitPunch.disabled = true;

        try {
            await updateDoc(doc(db, "daily_dispatches", selectedTripId), { 
                status: 'checked_in',
                check_in_time: serverTimestamp(), 
                check_in_method: checkInMethod 
            });
            
            punchModal.style.display = 'none';
            openVoucherModal(selectedTripId);
        } catch (err) {
            alert('報到連線失敗，請檢查網路。');
        } finally {
            btnSubmitPunch.innerText = "確認報到並領取電子憑單";
            btnSubmitPunch.disabled = false;
        }
    });

    const voucherModal = document.getElementById('voucherModal');
    
    function openVoucherModal(tripId) {
        const trip = currentTrips.find(t => t.id === tripId);
        if(!trip) return;

        let displayTime = "系統已紀錄";
        if (trip.check_in_time) {
            if (typeof trip.check_in_time.toDate === 'function') {
                const d = trip.check_in_time.toDate();
                displayTime = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            } else {
                displayTime = trip.check_in_time; 
            }
        }

        document.getElementById('voucherContent').innerHTML = `
            <div class="text-center mb-4">
                <div class="text-sm text-gray-500 font-bold mb-1">電子派車憑單 E-Voucher</div>
                <div class="text-2xl font-black text-gray-800">${trip.route}</div>
            </div>
            <div class="space-y-2 text-sm font-bold text-gray-700">
                <div class="flex justify-between border-b border-yellow-200 pb-2"><span>駕駛長</span><span class="text-blue-700">${trip.assigned_driver}</span></div>
                <div class="flex justify-between border-b border-yellow-200 pb-2"><span>發車時間</span><span class="text-xl text-red-600 font-black">${trip.departure_time}</span></div>
                <div class="flex justify-between border-b border-yellow-200 pb-2"><span>使用車號</span><span class="text-gray-900">${trip.assigned_vehicle}</span></div>
                <div class="flex justify-between border-b border-yellow-200 pb-2"><span>起訖點</span><span class="text-right">${trip.start_point}<br>➔ ${trip.end_point}</span></div>
                <div class="flex justify-between pt-1"><span>報到時間</span><span class="text-emerald-600">${displayTime}</span></div>
            </div>
        `;
        voucherModal.style.display = 'flex';
    }

    document.getElementById('btnCloseVoucher').addEventListener('click', () => {
        voucherModal.style.display = 'none';
    });
</script>
</body>
</html>

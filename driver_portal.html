<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>豐東客運 - 駕駛員專屬入口網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Noto Sans TC", "微軟正黑體", sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .app-header { background: linear-gradient(135deg, #1e293b, #334155); color: white; padding: 16px 20px; position: sticky; top: 0; z-index: 50; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; justify-content: space-between; align-items: center; }
        .trip-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; overflow: hidden; border: 1px solid #e5e7eb; }
        .trip-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background-color: #cbd5e1; transition: background-color 0.3s; }
        .status-pending::before { background-color: #f59e0b; }
        .status-completed::before { background-color: #10b981; }
        
        .modal-overlay { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); position: fixed; inset: 0; z-index: 100; display: none; justify-content: center; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 24px; animation: slideUp 0.3s ease-out; max-height: 90vh; overflow-y: auto;}
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <header class="app-header">
        <div>
            <h1 class="text-xl font-black tracking-wider text-yellow-400">豐東客運</h1>
            <p class="text-xs text-gray-300 mt-1" id="driver-greeting">讀取中...</p>
        </div>
        <button id="btnLogout" class="bg-white/20 hover:bg-white/30 text-white p-2 rounded-lg text-sm font-bold backdrop-blur-sm transition">登出</button>
    </header>

<main class="p-4 max-w-md mx-auto">
    <!-- 跑馬燈 -->
    <div id="announcement-bar" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl shadow-sm text-sm font-bold items-center gap-2">
        <span class="text-xl animate-bounce">📢</span>
        <marquee scrollamount="4" id="announcement-text" class="flex-grow tracking-wide">目前無最新公告</marquee>
    </div>
    
    <!-- 📅 選擇日期 -->
    <div class="flex justify-between items-center mb-4 bg-white p-3 rounded-xl shadow-sm border border-gray-200">
        <span class="font-bold text-gray-700">📅 選擇日期</span>
        <input type="date" id="selectDate" class="border-none outline-none font-bold text-blue-600 bg-transparent text-right">
    </div>

    <!-- 🌅 晨間報到區塊 (每日一次) -->
    <div id="morning-checkin-section" class="mb-6 bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center">
        <div class="text-gray-400 font-bold animate-pulse py-2">檢查今日報到狀態中...</div>
    </div>

    <!-- 統計區塊 -->
    <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-center">
            <div class="text-xl font-black text-blue-700" id="count-total">0</div>
            <div class="text-[10px] font-bold text-blue-500 mt-1">今日總趟數</div>
        </div>
        <div class="bg-orange-50 border border-orange-100 rounded-xl p-3 text-center">
            <div class="text-xl font-black text-orange-600" id="count-pending">0</div>
            <div class="text-[10px] font-bold text-orange-500 mt-1">待發車</div>
        </div>
        <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-3 text-center">
            <div class="text-xl font-black text-emerald-600" id="count-completed">0</div>
            <div class="text-[10px] font-bold text-emerald-500 mt-1">已填寫憑單</div>
        </div>
    </div>

    <h2 class="text-lg font-black text-gray-800 mb-3 flex items-center gap-2">🚌 我的車趟憑單</h2>
    <div id="trip-list" class="space-y-4">
        <div class="text-center py-10 text-gray-400 font-bold animate-pulse">連線中，請稍候...</div>
    </div>
</main>

    <!-- Modal 1: 晨間統一報到 -->
    <div id="morningModal" class="modal-overlay">
        <div class="modal-content pb-10">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-2xl font-black text-gray-800">🌅 晨間出勤報到</h3>
                <button id="btnCloseMorning" class="text-gray-400 hover:text-gray-600 font-bold text-2xl">&times;</button>
            </div>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">酒測值 (mg/L)</label>
                    <input type="number" id="inpAlcohol" value="0.00" step="0.01" class="w-full border-2 border-gray-300 rounded-lg p-3 font-black text-xl text-emerald-600 bg-gray-50 outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">體溫 (°C)</label>
                        <input type="number" id="inpTemp" value="36.5" step="0.1" class="w-full border-2 border-gray-300 rounded-lg p-3 font-bold text-gray-800 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">血壓 (收縮/舒張)</label>
                        <input type="text" id="inpBP" placeholder="例: 120/80" class="w-full border-2 border-gray-300 rounded-lg p-3 font-bold text-gray-800 outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>
            <button id="btnSubmitMorning" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition">
                確認回報
            </button>
        </div>
    </div>

    <!-- Modal 2: 單趟到達憑單填寫 -->
    <div id="voucherModal" class="modal-overlay">
        <div class="modal-content pb-10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-black text-gray-800">📝 填寫到達憑單</h3>
                <button id="btnCloseVoucher" class="text-gray-400 hover:text-gray-600 font-bold text-2xl">&times;</button>
            </div>
            
            <!-- 🚨 客運業安全宣導 -->
            <div class="bg-red-50 border-2 border-red-500 rounded-xl p-4 mb-5 shadow-sm">
                <h4 class="text-red-600 font-black text-lg text-center mb-3 tracking-wide">【路口轉彎停看行，禮讓行人優先行】</h4>
                <ol class="list-decimal list-inside text-[13px] text-gray-800 font-bold space-y-1.5 mb-4 leading-relaxed">
                    <li>不急、不趕、路口減速暫停、安全再轉</li>
                    <li>遠離機車，遠離危險</li>
                    <li>行車中嚴禁看手機及平板</li>
                    <li>開關車門時務必廣播提醒乘客才可起步</li>
                    <li>每單發車前車機要手動設定往返定位後再出發</li>
                    <li>候車亭服務燈亮起一定要暫停確認</li>
                </ol>
                <h4 class="text-blue-700 font-black text-lg text-center tracking-wide">【離開駕駛座拉好手煞車】</h4>
            </div>

            <!-- 憑單回報表單 -->
            <div class="space-y-4 mb-6">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">實際到達時間</label>
                        <input type="time" id="inpArrivalTime" class="w-full border-2 border-gray-300 rounded-lg p-3 font-bold text-gray-800 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">總搭車人數</label>
                        <input type="number" id="inpPassenger" placeholder="0" class="w-full border-2 border-gray-300 rounded-lg p-3 font-bold text-gray-800 outline-none focus:border-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">到達剩餘電量 % <span class="text-xs text-gray-400 font-normal">(電車必填)</span></label>
                    <input type="number" id="inpBattery" placeholder="例: 85" class="w-full border-2 border-gray-300 rounded-lg p-3 font-bold text-gray-800 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">備註 <span class="text-xs text-gray-400 font-normal">(選填，如路況、塞車)</span></label>
                    <textarea id="inpRemarks" rows="2" class="w-full border-2 border-gray-300 rounded-lg p-3 font-bold text-gray-800 outline-none focus:border-blue-500"></textarea>
                </div>
            </div>
            
            <button id="btnSubmitVoucher" class="w-full bg-emerald-500 text-white font-black py-4 rounded-xl shadow-lg hover:bg-emerald-600 transition">
                確認送出憑單
            </button>
        </div>
    </div>

<script type="module">
    import { db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, updateDoc, setDoc, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js';

    let currentUser = null;
    let driverEmpId = ""; 
    let currentTrips = [];
    let selectedTripId = null;
    let previousTripsMap = new Map(); 
    let isFirstLoad = true; 

    // 公告推播
    const announcementsCol = collection(db, "announcements");
    onSnapshot(query(announcementsCol, where("status", "==", "active")), (snapshot) => {
        const bar = document.getElementById('announcement-bar');
        const text = document.getElementById('announcement-text');
        if (snapshot.empty) {
            bar.classList.add('hidden');
            bar.classList.remove('flex');
        } else {
            text.innerText = snapshot.docs.map(doc => `【${doc.data().title}】${doc.data().content}`).join(" ｜ ");
            bar.classList.remove('hidden');
            bar.classList.add('flex');
        }
    });

    const dateInput = document.getElementById('selectDate');
    const tripList = document.getElementById('trip-list');
    dateInput.value = new Date().toISOString().split('T')[0];

    function requestNotificationPermission() {
        if (!("Notification" in window)) return;
        if (Notification.permission === "default") {
            Notification.requestPermission();
        }
    }

    function sendNotification(title, body) {
        if (Notification.permission === "granted") {
            new Notification(title, { body: body, icon: "https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png", vibrate: [200, 100, 200] });
        }
    }

    checkAuthAndGetRole(['總公司', '站長', '調度員', '駕駛長']).then(async (user) => {
        currentUser = user;
        const driverName = user.name || user.displayName || user.email?.split('@')[0] || "未知駕駛"; 
        document.getElementById('driver-greeting').innerText = `👨‍✈️ 駕駛長：${driverName}`;
        driverEmpId = user.empId;
        
        requestNotificationPermission();
        
        loadMorningCheckin(dateInput.value, driverEmpId);
        loadMyTrips(dateInput.value, driverEmpId);
    }).catch(err => {
        document.body.innerHTML = `<div class="p-10 text-center"><h2 class="text-red-500 font-bold mb-4">請先完成登入</h2><a href="login.html" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">前往登入</a></div>`;
    });

    document.getElementById('btnLogout').addEventListener('click', () => { logout(); });
    
    dateInput.addEventListener('change', (e) => { 
        loadMorningCheckin(e.target.value, driverEmpId);
        loadMyTrips(e.target.value, driverEmpId); 
    });

    // ====== 🌅 晨間報到邏輯 ======
    function loadMorningCheckin(dateStr, empId) {
        const checkinId = `${dateStr}_${empId}`;
        const checkinRef = doc(db, "daily_checkins", checkinId);
        
        onSnapshot(checkinRef, (docSnap) => {
            const section = document.getElementById('morning-checkin-section');
            if (docSnap.exists()) {
                const data = docSnap.data();
                section.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-xl">✅</div>
                            <div class="text-left">
                                <div class="font-black text-gray-800 text-lg">今日已完成晨間報到</div>
                                <div class="text-xs font-bold text-gray-500">酒測 ${data.alcohol} ｜ 體溫 ${data.temp}°C ｜ 血壓 ${data.blood_pressure}</div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                section.innerHTML = `
                    <button id="btnOpenMorning" class="w-full bg-orange-100 hover:bg-orange-200 border-2 border-orange-400 text-orange-700 font-black py-4 rounded-xl shadow-sm transition flex justify-center items-center gap-2 text-lg">
                        🌅 進行今日晨間報到 (測量輸入)
                    </button>
                `;
                document.getElementById('btnOpenMorning').addEventListener('click', () => {
                    document.getElementById('morningModal').style.display = 'flex';
                });
            }
        });
    }

    document.getElementById('btnCloseMorning').addEventListener('click', () => { document.getElementById('morningModal').style.display = 'none'; });
    
    document.getElementById('btnSubmitMorning').addEventListener('click', async () => {
        const btn = document.getElementById('btnSubmitMorning');
        btn.innerText = "⏳ 傳送中...";
        btn.disabled = true;

        const dateStr = dateInput.value;
        const checkinId = `${dateStr}_${driverEmpId}`;
        const data = {
            date: dateStr,
            empId: driverEmpId,
            name: currentUser.name,
            alcohol: document.getElementById('inpAlcohol').value,
            temp: document.getElementById('inpTemp').value,
            blood_pressure: document.getElementById('inpBP').value || '未填寫',
            timestamp: serverTimestamp()
        };

        try {
            await setDoc(doc(db, "daily_checkins", checkinId), data);
            document.getElementById('morningModal').style.display = 'none';
        } catch (err) {
            alert('報到失敗，請檢查網路。');
        } finally {
            btn.innerText = "確認回報";
            btn.disabled = false;
        }
    });

    // ====== 🚌 車趟與到達憑單邏輯 ======
    function loadMyTrips(dateStr, empId) {
        const q = query(collection(db, "daily_dispatches"), where("date", "==", dateStr));
        
        onSnapshot(q, (snapshot) => {
            currentTrips = [];
            let pendingCount = 0;
            let completedCount = 0;
            let newTripsMap = new Map();

            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if (data.assigned_empid === empId) {
                    const tripData = { id: docSnap.id, ...data };
                    currentTrips.push(tripData);
                    newTripsMap.set(tripData.id, tripData);

                    // status: 'completed' 代表憑單已填寫
                    if (data.status === 'completed' || data.status === 'checked_in') completedCount++;
                    else pendingCount++;
                }
            });

            if (!isFirstLoad && Notification.permission === "granted") {
                newTripsMap.forEach((newTrip, tripId) => {
                    const oldTrip = previousTripsMap.get(tripId);
                    if (!oldTrip) sendNotification("🚌 新車趟指派！", `調度台已派發 ${newTrip.departure_time} 的 ${newTrip.route} 給您。`);
                });
            }

            previousTripsMap = newTripsMap;
            isFirstLoad = false;
            currentTrips.sort((a, b) => (a.departure_time || "").localeCompare(b.departure_time || ""));

            document.getElementById('count-total').innerText = currentTrips.length;
            document.getElementById('count-pending').innerText = pendingCount;
            document.getElementById('count-completed').innerText = completedCount;

            renderTripCards();
        });
    }

    function renderTripCards() {
        if (currentTrips.length === 0) {
            tripList.innerHTML = `<div class="text-center py-10 text-gray-400 font-bold">今日無排定車趟，請好好休息 ☕</div>`;
            return;
        }

        tripList.innerHTML = currentTrips.map(trip => {
            const isCompleted = trip.status === 'completed' || trip.status === 'checked_in';
            
            let statusClass = isCompleted ? 'status-completed' : 'status-pending';
            let statusText = isCompleted 
                ? '<span class="text-emerald-500 bg-emerald-50 px-2 py-1 rounded font-bold text-xs">✅ 憑單已繳</span>'
                : '<span class="text-amber-500 bg-amber-50 px-2 py-1 rounded font-bold text-xs">⏳ 待發車/行駛中</span>';
            
            let btnHtml = isCompleted 
                ? `<button class="w-full mt-3 bg-gray-100 text-gray-500 font-bold py-2.5 rounded-lg text-sm cursor-not-allowed" disabled>已完成回報</button>`
                : `<button class="btn-fill-voucher w-full mt-3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm transition shadow-md shadow-blue-200" data-id="${trip.id}">📝 抵達並填寫憑單</button>`;

            return `
            <div class="trip-card ${statusClass}">
                <div class="flex justify-between items-start mb-2">
                    <div class="text-2xl font-black text-gray-800">${trip.departure_time}</div>
                    ${statusText}
                </div>
                <div class="flex items-center gap-2 mb-3">
                    <span class="bg-indigo-100 text-indigo-700 font-black px-2 py-0.5 rounded text-sm">${trip.route}</span>
                    <span class="text-gray-500 font-bold text-sm">| ${trip.trip_count || 1} 趟</span>
                </div>
                <div class="text-gray-700 font-bold text-sm mb-1">📍 ${trip.start_point} ➔ ${trip.end_point}</div>
                <div class="text-gray-600 font-bold text-sm mb-3">🚌 車號：<span class="text-blue-600">${trip.assigned_vehicle}</span></div>
                ${btnHtml}
            </div>
            `;
        }).join('');

        document.querySelectorAll('.btn-fill-voucher').forEach(btn => {
            btn.addEventListener('click', (e) => {
                selectedTripId = e.target.dataset.id;
                // 自動帶入現在時間
                const now = new Date();
                document.getElementById('inpArrivalTime').value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                document.getElementById('inpPassenger').value = '';
                document.getElementById('inpBattery').value = '';
                document.getElementById('inpRemarks').value = '';
                document.getElementById('voucherModal').style.display = 'flex';
            });
        });
    }

    document.getElementById('btnCloseVoucher').addEventListener('click', () => { document.getElementById('voucherModal').style.display = 'none'; });

    document.getElementById('btnSubmitVoucher').addEventListener('click', async () => {
        if (!selectedTripId) return;
        
        const arrivalTime = document.getElementById('inpArrivalTime').value;
        if(!arrivalTime) return alert("請填寫實際到達時間！");

        const btn = document.getElementById('btnSubmitVoucher');
        btn.innerText = "⏳ 送出憑單中...";
        btn.disabled = true;

        try {
            await updateDoc(doc(db, "daily_dispatches", selectedTripId), { 
                status: 'completed', // 更新為 completed
                arrival_time: arrivalTime,
                passenger_count: document.getElementById('inpPassenger').value || 0,
                battery_level: document.getElementById('inpBattery').value || '',
                remarks: document.getElementById('inpRemarks').value || '',
                check_in_time: serverTimestamp() // 記錄完成時間
            });
            
            document.getElementById('voucherModal').style.display = 'none';
        } catch (err) {
            alert('憑單送出失敗，請檢查網路。');
        } finally {
            btn.innerText = "確認送出憑單";
            btn.disabled = false;
        }
    });

</script>
</body>
</html>

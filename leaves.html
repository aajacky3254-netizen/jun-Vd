<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 差假簽核管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Noto Sans TC", "微軟正黑體", sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; display: none; }
        .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
        .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; }
        .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block; white-space: nowrap; }
        .navbar a.nav-link:hover { background-color: #374151; color: white; }
        .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}
    .content-area { padding: 0 20px; max-width: 1200px; margin: 0 auto;}
    table { width: 100%; border-collapse: collapse; text-align: left; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden;}
    th, td { border-bottom: 1px solid #e2e8f0; padding: 16px; transition: background-color 0.2s; }
    th { background-color: #1e293b; color: #f8fafc; font-weight: 600; letter-spacing: 1px; }
    tr:hover { background-color: #f8fafc; }

  </style>
</head>
<body>

  <nav class="navbar" id="main-nav"></nav>

  <div id="leaveModal" class="fixed inset-0 bg-black/50 hidden justify-center items-center z-50">
     <div class="bg-white p-6 rounded-xl w-96 shadow-2xl">
        <h3 class="text-xl font-bold mb-4">📝 新增請假 / 排休</h3>
        <div class="mb-3">
           <label class="block text-sm font-bold mb-1">假別</label>
           <select id="leaveType" class="w-full border rounded p-2 outline-none focus:border-blue-500"><option>特休</option><option>事假</option><option>病假</option><option>排休</option><option>公假</option></select>
        </div>
        <div class="mb-3">
           <label class="block text-sm font-bold mb-1">日期</label>
           <input type="date" id="leaveDate" class="w-full border rounded p-2 outline-none focus:border-blue-500">
        </div>
        <div class="mb-4">
           <label class="block text-sm font-bold mb-1">事由 (選填)</label>
           <input type="text" id="leaveReason" class="w-full border rounded p-2 outline-none focus:border-blue-500" placeholder="請填寫事由">
        </div>
        <div class="flex justify-end gap-2">
           <button id="btnCancelLeave" class="px-4 py-2 bg-gray-200 text-gray-700 rounded font-bold hover:bg-gray-300">取消</button>
           <button id="btnSubmitLeave" class="px-4 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700">送出申請</button>
        </div>
     </div>
  </div>

  <div class="content-area">
    
    <div class="flex justify-between items-center mt-6 mb-4">
      <h2 class="text-xl font-bold text-gray-800">📅 駕駛員排休與請假簽核區</h2>
      
      <div class="flex items-center gap-3">
        <button id="btnOpenLeaveForm" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition">＋ 填寫假單</button>
        <span id="db-status" class="px-3 py-1.5 rounded-full text-xs font-bold bg-yellow-100 text-yellow-600 border border-yellow-300">連線中...</span>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 12%;">申請日期</th>
          <th style="width: 15%;">申請人</th>
          <th style="width: 12%;">假別</th>
          <th style="width: 25%;">請假事由</th>
          <th style="width: 16%;">目前狀態</th>
          <th style="width: 20%; text-align: center;">簽核操作</th>
        </tr>
      </thead>
      <tbody id="leaveRequestsBody">
        <tr><td colspan="6" class="text-center py-8 text-gray-500 font-bold">載入請假單中...</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    // 1. 合併所有 Import（移除重複宣告）
    import { db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy, getDocs, where, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, renderNavbar, logout } from './auth.js';

    // 2. 共用函式只宣告一次
    const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';

    // 3. 權限驗證區塊只保留一個
    checkAuthAndGetRole(['總公司', '站長', '調度員', '駕駛長']).then(async (user) => {
        // 驗證成功，顯示畫面
        document.body.style.display = 'block'; 

        // 呼叫共用導覽列
        renderNavbar(user, 'leaves');

        const dbStatusEl = document.getElementById('db-status');
        const leaveRequestsCol = collection(db, "leave_requests");

        // ======= 🚀 區塊 A：處理假單送出邏輯 =======
        const leaveModal = document.getElementById('leaveModal');
        document.getElementById('btnOpenLeaveForm').onclick = () => leaveModal.classList.replace('hidden', 'flex');
        document.getElementById('btnCancelLeave').onclick = () => leaveModal.classList.replace('flex', 'hidden');

        document.getElementById('btnSubmitLeave').onclick = async () => {
            const type = document.getElementById('leaveType').value;
            const date = document.getElementById('leaveDate').value;
            const reason = document.getElementById('leaveReason').value;
            if(!date) return alert("請選擇請假日期！");
            
            const btn = document.getElementById('btnSubmitLeave');
            btn.disabled = true; btn.innerText = "送出中...";
            try {
                await addDoc(leaveRequestsCol, {
                    empId: user.empId || user.uid,
                    name: user.name,
                    type: type,
                    date: date,
                    reason: reason,
                    status: '審核中',
                    createdAt: new Date().toISOString()
                });
                leaveModal.classList.replace('flex', 'hidden');
                document.getElementById('leaveDate').value = ""; // 清空表單
                document.getElementById('leaveReason').value = "";
                alert("✅ 假單已成功送出！");
            } catch(e) {
                console.error(e);
                alert("送出失敗，請檢查網路連線。");
            }
            btn.disabled = false; btn.innerText = "送出申請";
        };
        
        // ======= 📊 區塊 B：讀取與渲染假單清單邏輯 =======
        let q;
        if (user.role === '駕駛長') {
            q = query(leaveRequestsCol, where("empId", "==", user.empId));
        } else {
            q = query(leaveRequestsCol, orderBy("date", "desc"));
        }
        
        onSnapshot(q, (snapshot) => {
            const leaveBody = document.getElementById('leaveRequestsBody');
            leaveBody.innerHTML = '';

            let requests = [];
            snapshot.forEach(docSnap => requests.push({ id: docSnap.id, ...docSnap.data() }));
            
            if (user.role === '駕駛長') {
                requests.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
            }

            if (requests.length === 0) {
                leaveBody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500 font-bold">目前無任何請假申請。</td></tr>';
                dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
                dbStatusEl.innerText = "資料庫已連線";
                return;
            }

            requests.forEach(data => {
                const leaveId = data.id;
                const tr = document.createElement('tr');

                let statusHtml = '';
                let actionBtns = '-';

                if (data.status === '審核中') {
                    statusHtml = '<span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold border border-amber-300">待簽核</span>';
                    
                    if (user.role === '駕駛長') {
                        actionBtns = `<button class="btn-delete bg-gray-500 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors shadow-sm" data-id="${leaveId}">撤銷假單</button>`;
                    } else {
                        actionBtns = `
                            <button class="btn-approve bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded text-sm font-bold mr-2 transition-colors shadow-sm" data-id="${leaveId}">核准</button>
                            <button class="btn-reject bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors shadow-sm" data-id="${leaveId}">退回</button>
                        `;
                    }
                } else if (data.status === '已核准') {
                    statusHtml = `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold border border-emerald-300">已核准</span><div class="text-[10px] text-gray-400 mt-1">核准人: ${escapeHTML(data.reviewedBy || '')}</div>`;
                } else {
                    statusHtml = `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-300">已退回</span><div class="text-[10px] text-gray-400 mt-1">退回人: ${escapeHTML(data.reviewedBy || '')}</div>`;
                }

                tr.innerHTML = `
                    <td class="font-mono font-bold text-gray-600">${data.date ? data.date.replace(/-/g, '/') : '無'}</td>
                    <td class="font-bold text-gray-800">${escapeHTML(data.empId)} ${escapeHTML(data.name)}</td>
                    <td class="font-bold text-purple-600">${escapeHTML(data.type)}</td>
                    <td class="text-gray-600 text-sm">${escapeHTML(data.reason) || '無事由'}</td>
                    <td>${statusHtml}</td>
                    <td style="text-align: center;">${actionBtns}</td>
                `;
                leaveBody.appendChild(tr);
            });

            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
            dbStatusEl.innerText = "資料庫已連線";

            // 綁定事件：核准
            document.querySelectorAll('.btn-approve').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const currentBtn = e.target;
                    if (currentBtn.disabled) return; 
                    if (confirm("確定要【核准】此申請嗎？")) {
                        currentBtn.innerText = "處理中...";
                        currentBtn.disabled = true;
                        try {
                            await updateDoc(doc(db, "leave_requests", currentBtn.dataset.id), { status: "已核准", reviewedBy: user.name });
                        } catch (err) {
                            alert("處理失敗，請檢查網路！");
                            currentBtn.innerText = "核准";
                            currentBtn.disabled = false;
                        }
                    }
                });
            });

            // 綁定事件：退回
            document.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const currentBtn = e.target;
                    if (currentBtn.disabled) return;
                    if (confirm("確定要【退回】此申請嗎？")) {
                        currentBtn.innerText = "處理中...";
                        currentBtn.disabled = true;
                        try {
                            await updateDoc(doc(db, "leave_requests", currentBtn.dataset.id), { status: "退回", reviewedBy: user.name });
                        } catch (err) {
                            alert("處理失敗，請檢查網路！");
                            currentBtn.innerText = "退回";
                            currentBtn.disabled = false;
                        }
                    }
                });
            });

            // 綁定事件：撤銷
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const currentBtn = e.target;
                    if (currentBtn.disabled) return;
                    if (confirm("確定要【撤銷刪除】這張請假單嗎？\n刪除後如需請假必須重新填寫。")) {
                        currentBtn.innerText = "撤銷中...";
                        currentBtn.disabled = true;
                        try {
                            await deleteDoc(doc(db, "leave_requests", currentBtn.dataset.id));
                        } catch (err) {
                            alert("撤銷失敗，請檢查網路！");
                            currentBtn.innerText = "撤銷假單";
                            currentBtn.disabled = false;
                        }
                    }
                });
            });

        }, (err) => {
            console.error(err);
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-300";
            dbStatusEl.innerText = "連線失敗";
        });

    }).catch((err) => {
        console.error("權限不足或未登入", err);
    });
  </script>
</body>
</html>

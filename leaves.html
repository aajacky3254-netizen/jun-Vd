<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 差假簽核管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Noto Sans TC", "微軟正黑體", sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; display: none; }
    .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
    .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; display: flex; align-items: center; }
    .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block; white-space: nowrap; }
    .navbar a.nav-link:hover { background-color: #374151; color: white; }
    .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}
    .content-area { padding: 0 20px; max-width: 1200px; margin: 0 auto;}
    table { width: 100%; border-collapse: collapse; text-align: left; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden;}
    th, td { border-bottom: 1px solid #e2e8f0; padding: 16px; transition: background-color 0.2s; }
    th { background-color: #1e293b; color: #f8fafc; font-weight: 600; letter-spacing: 1px; }
    tr:hover { background-color: #f8fafc; }
  </style>
</head>
<body>

  <nav class="navbar" id="main-nav"></nav>

  <!-- 請假表單 Modal -->
  <div id="leaveModal" class="fixed inset-0 bg-black/50 hidden justify-center items-center z-50">
     <div class="bg-white p-6 rounded-xl w-[450px] shadow-2xl">
        <h3 class="text-xl font-bold mb-4">📝 新增請假 / 排休</h3>
        <div class="mb-3">
           <label class="block text-sm font-bold mb-1">假別</label>
           <select id="leaveType" class="w-full border rounded p-2 outline-none focus:border-blue-500">
               <option>排休</option>
               <option>特休</option>
               <option>事假</option>
               <option>病假</option>
               <option>公假</option>
           </select>
        </div>
        
        <!-- 時間區間 -->
        <div class="grid grid-cols-2 gap-4 mb-3">
            <div>
                <label class="block text-sm font-bold mb-1">開始時間</label>
                <!-- 若只需選到天，可改為 type="date" -->
                <input type="datetime-local" id="leaveStart" class="w-full border rounded p-2 outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">結束時間</label>
                <input type="datetime-local" id="leaveEnd" class="w-full border rounded p-2 outline-none focus:border-blue-500">
            </div>
        </div>

        <div class="mb-4">
           <label class="block text-sm font-bold mb-1">事由 (必填)</label>
           <input type="text" id="leaveReason" class="w-full border rounded p-2 outline-none focus:border-blue-500" placeholder="請簡單說明原因">
        </div>
        <div class="flex justify-end gap-2">
           <button id="btnCancelForm" class="px-4 py-2 bg-gray-200 text-gray-700 rounded font-bold hover:bg-gray-300">取消</button>
           <button id="btnSubmitLeave" class="px-4 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700">送出申請</button>
        </div>
     </div>
  </div>

  <div class="content-area">
    
    <div class="flex justify-between items-center mt-6 mb-4">
      <h2 class="text-xl font-bold text-gray-800" id="pageTitle">📅 我的差假申請紀錄</h2>
      
      <div class="flex items-center gap-3">
        <!-- 狀態篩選 (主管預留) -->
        <select id="filterStatus" class="border rounded p-2 text-sm hidden">
            <option value="all">所有狀態</option>
            <option value="待審核">待審核</option>
            <option value="已核准">已核准</option>
        </select>

        <button id="btnOpenLeaveForm" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition">＋ 填寫假單</button>
        <span id="db-status" class="px-3 py-1.5 rounded-full text-xs font-bold bg-yellow-100 text-yellow-600 border border-yellow-300">連線中...</span>
      </div>
    </div>

    <!-- 表格區塊 -->
    <table>
      <thead>
        <tr>
          <!-- 調整欄位順序 -->
          <th style="width: 10%;">目前狀態</th>
          <th style="width: 15%;">申請人</th>
          <th style="width: 10%;">假別</th>
          <th style="width: 25%;">請假區間 (開始 ~ 結束)</th>
          <th style="width: 20%;">事由</th>
          <th style="width: 20%; text-align: center;">操作</th>
        </tr>
      </thead>
      <tbody id="leaveRequestsBody">
        <tr><td colspan="6" class="text-center py-8 text-gray-500 font-bold">載入請假單中...</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, updateDoc, orderBy, where, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, renderNavbar } from './auth.js';

    const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';

    // 日期格式化工具
    const formatDateTime = (isoString) => {
        if (!isoString) return '無';
        const d = new Date(isoString);
        return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    };

    checkAuthAndGetRole(['總公司', '站長', '調度員', '駕駛長']).then(async (user) => {
        document.body.style.display = 'block'; 
        renderNavbar(user, 'leaves');

        const isManager = ['總公司', '站長', '調度員'].includes(user.role);
        
        // 根據身分調整標題與UI
        if (isManager) {
            document.getElementById('pageTitle').innerText = '📅 差假審核管理 (主管視角)';
            document.getElementById('filterStatus').classList.remove('hidden'); // 顯示篩選
        }

        const dbStatusEl = document.getElementById('db-status');
        const leaveRequestsCol = collection(db, "leave_requests");

        // ======= 🚀 填寫假單邏輯 =======
        const leaveModal = document.getElementById('leaveModal');
        document.getElementById('btnOpenLeaveForm').onclick = () => leaveModal.classList.replace('hidden', 'flex');
        document.getElementById('btnCancelForm').onclick = () => leaveModal.classList.replace('flex', 'hidden');

        document.getElementById('btnSubmitLeave').onclick = async () => {
            const type = document.getElementById('leaveType').value;
            const start = document.getElementById('leaveStart').value;
            const end = document.getElementById('leaveEnd').value;
            const reason = document.getElementById('leaveReason').value;
            
            if(!start || !end || !reason) return alert("請填寫完整時間與事由！");
            if(new Date(start) >= new Date(end)) return alert("結束時間必須晚於開始時間！");
            
            const btn = document.getElementById('btnSubmitLeave');
            btn.disabled = true; btn.innerText = "送出中...";
            try {
                await addDoc(leaveRequestsCol, {
                    empId: user.empId || user.uid,
                    name: user.name,
                    type: type,
                    startTime: start,
                    endTime: end,
                    reason: reason,
                    status: '待審核', // 狀態改為 待審核
                    createdAt: new Date().toISOString()
                });
                leaveModal.classList.replace('flex', 'hidden');
                // 清空表單
                document.getElementById('leaveStart').value = ""; 
                document.getElementById('leaveEnd').value = "";
                document.getElementById('leaveReason').value = "";
                alert("✅ 假單已成功送出！");
            } catch(e) {
                console.error(e);
                alert("送出失敗，請檢查網路連線。");
            }
            btn.disabled = false; btn.innerText = "送出申請";
        };
        
        // ======= 📊 讀取與渲染列表邏輯 =======
        let q;
        if (!isManager) {
            // 駕駛員只看自己的
            q = query(leaveRequestsCol, where("empId", "==", user.empId));
        } else {
            // 主管看所有人的，依申請時間排序 (實務上可以依開始時間排序)
            q = query(leaveRequestsCol, orderBy("createdAt", "desc"));
        }
        
        onSnapshot(q, (snapshot) => {
            const leaveBody = document.getElementById('leaveRequestsBody');
            leaveBody.innerHTML = '';

            let requests = [];
            snapshot.forEach(docSnap => requests.push({ id: docSnap.id, ...docSnap.data() }));
            
            // 如果是透過 where 查詢 (無 orderBy)，需手動排序
            if (!isManager) {
                requests.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }

            if (requests.length === 0) {
                leaveBody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500 font-bold">目前無任何申請紀錄。</td></tr>';
                dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
                dbStatusEl.innerText = "資料庫已連線";
                return;
            }

            requests.forEach(data => {
                const leaveId = data.id;
                const tr = document.createElement('tr');

                // 判斷狀態標籤
                let statusHtml = '';
                let actionBtns = '';

                switch(data.status) {
                    case '待審核':
                    case '審核中': // 相容舊資料
                        statusHtml = '<span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold border border-amber-300">待審核</span>';
                        if (isManager) {
                            actionBtns = `
                                <button class="btn-approve bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded text-sm font-bold mr-1" data-id="${leaveId}">核准</button>
                                <button class="btn-reject bg-rose-500 hover:bg-rose-600 text-white px-3 py-1 rounded text-sm font-bold mr-1" data-id="${leaveId}">退回</button>
                            `;
                        } else {
                            // 申請人可以自己撤回
                            actionBtns = `<button class="btn-withdraw bg-gray-500 hover:bg-gray-600 text-white px-3 py-1 rounded text-sm font-bold" data-id="${leaveId}">撤回</button>`;
                        }
                        break;

                    case '已核准':
                        statusHtml = `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold border border-emerald-300">已核准</span><div class="text-[10px] text-gray-400 mt-1">審核: ${escapeHTML(data.reviewedBy || '')}</div>`;
                        if (isManager) {
                            // 主管可以強制代為撤回/銷假
                            actionBtns = `<button class="btn-force-withdraw bg-orange-500 hover:bg-orange-600 text-white px-3 py-1 rounded text-sm font-bold" data-id="${leaveId}">代為撤回</button>`;
                        } else {
                            // 實務上這裡可能會有「申請銷假」的按鈕，目前先照您的邏輯
                            actionBtns = `<span class="text-xs text-gray-400">無法撤回</span>`;
                        }
                        break;
                    
                    case '已退回':
                    case '退回': // 相容舊資料
                        statusHtml = `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-300">已退回</span><div class="text-[10px] text-gray-400 mt-1">退回: ${escapeHTML(data.reviewedBy || '')}</div>`;
                        actionBtns = `<span class="text-gray-400">-</span>`;
                        break;
                    
                    case '已撤回':
                        statusHtml = `<span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs font-bold border border-gray-300">已撤回</span><div class="text-[10px] text-gray-400 mt-1">由: ${escapeHTML(data.withdrawnBy || '申請人')}</div>`;
                        actionBtns = `<span class="text-gray-400">-</span>`;
                        break;
                }

                // 組合時間字串
                const timeStr = `${formatDateTime(data.startTime)} ~ <br>${formatDateTime(data.endTime)}`;

                tr.innerHTML = `
                    <td>${statusHtml}</td>
                    <td class="font-bold text-gray-800">${escapeHTML(data.empId)} <br><span class="text-sm font-normal">${escapeHTML(data.name)}</span></td>
                    <td class="font-bold text-purple-600">${escapeHTML(data.type)}</td>
                    <td class="font-mono text-sm text-gray-700">${timeStr}</td>
                    <td class="text-gray-600 text-sm">${escapeHTML(data.reason) || '-'}</td>
                    <td style="text-align: center;">${actionBtns}</td>
                `;
                leaveBody.appendChild(tr);
            });

            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
            dbStatusEl.innerText = "資料庫已連線";

            // --- 綁定事件處理 ---

            // 1. 核准 (主管)
            document.querySelectorAll('.btn-approve').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.dataset.id;
                    if (confirm("確定要【核准】此申請嗎？")) {
                        await updateStatus(id, '已核准', { reviewedBy: user.name });
                    }
                });
            });

            // 2. 退回 (主管)
            document.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.dataset.id;
                    if (confirm("確定要【退回】此申請嗎？")) {
                        await updateStatus(id, '已退回', { reviewedBy: user.name });
                    }
                });
            });

            // 3. 撤回 (申請人)
            document.querySelectorAll('.btn-withdraw').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.dataset.id;
                    if (confirm("確定要【撤回】這張假單嗎？")) {
                        await updateStatus(id, '已撤回', { withdrawnBy: user.name });
                    }
                });
            });

            // 4. 代為撤回 (主管)
            document.querySelectorAll('.btn-force-withdraw').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.dataset.id;
                    const reason = prompt("請輸入代為撤回的原因 (如：排班調度):");
                    if (reason !== null) {
                        await updateStatus(id, '已撤回', { 
                            withdrawnBy: user.name + '(主管代撤)',
                            withdrawReason: reason 
                        });
                    }
                });
            });

        }, (err) => {
            console.error(err);
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-300";
            dbStatusEl.innerText = "連線失敗";
        });

        // 封裝狀態更新函式 (不使用 deleteDoc)
        async function updateStatus(docId, newStatus, extraData = {}) {
            try {
                const docRef = doc(db, "leave_requests", docId);
                await updateDoc(docRef, { status: newStatus, ...extraData });
            } catch (err) {
                console.error("狀態更新失敗:", err);
                alert("處理失敗，請檢查網路連線！");
            }
        }

    }).catch((err) => {
        console.error("權限不足或未登入", err);
    });
  </script>
</body>
</html>

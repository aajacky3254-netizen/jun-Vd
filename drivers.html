<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 人事管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "微軟正黑體", "Noto Sans TC", sans-serif; padding: 0; margin: 0; background-color: #f4f6f9; display: none; }
    h2 { color: #1e293b; margin: 20px 0; font-weight: 800; font-size: 26px; letter-spacing: 1px;}
    
    .navbar { background-color: #2a2f3e; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 64px;}
    .navbar-brand { color: #facc15; font-size: 20px; font-weight: bold; margin-right: 30px; text-decoration: none; letter-spacing: 1px; }
    .navbar a.nav-link { color: #e2e8f0; padding: 0 20px; text-decoration: none; font-size: 15px; transition: 0.3s; line-height: 64px; display: inline-block;}
    .navbar a.nav-link:hover { background-color: #374151; color: white; }
    .navbar a.nav-link.active { border-bottom: 4px solid #3b82f6; color: #fff; background-color: #1e222d; font-weight: bold;}

    .content-area { padding: 0 20px; max-width: 1400px; margin: 0 auto;}
    
    .control-panel {
      background: #fff; padding: 24px; border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 24px;
      display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; border: 1px solid #e2e8f0;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;}
    .input-group input, .input-group select {
      padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; transition: 0.2s; outline: none; background-color: #f8fafc;
    }
    .input-group input:focus, .input-group select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); background-color: #fff;}

    table { width: 100%; border-collapse: collapse; text-align: left; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden;}
    th, td { border-bottom: 1px solid #e2e8f0; padding: 16px; transition: background-color 0.2s; }
    th { background-color: #1e293b; color: #f8fafc; font-weight: 600; letter-spacing: 1px; }
    tr:hover { background-color: #f8fafc; }
    
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; }
    .status-active { background-color: #dcfce7; color: #166534; }
    .status-inactive { background-color: #f1f5f9; color: #64748b; }
  </style>
</head>
<body>

  <nav class="navbar" id="main-nav">
    <a href="index.html" class="navbar-brand flex items-center">
      <img src="https://raw.githubusercontent.com/aajacky3254-netizen/jun-Vd/main/%E8%B1%90%E6%9D%B1%E5%AE%A2%E9%81%8B%20LOGO.png" alt="LOGO" class="h-8 mr-3 object-contain">
      豐東交通客運 | 智慧車輛調度系統
    </a>
    <a href="schedule.html" class="nav-link">🗓️ 週班表管理</a>
    <a href="dispatch.html" class="nav-link">🚦 每日發車控制台</a>
    <a href="drivers.html" class="nav-link active">👨‍✈️ 人事管理系統</a>
    <a href="vehicles.html" class="nav-link">🚍 車輛資訊系統</a>
  </nav>

  <div class="content-area">
    <div class="flex justify-between items-center mt-6 mb-2">
      <h2>👨‍✈️ 駕駛長與內勤人事管理系統</h2>
      <span id="db-status" class="px-3 py-1.5 rounded-full text-xs font-bold bg-yellow-100 text-yellow-600 border border-yellow-300">連線中...</span>
    </div>

    <div class="control-panel">
      <div class="input-group" style="width: 140px;">
        <label>員工編號</label>
        <input type="text" id="inpEmpId" placeholder="例如: 001" required>
      </div>
      <div class="input-group" style="width: 200px;">
        <label>內外勤姓名</label>
        <input type="text" id="inpName" placeholder="輸入姓名" required>
      </div>
      <div class="input-group" style="width: 140px;">
        <label>在職狀態</label>
        <select id="inpStatus">
          <option value="active">在職</option>
          <option value="inactive">離職/留停</option>
        </select>
      </div>
      <div class="input-group" style="width: 140px;">
        <label>所屬場站</label>
        <select id="inpStation">
          <option value="東海站">東海站</option>
          <option value="烏日站">烏日站</option>
          <option value="潭子站">潭子站</option>
          <option value="高鐵站">高鐵站</option>
        </select>
      </div>
      <div class="input-group" style="width: 180px;">
        <label>系統登入權限</label>
        <select id="inpRole">
          <option value="駕駛長">駕駛長 (僅檢視個人工作台)</option>
          <option value="調度員">調度員 (可排週班表與每日調度)</option>
          <option value="維修人員">維修保養班 (可接單修車)</option>
          <option value="StationManager">站長 (最高權限)</option>
        </select>
      </div>
    </div>

    <div class="control-panel">
      <div class="input-group" style="width: 180px;">
        <label>實際編制職稱</label>
        <select id="empRole" class="font-bold text-gray-700">
          <option value="駕駛長">🚌 駕駛長</option>
          <option value="站務員">🎫 站務員</option>
          <option value="站長">🏢 站長</option>
          <option value="調度員">🚦 調度員</option>
          <option value="維修員">🔧 維修技師</option>
          <option value="行政職員">💼 辦公室職員</option>
        </select>
      </div>

      <div class="input-group flex-grow" id="milestoneGroup">
        <label class="text-purple-600 font-bold">🎯 大客車駕駛擴大徵才補助里程碑階段</label>
        <select id="empMilestone" class="font-bold text-purple-700 bg-purple-50 border-purple-300">
          <option value="none">無適用專案 (一般在職員工 / 內勤)</option>
          <option value="training">1️⃣ 受訓中 (未滿月新進人員)</option>
          <option value="month_1">2️⃣ 穩定就業滿 1 個月 (可請領第一階段生活津貼)</option>
          <option value="month_3">3️⃣ 穩定就業滿 3 個月 (可請領第二階段就業獎勵)</option>
          <option value="month_5">4️⃣ 穩定就業滿 5 個月 (可請領留任獎金階段)</option>
          <option value="completed">✅ 方案補助全數結案</option>
        </select>
      </div>
      
      <button id="btnSaveDriver" class="bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold whitespace-nowrap" style="height: 44px;">
        💾 儲存人員資料
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 12%;">員工編號</th>
          <th style="width: 18%;">員工姓名</th>
          <th style="width: 13%;">所屬場站</th>
          <th style="width: 22%;">實際職稱 / 專案進度</th>
          <th style="width: 13%;">系統權限</th>
          <th style="width: 12%;">在職狀態</th>
          <th style="width: 10%; text-align: center;">操作</th>
        </tr>
      </thead>
      <tbody id="driverBody">
        <tr><td colspan="7" class="text-center py-8 text-gray-500 font-bold">載入中...</td></tr>
      </tbody>
    </table>
  </div>
  <script type="module">
    import { db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, setDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js';
    
    // 🗑️ 已經移除原本的 initializeApp, getAuth, secondaryApp 等多餘的設定

    const allowedRoles = ['SuperAdmin', 'StationManager', '調度員']; 

    checkAuthAndGetRole(allowedRoles).then((user) => {
        document.body.style.display = 'block'; 

        const nav = document.querySelector('.navbar');
        nav.innerHTML += `
            <div class="ml-auto flex items-center gap-4 text-white text-sm font-bold pr-4">
                <span>👤 ${user.name} (${user.role})</span>
                <button id="btnLogout" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded transition">登出</button>
            </div>
        `;
        document.getElementById('btnLogout').addEventListener('click', logout);
        
        const driversCol = collection(db, "Drivers");
        const dbStatusEl = document.getElementById('db-status');

        let currentDrivers = [];

        // 監聽職稱連動顯示
        document.getElementById('empRole').addEventListener('change', (e) => {
            const milestoneGroup = document.getElementById('milestoneGroup');
            if (e.target.value === '駕駛長') {
                milestoneGroup.style.display = 'flex';
            } else {
                milestoneGroup.style.display = 'none';
                document.getElementById('empMilestone').value = 'none';
            }
        });

        onSnapshot(driversCol, (snapshot) => {
            currentDrivers = [];
            snapshot.forEach(doc => {
                currentDrivers.push({ id: doc.id, ...doc.data() });
            });

            currentDrivers.sort((a, b) => a.id.localeCompare(b.id));
            renderTable();
            
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
            dbStatusEl.innerText = "資料庫已連線";
        }, (error) => {
            console.error(error);
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-300";
            dbStatusEl.innerText = "連線失敗";
        });

        function renderTable() {
            const tbody = document.getElementById('driverBody');
            tbody.innerHTML = '';

            if(currentDrivers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500 font-bold">目前沒有任何員工資料。</td></tr>';
                return;
            }

            // XSS 簡單防護 (避免名字包含 HTML 標籤破壞版面)
            const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';

            currentDrivers.forEach(driver => {
                const tr = document.createElement('tr');
                
                const statusHtml = driver.status === 'active' 
                    ? `<span class="status-badge status-active">● 在職中</span>` 
                    : `<span class="status-badge status-inactive">休假 / 離職</span>`;

                let milestoneText = "";
                if ((driver.empRole === '駕駛長' || !driver.empRole) && driver.empMilestone && driver.empMilestone !== 'none') {
                    const milestoneMap = {
                        'training': '受訓中',
                        'month_1': '就業滿1M',
                        'month_3': '就業滿3M',
                        'month_5': '就業滿5M',
                        'completed': '結案'
                    };
                    milestoneText = ` <span class="text-xs bg-purple-100 text-purple-700 border border-purple-200 px-2 py-0.5 rounded font-bold ml-1" title="擴大徵才專案進度">🎯 ${milestoneMap[driver.empMilestone]}</span>`;
                }

                tr.innerHTML = `
                    <td style="font-family: monospace; font-size: 16px; font-weight: bold; color: #475569;">${escapeHTML(driver.id)}</td>
                    <td style="font-weight: bold; color: #0f172a; font-size: 16px;">${escapeHTML(driver.name)}</td>
                    <td style="color: #475569; font-weight: 600;">${escapeHTML(driver.station) || '未指定'}</td>
                    <td style="color: #047857; font-weight: 600; font-size: 15px;">${escapeHTML(driver.empRole) || '駕駛長'}${milestoneText}</td>
                    <td style="color: #3b82f6; font-weight: 600;">${escapeHTML(driver.role) || '駕駛長'}</td>
                    <td>${statusHtml}</td>
                    <td style="text-align: center;">
                        <button class="btn-edit bg-teal-500 hover:bg-teal-600 text-white px-3 py-1.5 rounded text-sm font-bold mr-2 transition-colors" 
                                data-id="${escapeHTML(driver.id)}" 
                                data-name="${escapeHTML(driver.name)}" 
                                data-status="${escapeHTML(driver.status)}" 
                                data-station="${escapeHTML(driver.station)}" 
                                data-role="${escapeHTML(driver.role)}"
                                data-emprole="${escapeHTML(driver.empRole) || '駕駛長'}"
                                data-empmilestone="${escapeHTML(driver.empMilestone) || 'none'}">編輯</button>
                        <button class="btn-delete bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors" data-id="${escapeHTML(driver.id)}">刪除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', (e) => {
                const btnData = e.target.dataset;
                document.getElementById('inpEmpId').value = btnData.id;
                document.getElementById('inpEmpId').disabled = true; 
                document.getElementById('inpEmpId').style.backgroundColor = '#e2e8f0';
                document.getElementById('inpName').value = btnData.name;
                document.getElementById('inpStatus').value = btnData.status;
                document.getElementById('inpStation').value = btnData.station || '東海站';
                document.getElementById('inpRole').value = btnData.role || '駕駛長';
                
                const loadedEmpRole = btnData.emprole;
                document.getElementById('empRole').value = loadedEmpRole;
                document.getElementById('empMilestone').value = btnData.empmilestone;
                
                const milestoneGroup = document.getElementById('milestoneGroup');
                if (loadedEmpRole === '駕駛長') {
                    milestoneGroup.style.display = 'flex';
                } else {
                    milestoneGroup.style.display = 'none';
                }
                
                document.getElementById('btnSaveDriver').innerHTML = "💾 更新人員資料";
                document.getElementById('btnSaveDriver').className = "bg-gradient-to-b from-teal-500 to-teal-600 hover:from-teal-600 hover:to-teal-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold ml-auto";
            }));

            document.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', async (e) => {
                if(confirm(`⚠️ 警告！刪除員工將無法復原，確定要刪除編號 ${e.target.dataset.id} 嗎？`)) {
                    try {
                        await deleteDoc(doc(db, "Drivers", e.target.dataset.id));
                    } catch (err) {
                        console.error("刪除失敗:", err);
                        alert("刪除失敗，請檢查網路！");
                    }
                }
            }));
        }

        // 儲存按鈕邏輯
        document.getElementById('btnSaveDriver').addEventListener('click', async () => {
            const empId = document.getElementById('inpEmpId').value.trim();
            const name = document.getElementById('inpName').value.trim();
            const status = document.getElementById('inpStatus').value;
            const station = document.getElementById('inpStation').value;
            const role = document.getElementById('inpRole').value;
            const empRole = document.getElementById('empRole').value;
            const empMilestone = document.getElementById('empMilestone').value;

            if(!empId || !name) { alert("請填寫員工編號與姓名！"); return; }

            const btn = document.getElementById('btnSaveDriver');
            
            try {
                btn.innerHTML = "⏳ 儲存中...";
                btn.disabled = true;

                const docRef = doc(db, "Drivers", empId);
                const docSnap = await getDoc(docRef);

                // 如果是新員工，呼叫 GAS API 在後端建立帳號
                if (!docSnap.exists()) {
                    try {
                        // ✅ 已替換為您專屬的 GAS Web App URL
                        const gasUrl = "https://script.google.com/macros/s/AKfycbwRelX_fQCleSmsLJQiOCoUU9mtrgTauSPh09D7c9qguFj6SWqr57ayM_hmqIY3U6oqLw/exec"; 
                        
                        await fetch(gasUrl, {
                            method: "POST",
                            body: JSON.stringify({ empId: empId }) 
                        });
                        console.log("後端 Auth 帳號建立請求已送出");
                    } catch (apiErr) {
                        console.error("呼叫建立帳號 API 失敗:", apiErr);
                    }
                }

                // 準備要寫入 Firestore 的員工資料 (完全移除密碼明文)
                const driverData = {
                    name: name,
                    status: status,
                    station: station,
                    role: role,
                    empRole: empRole,
                    empMilestone: empMilestone
                };

                await setDoc(docRef, driverData, { merge: true });

                // 成功後重設表單狀態
                document.getElementById('inpEmpId').value = '';
                document.getElementById('inpEmpId').disabled = false;
                document.getElementById('inpEmpId').style.backgroundColor = '#f8fafc';
                document.getElementById('inpName').value = '';
                document.getElementById('inpStatus').value = 'active';
                document.getElementById('empRole').value = '駕駛長';
                document.getElementById('empMilestone').value = 'none';
                document.getElementById('milestoneGroup').style.display = 'flex';
                
                if (!docSnap.exists()) {
                    alert(`✅ 員工帳號建立成功！\n員工編號: ${empId}\n預設登入密碼: 123\n所屬場站: ${station}\n編制職稱: ${empRole}`);
                } else {
                    alert(`✅ 員工資料已成功更新！`);
                }
            } catch (err) {
                console.error("寫入失敗:", err);
                alert("儲存失敗，請檢查網路狀態。");
            } finally {
                btn.innerHTML = "💾 儲存人員資料";
                btn.disabled = false;
                btn.className = "bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold ml-auto";
            }
        });

    }).catch((err) => {
        console.error("驗證失敗或未登入", err);
    });
  </script>
</body>
</html>

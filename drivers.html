<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豐東交通客運 - 人事管理系統</title>
  
  <!-- 引入我們剛才編譯好的全站共用 CSS -->
  <link rel="stylesheet" href="./output.css">
  <style>
    /* 保留該頁面專屬的特殊邏輯樣式 */
    body { display: none; }
    .status-active { background-color: #dcfce7; color: #166534; }
    .status-inactive { background-color: #f1f5f9; color: #64748b; }
  </style>
</head>
<body>

  <!-- 導覽列 -->
  <nav class="navbar" id="main-nav"></nav>

  <div class="content-area">
    <div class="flex justify-between items-center mt-6 mb-2">
      <h2 class="text-2xl font-bold text-slate-800">👨‍✈️ 駕駛長與內勤人事管理系統</h2>
      <span id="db-status" class="px-3 py-1.5 rounded-full text-xs font-bold bg-yellow-100 text-yellow-600 border border-yellow-300">連線中...</span>
    </div>

    <!-- 控制面板 1：基本資料 -->
    <div class="control-panel">
      <div class="input-group" style="width: 140px;">
        <label>員工編號</label>
        <input type="text" id="inpEmpId" placeholder="例如: 001" required>
      </div>
      <div class="input-group" style="width: 200px;">
        <label>內外勤姓名</label>
        <input type="text" id="inpName" placeholder="輸入姓名" required>
      </div>
      <div class="input-group" style="width: 140px;">
        <label>在職狀態</label>
        <select id="inpStatus">
          <option value="active">在職</option>
          <option value="inactive">離職/留停</option>
        </select>
      </div>
      <div class="input-group" style="width: 140px;">
        <label>所屬場站</label>
        <select id="inpStation">
          <option value="東海站">東海站</option>
          <option value="烏日站">烏日站</option>
          <option value="潭子站">潭子站</option>
          <option value="高鐵站">高鐵站</option>
        </select>
      </div>
      <div class="input-group" style="width: 180px;">
        <label>系統登入權限</label>
        <select id="inpRole">
          <option value="駕駛長">駕駛長</option>
          <option value="調度員">調度員</option>
          <option value="維修保養班">維修保養班</option>
          <option value="站長">站長</option>
          <option value="總公司">總公司</option>
        </select>
      </div>
    </div>

    <!-- 控制面板 2：職稱與專案 -->
    <div class="control-panel">
      <div class="input-group" style="width: 180px;">
        <label>實際編制職稱</label>
        <select id="empRole" class="font-bold text-slate-700">
          <option value="駕駛長">🚌 駕駛長</option>
          <option value="站務員">🎫 站務員</option>
          <option value="站長">🏢 站長</option>
          <option value="調度員">🚦 調度員</option>
          <option value="維修員">🔧 維修技師</option>
          <option value="行政職員">💼 辦公室職員</option>
        </select>
      </div>

      <div class="input-group flex-grow" id="milestoneGroup">
        <label class="text-purple-600 font-bold">🎯 大客車駕駛擴大徵才補助里程碑階段</label>
        <select id="empMilestone" class="font-bold text-purple-700 bg-purple-50 border-purple-300">
          <option value="none">無適用專案 (一般在職員工 / 內勤)</option>
          <option value="training">1️⃣ 受訓中 (未滿月新進人員)</option>
          <option value="month_1">2️⃣ 穩定就業滿 1 個月 (可請領第一階段生活津貼)</option>
          <option value="month_3">3️⃣ 穩定就業滿 3 個月 (可請領第二階段就業獎勵)</option>
          <option value="month_5">4️⃣ 穩定就業滿 5 個月 (可請領留任獎金階段)</option>
          <option value="completed">✅ 方案補助全數結案</option>
        </select>
      </div>
      
      <button id="btnSaveDriver" class="bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold whitespace-nowrap" style="height: 44px;">
        💾 儲存人員資料
      </button>
    </div>

    <!-- 表格區塊：套用共用模組 table-wrapper -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th style="width: 12%;">員工編號</th>
            <th style="width: 18%;">員工姓名</th>
            <th style="width: 13%;">所屬場站</th>
            <th style="width: 22%;">實際職稱 / 專案進度</th>
            <th style="width: 13%;">系統權限</th>
            <th style="width: 12%;">在職狀態</th>
            <th style="width: 10%; text-align: center;">操作</th>
          </tr>
        </thead>
        <tbody id="driverBody">
          <tr><td colspan="7" class="text-center py-8 text-gray-500 font-bold">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  
  <script type="module">
    import { app, db } from './firebase-init.js';
    import { collection, query, onSnapshot, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { checkAuthAndGetRole, logout } from './auth.js';
    
    // 💡 免費版救星：引入 Secondary App 模組，允許在前端偷建帳號且不影響主帳號登入狀態
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signOut as secSignOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 建立次要的 Firebase App 實例
    const secondaryApp = initializeApp(app.options, "SecondaryApp");
    const secondaryAuth = getAuth(secondaryApp);

    const allowedRoles = ['總公司', '站長', '調度員']; 

    checkAuthAndGetRole(allowedRoles).then((user) => {
        document.body.style.display = 'block'; 

        const nav = document.querySelector('.navbar');
        // 加入您的 Logo，並指向本地圖片資源 (前面第 5 點的修改)
        nav.innerHTML += `
            <div class="ml-auto flex items-center gap-4 text-white text-sm font-bold pr-4">
                <span>👤 ${user.name} (${user.role})</span>
                <button id="btnLogout" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded transition">登出</button>
            </div>
        `;
        document.getElementById('btnLogout').addEventListener('click', logout);
        
        const driversCol = collection(db, "Drivers");
        const dbStatusEl = document.getElementById('db-status');
        let currentDrivers = [];

        document.getElementById('empRole').addEventListener('change', (e) => {
            const milestoneGroup = document.getElementById('milestoneGroup');
            if (e.target.value === '駕駛長') {
                milestoneGroup.style.display = 'flex';
            } else {
                milestoneGroup.style.display = 'none';
                document.getElementById('empMilestone').value = 'none';
            }
        });

        onSnapshot(driversCol, (snapshot) => {
            currentDrivers = [];
            snapshot.forEach(doc => { currentDrivers.push({ id: doc.id, ...doc.data() }); });
            currentDrivers.sort((a, b) => a.id.localeCompare(b.id));
            renderTable();
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-300";
            dbStatusEl.innerText = "資料庫已連線";
        }, (error) => {
            dbStatusEl.className = "px-3 py-1.5 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-300";
            dbStatusEl.innerText = "連線失敗";
        });

        function renderTable() {
            const tbody = document.getElementById('driverBody');
            tbody.innerHTML = '';

            if(currentDrivers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500 font-bold">目前沒有任何員工資料。</td></tr>';
                return;
            }

            const escapeHTML = (str) => str ? String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : '';

            currentDrivers.forEach(driver => {
                const tr = document.createElement('tr');
                const statusHtml = driver.status === 'active' 
                    ? `<span class="status-badge status-active">● 在職中</span>` 
                    : `<span class="status-badge status-inactive">休假 / 離職</span>`;

                let milestoneText = "";
                if ((driver.empRole === '駕駛長' || !driver.empRole) && driver.empMilestone && driver.empMilestone !== 'none') {
                    const milestoneMap = { 'training': '受訓中', 'month_1': '就業滿1M', 'month_3': '就業滿3M', 'month_5': '就業滿5M', 'completed': '結案' };
                    milestoneText = ` <span class="text-xs bg-purple-100 text-purple-700 border border-purple-200 px-2 py-0.5 rounded font-bold ml-1">🎯 ${milestoneMap[driver.empMilestone]}</span>`;
                }

                tr.innerHTML = `
                    <td class="font-mono text-[16px] font-bold text-slate-600">${escapeHTML(driver.id)}</td>
                    <td class="font-bold text-slate-900 text-[16px]">${escapeHTML(driver.name)}</td>
                    <td class="text-slate-600 font-semibold">${escapeHTML(driver.station) || '未指定'}</td>
                    <td class="text-emerald-700 font-semibold text-[15px]">${escapeHTML(driver.empRole) || '駕駛長'}${milestoneText}</td>
                    <td class="text-blue-600 font-semibold">${escapeHTML(driver.role) || '駕駛長'}</td>
                    <td>${statusHtml}</td>
                    <td class="text-center space-x-1">
                        <button class="btn-edit bg-teal-500 hover:bg-teal-600 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors" 
                                data-id="${escapeHTML(driver.id)}" data-name="${escapeHTML(driver.name)}" data-status="${escapeHTML(driver.status)}" 
                                data-station="${escapeHTML(driver.station)}" data-role="${escapeHTML(driver.role)}"
                                data-emprole="${escapeHTML(driver.empRole) || '駕駛長'}" data-empmilestone="${escapeHTML(driver.empMilestone) || 'none'}">編輯</button>
                        <button class="btn-delete bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors" data-id="${escapeHTML(driver.id)}">刪除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', (e) => {
                const btnData = e.target.dataset;
                document.getElementById('inpEmpId').value = btnData.id;
                document.getElementById('inpEmpId').disabled = true; 
                document.getElementById('inpEmpId').classList.add('bg-slate-200');
                document.getElementById('inpName').value = btnData.name;
                document.getElementById('inpStatus').value = btnData.status;
                document.getElementById('inpStation').value = btnData.station || '東海站';
                document.getElementById('inpRole').value = btnData.role || '駕駛長';
                document.getElementById('empRole').value = btnData.emprole;
                document.getElementById('empMilestone').value = btnData.empmilestone;
                
                const milestoneGroup = document.getElementById('milestoneGroup');
                if (btnData.emprole === '駕駛長') milestoneGroup.style.display = 'flex';
                else milestoneGroup.style.display = 'none';
                
                const saveBtn = document.getElementById('btnSaveDriver');
                saveBtn.innerHTML = "💾 更新人員資料";
                saveBtn.className = "bg-gradient-to-b from-teal-500 to-teal-600 hover:from-teal-600 hover:to-teal-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold ml-auto";
            }));

            document.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', async (e) => {
                if(confirm(`⚠️ 警告！刪除員工將無法復原，確定要刪除編號 ${e.target.dataset.id} 嗎？`)) {
                    try { await deleteDoc(doc(db, "Drivers", e.target.dataset.id)); } catch (err) { alert("刪除失敗，請檢查網路！"); }
                }
            }));
        }

        document.getElementById('btnSaveDriver').addEventListener('click', async () => {
            const empId = document.getElementById('inpEmpId').value.trim();
            const name = document.getElementById('inpName').value.trim();
            const status = document.getElementById('inpStatus').value;
            const station = document.getElementById('inpStation').value;
            const role = document.getElementById('inpRole').value;
            const empRole = document.getElementById('empRole').value;
            const empMilestone = document.getElementById('empMilestone').value;

            if(!empId || !name) { alert("請填寫員工編號與姓名！"); return; }
            const btn = document.getElementById('btnSaveDriver');
            
            try {
                btn.innerHTML = "⏳ 儲存中...";
                btn.disabled = true;

                const docRef = doc(db, "Drivers", empId);
                const docSnap = await getDoc(docRef);

                // 💡 使用 SecondaryApp 在前端無痛開通帳號 (免費方案作法)
                if (!docSnap.exists()) {
                    try {
                        const email = `${empId}@fengdong.com`;
                        await createUserWithEmailAndPassword(secondaryAuth, email, "123456");
                        await secSignOut(secondaryAuth); // 建立完馬上登出次要帳號，保護主帳號登入狀態
                        console.log("前端免費版：帳號開通成功");
                    } catch (apiErr) {
                        if (apiErr.code !== 'auth/email-already-in-use') {
                            alert("建立登入帳號失敗：" + apiErr.message);
                            throw apiErr; 
                        }
                    }
                }

                // 寫入 Firestore 資料庫
                await setDoc(docRef, { name, status, station, role, empRole, empMilestone }, { merge: true });

                // 重置表單
                document.getElementById('inpEmpId').value = '';
                document.getElementById('inpEmpId').disabled = false;
                document.getElementById('inpEmpId').classList.remove('bg-slate-200');
                document.getElementById('inpName').value = '';
                document.getElementById('inpStatus').value = 'active';
                document.getElementById('empRole').value = '駕駛長';
                document.getElementById('empMilestone').value = 'none';
                document.getElementById('milestoneGroup').style.display = 'flex';
                
                if (!docSnap.exists()) {
                    alert(`✅ 員工建立成功！\n\n系統已為該員配發登入資格。\n預設密碼皆為 123456，現在可以直接登入。`);
                } else {
                    alert(`✅ 員工資料已成功更新！`);
                }
            } catch (err) {
                alert("儲存失敗，請確認權限或網路。");
            } finally {
                btn.innerHTML = "💾 儲存人員資料";
                btn.disabled = false;
                btn.className = "bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-6 py-2.5 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 font-bold ml-auto";
            }
        });

        // ==========================================
        // 🚀 一鍵批次開通全體員工帳號 (免費版)
        // ==========================================
        setTimeout(() => {
            const syncBtn = document.createElement('button');
            syncBtn.innerHTML = "🚀 一鍵批次開通登入帳號";
            syncBtn.className = "fixed bottom-5 right-5 bg-purple-600 hover:bg-purple-700 text-white px-4 py-3 rounded-xl shadow-2xl font-black z-[9999] transition-all transform hover:-translate-y-1 border-2 border-white";
            document.body.appendChild(syncBtn);

            syncBtn.addEventListener('click', async () => {
                if(!confirm("確定要批次開通列表中所有同仁的系統帳號嗎？\n密碼皆預設為 123456。")) return;
                
                syncBtn.innerText = "⏳ 系統批次處理中，請勿關閉網頁...";
                syncBtn.disabled = true;
                syncBtn.classList.replace('bg-purple-600', 'bg-slate-500');

                let successCount = 0;
                let existCount = 0;

                try {
                    for (let driver of currentDrivers) {
                        if(driver.id === 'admin') continue; 
                        const email = `${driver.id}@fengdong.com`;
                        try {
                            await createUserWithEmailAndPassword(secondaryAuth, email, "123456");
                            await secSignOut(secondaryAuth);
                            successCount++;
                        } catch (e) {
                            if (e.code === 'auth/email-already-in-use') existCount++;
                            else console.warn(`員工 ${driver.id} 建立異常`, e);
                        }
                    }
                    alert(`✅ 批次帳號處理完成！\n\n🟢 新開通：${successCount} 人\n🟡 已存在：${existCount} 人\n\n未註冊的同仁現皆可使用工號與預設密碼 123456 登入！`);
                } catch (error) {
                    alert("批次處理失敗，請檢查連線。");
                } finally { syncBtn.remove(); }
            });
        }, 1500);

    }).catch((err) => { console.error("驗證失敗或未登入", err); });
  </script>
</body>
</html>
